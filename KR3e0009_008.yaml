body:
  text: 卷第八平卒尸厥脈證第一寸口沉大而滑沉則為實滑則為氣實氣相搏血氣入於藏即死入於腑即愈此為卒厥不知人脣青身冷為入藏即死如身溫和汗自出為入腑而復自愈平痓濕暍脈證第二平痓濕暍脈證第二太陽病發熱無汗而反惡寒者名剛痓太陽病發熱汗出而不惡寒者名柔痓太陽病發熱其脈沉而細者為痓太陽病發其汗因致痓病者身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭動搖者為痓太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之剛痓為病胸滿口噤臥不著席腳攣急其人必齘齒可與大承氣湯痓病發其汗巳其脈浛浛如蛇暴腹脹大者為欲解脈如故反伏弦者必痓痓脈來按之築築而弦直上下行痓家其脈伏堅直上下夫風病下之則痓復發其汗必拘急太陽病其證備身體強幾幾然脈沉遲此為痓括樓桂枝湯主之痓病有炙瘡難療瘡家雖身疼痛不可發其汗汗出則痓太陽病關節疼痛脈沉而緩者為中濕病者一身盡疼發熱日晡即劇此為風濕汗出所致也濕家之為病一身盡疼發熱而身色熏黃也濕家之為病其人但頭汗出而背強欲得被覆向火若下之早則噦或胸滿小便利舌上如胎此為丹田有熱胸上有寒渴欲飲而不能飲則口燥也濕家下之額上汗出微喘小便利者死若下利不止者亦死問曰風濕相搏身體疼痛法當汗出而解值天陰雨不止師云此可發汗而其病不愈者何也答曰發其汗汗大出者但風氣去濕氣續在是故不愈若治風濕者發其汗微微似欲出汗首則風濕俱去也濕家身煩疼可與麻黃湯加朮四兩發其汗為宜慎不可以火攻之風濕脈浮身重汗出惡風者防己湯主之病人喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中即愈傷寒八九日風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便鞕小便自利者朮附子湯主之風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之太陽中熱暍是也其人汗出惡寒身熱而渴也白虎湯主之太陽中暍身熱疼痛而脈微弱此以夏月傷冷水水行皮膚中所致也瓜蒂湯主之太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身熱口前開板齒燥若發其汗惡寒則甚加溫針則發熱益甚數下之淋復甚平陽毒陰毒百合狐惑脈證第三陽毒為病身重腰背痛煩悶不安狂言或走或見鬼或吐血下痢其脈浮大數面赤斑斑如錦文喉咽痛唾膿血五日可治至七日不可治也有傷寒一二日便成陽毒或服藥吐下後變成陽毒升麻湯主之陰毒為病身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆脣青面黑四肢厥冷其脈沉細緊數身如被打五六日可治至七日不可治也或傷寒初病一二日便結成陰毒或服藥六七日以上至十日變成陰毒甘草湯主之百合之為病其狀常默默欲臥復不能臥或如強健人欲得出行而復不能行意欲得食復不能食或有美時或有不用聞飲食臭時如寒無寒如熱無熱朝至口苦小便赤黃身形如和其脈微數百脈一宗悉病各隨證治之百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此寫逆其病難治見陰攻陽乃復下之此亦為逆其病難治狐惑為病其氣如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐狐惑之病並不欲飲食聞食臭其面目乍赤乍白乍黑其毒蝕於上者則聲喝其毒蝕下部者咽乾蝕於上部瀉心湯主之蝕於下部苦參湯淹洗之蝕於肛者雄黃熏之其人脈數無熱微煩默默欲臥汗出初得三四日目赤如鳩眼得之七八日目四眥黃黑若能食者膿巳成也赤小豆當歸散主之病人或從呼吸上蝕其咽或從下膲蝕其肛陰蝕上為惑蝕下為狐狐惑病者豬苓散主之平霍亂轉筋脈證第四病有霍亂者何師曰嘔吐而利此為霍亂問曰病者發熱頭痛身體疼惡寒而復吐利當屬何病師曰當為霍亂霍亂吐利止而復發熱也傷寒其脈微澀本是霍亂今是傷寒卻四五日至陰經上轉入陰必吐利轉筋為病其人臂腳直脈上下行微弦轉筋入腹雞屎白散主之平中風歷節脈證第五夫風之為病當半身不遂或但臂不遂者此為痺脈微而數中風使然頭痛脈滑者中風風脈虛弱也寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣則急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經則重不勝邪入於腑則不識人邪入於藏舌即難言口吐於涎寸口脈遲而緩遲則為寒緩則為虛榮緩則為亡血衛遲則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣趺陽脈浮而滑滑則穀氣實浮則汗自出少陰脈浮而弱弱則血不足浮則為風風血相搏則疼痛如掣盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致也寸口脈沉而弱沉則主骨弱則主筋沉則為腎弱則為肝汗出入水中如水傷心歷節黃汗出故曰歷節也味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衛不獨行榮衛俱微三膲無所御四屬斷絶身體羸瘦獨足腫大黃汗出腔冷假令發熱便為歷節也病歷節疼痛不可屈伸鳥頭湯主之諸肢節疼痛身體魁漯腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之平血痺虛勞脈證第六問曰血痺從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之形如風狀但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痺陰陽俱微寸口關上微尺中小緊外證身體不仁如風狀黃耆桂五物湯主之夫欲治病當先知其證何趣乃當攻之耳男子平人脈大為勞極虛亦為勞男子勞之為病其脈浮大手足暖春夏劇秋冬差陰寒精自出酸削不能行少陰虛滿人年五十六十其脈浮大者痺俠背行苦腸鳴馬刀俠嬰者皆為勞得之男子平人脈虛弱細微者喜盜汗出也男子面色薄者主渴及亡血卒喘悸其脈浮者裏虛也男子脈虛沉弦無寒熱短氣裏急小便不利面色白時時目瞑此人喜衄少腹滿此為勞使之然男子脈微弱而澀為無子精氣清冷夫失精家少腹弦急陰頭寒目睢痛髮落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交通桂枝加龍骨牡蠣湯主人脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精平消渴小便利淋脈證第七師曰厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐下之不肯止寸口脈浮而遲浮則為虛遲則為勞虛則衛氣不足遲則榮氣竭趺陽脈浮而數浮則為氣數則消榖而緊氣盛則溲數溲數則緊緊數相搏則為消渴男子消渴小便反多以飲一斗小便一斗腎氣圓主之師曰熱在下膲則溺血亦令人淋閉不通淋之為病小便如粟狀少腹弦急痛引臍中寸口脈細而數數則為熱細則為寒數為強吐趺陽脈數胃中有熱則消穀引食大便必堅小便則數少陰脈數婦人則陰中生瘡男子則氣淋淋家不可發汗發汗則必便血平水氣黃汗氣分脈證第八師曰病有風水有皮水自正水有石水有黃汗風水其脈自浮外證骨節疼痛其人惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身體發熱胸滿四肢頭面腫久不愈必致癰膿脈浮而洪浮則為風洪則為氣風氣相搏風強則為癮疹身體為癢癢為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上膲有寒其口多涎此為黃汗寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目裹上微擁如新臥起狀其頸脈動時時咳按其手足上陷而不起者風水太陽病脈浮而緊法當骨節疼痛而反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痺胸中窒不能食反聚痛暮躁不眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其形如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗風水其脈浮浮為在表其人能食頭痛汗出表無他病病者言但下重故從腰以上為和腰以下當腫及陰難以屈伸防巳黃耆湯主之風水惡風一身悉腫脈浮不渴續自汗出而無大熱者越婢湯主之師曰裹水者一身面目洪腫其脈沉小便不利故令病水假如小便自利亡津液故令渴也越婢如術湯主之皮水之為病四肢腫水氣在皮膚中四肢聶聶動者防巳茯苓湯主之趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之則胸滿短氣趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水寸口脈浮而遲浮脈熱遲脈潛熱潛相搏名曰沉趺陽脈浮而數浮脈熱數脈止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚則為水矣寸口脈弦而緊弦則衛氣不行衛氣不行則惡寒水不沾流走在腸間少陰脈緊而沉緊則為痛沉則為水小便即難師曰脈得諸沉者當責有水身體腫重水病脈出者死夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之問曰病下利後渴飲水小便不利腹滿因腫者何也答曰此法當病水若小便自利及汗出者自當愈水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即巳沉者與附子麻黃湯浮者與杏子湯心水者其身重而少氣不得臥煩而躁其陰大腫肝水者其腹大不能自轉側脅下腹中痛時時津液微生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水榖不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分問曰病者若水面目身體四肢皆腫小便不利師脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動緊氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽躁欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊衝氣令止乃治咳咳止自喘自差先治新病病當在後黃汗之病身體洪腫發熱汗出而渴狀如風水汗沾衣色正黃如蘗汗其脈自沉問曰黃汗之病從何得之師曰以汗出入水中浴水從汗孔入得之黃耆芍藥桂枝苦酒湯主之黃汗之病兩脛自冷假令發熱此屬歷節食巳汗出又身常暮臥盜汗出者此勞氣也若汗出巳反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出巳輒輕者久久必身瞤瞤則骨中痛又從腰以上必汗出下無汗腰寬弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯王之寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通則身冷陰氣不通則骨疼陽前通則惡寒陰前通則痺不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黃細辛附子湯主之心下堅大如盤邊如旋盤水飲所作枳實木湯主之平黃疸寒熱瘧脈證第九凡黃候其寸口脈近掌無脈口鼻冷並不可治脈沉渴欲飲水小便不利者皆發黃腹滿舌痿黃躁不得睡屬黃家師曰病黃疸發熱煩喘胸滿口躁者以發病時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裏當下之師曰黃疸之病當以十八日為期治之十日以上為差反劇為難治又曰疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔發於陽部其人振寒而發熱也師曰諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯又男子黃小便自利當與小建中湯黃疸腹滿小便不利而赤自汗出此為表和裏實當下之宜大黃黃蘗梔子芒消湯黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之夫病酒黃疸必小便不利其喉心中熱足下熱是其證也心中懊憹而熱不能食時欲吐名曰酒疸酒黃疸者或無熱靖言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸心中熱欲嘔者吐之即愈酒疸黃色心下結熱而煩酒疸下之久久為黑疸目青面黑心中如噉蒜虀狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之寸口脈微而弱微則惡寒弱則發熱當發不發骨節疼痛當煩不煩而極汗出趺陽脈緩而遲胃氣反強少陰脈微微則傷精陰氣寒冷少陰不足穀氣反強飽則煩滿滿則發熱客熱消穀發巳復飢熱則腹滿微則傷精穀強則瘦名曰穀寒熱陽明病脈遲者食難用飽飽則發煩頭眩者必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也師曰寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行趺陽脈緊而數數則為熱熱則消穀緊則為寒食即滿也尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食穀則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰穀疸額上黑微汗出手足中熱薄暮則發膀胱急小便自利名曰女勞疸腹如水狀不治黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治消石礬石散主之夫瘧脈自弦也弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫藥若脈緊數者可發汗針灸之浮大者吐之脈弦數者風發也以飲食消息止之瘧病結為癥瘕名曰瘧母鱉甲煎圓主之瘧但見熱者溫瘧也其脈平身無寒但熱骨節疼煩時嘔朝發暮解暮發朝解名曰溫瘧白虎加桂枝湯主之瘧多寒者牡瘧也蜀漆散主之平胸痺心痛短氣賁豚脈證第十師曰夫脈當取太過與不及陽微陰弦則胸痺而痛所以然者責其極虛也令陽虛知在上膲所以胸痺心痛者以其脈陰弦故也胸痺之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數者栝樓薤白白酒湯主之平人無寒熱短氣不足以息者實也賁豚病者從少腹起上衝咽喉發作時欲死復止皆從驚得其氣上衝胸腹痛及往來寒熱賁豚湯主之師曰病有賁豚有吐膿有驚怖有火邪此四部病皆從驚發得之平腹滿寒疝宿食脈證第十一趺陽脈微弦法當腹滿不滿者必下部閉塞大便難兩胠疼痛此虛寒從下上也當以溫藥服之病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去腹滿時減減復如故此為寒當與溫藥趺陽脈緊而浮緊則為痛浮則為虛虛則腸鳴緊則堅滿雙脈弦而遲者必心下堅脈大而緊者陽中有陰也可下之病腹中蒲痛為實當下之腹滿不減減不足言當下之病腹滿發熱數十日脈浮而數飲食如故厚朴三物湯主之寸口脈遲而緩遲則為寒緩即為氣氣寒相搏轉絞而痛寸口脈遲而澀遲為寒澀為無血夫中寒家喜缺其人清涕出發熱色和者善嚏中寒其人下利以裏虛也欲嚏不能此人肚中寒夫庾人繞臍痛必有風冷穀氣不行而反下之其氣必衝不衝者心下則痞寸口脈弦者則脅下俱急而痛其人嗇嗇惡寒也寸口脈浮而滑頭中痛趺陽脈緩而遲緩則為寒遲則為虛虛寒相搏則欲食溫假令食冷則咽痛寸口脈微尺中緊而澀緊則為寒微則為虛澀則血不足故知發汗而復下之也緊在中央知寒尚在此本寒氣何為發汗復下之耶夫脈浮而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脅下偏痛其脈緊弦此寒也以溫藥下之宜大黃附子湯寸口脈弦而緊弦則衛氣不行衛氣不行則惡寒緊則不欲食弦緊相搏則為寒疝趺陽脈浮而遲浮則為風虛遲則為寒疝寒疝繞臍痛若發則白汗出手足厥寒其脈沉弦者大烏頭湯主之問曰人病有宿食何以別之師曰寸口脈浮大按之反澀尺中亦微而澀故知有宿食寸口脈緊如轉索左右無常者有宿食寸口脈緊即頭痛風寒或腹中有宿食不化脈滑而數者實也有宿食當下之下利不欲食者有宿食當下之大下後六七日不大便煩不解腹滿痛此有燥屎也所以然者本有宿食故也宿食在上管當吐之平五藏積聚脈證第十二問曰病有積有聚有繫氣何謂也師曰積者藏病也終不移聚者腑病也發作有時展轉痛移為可治繫氣者脅下痛按之則愈愈復發為繫氣夫病巳愈不得復發令病復發即為繫氣也諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍傍上關上積在心下微下關積在少腹尺積在氣街脈出在左積在左脈出在右積在右脈兩出積在中央各以其部處之診得肺積脈浮而毛按之辟易脅下氣逆背相引痛少氣善忘目暝皮膚寒秋差夏劇主皮中時痛如虱緑之狀甚者如針刺時癢其色白診得心積脈沉而芤上下無常處病胸滿悸腹中熱面赤嗌乾心煩掌中熱甚即唾血主身瘈瘲主血厥夏差冬劇其色赤診得脾積脈浮大而長飢則減飽則見䐜起與穀爭減心下纍如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能臥是主肌肉損其色黃診得肝積脈弦而細兩脅下痛邪走心下足腫寒脅痛引少腹男子積疝女子瘕淋身無膏澤喜轉筋爪甲枯黑春差秋劇其色青診得腎積脈沉而急苦脊與腰相引痛飢則見飽則減少腹裏急口乾咽腫傷爛目䀮䀮骨中寒主髓厥善忘其色黑寸口脈沉而橫者脅下及腹中有橫積痛其脈弦腹中急痛腰背痛相引腹中有寒疝瘕脈弦緊而微細者癓也夫寒痺癥瘕積聚之脈皆弦緊若在心下即寸弦緊在胃管即關弦緊在臍下即尺弦緊又脈癥法左手脈橫癥在左右手脈橫癥在右脈頭大者在上頭小者在下又法橫脈見左積在右見右積在左偏得洪實而滑亦為積弦緊亦為積為寒痺為疝痛內有積不見脈難治見一脈相應為易治諸不相應為不治左手脈大右手脈小上病在左脅下病在左足右手脈大左手脈小上病在右脅下病在右足脈弦而伏者腹中有癥不可轉也必死不治脈來細而沉時直者身有癰腫若腹中有伏梁脈來小沉而實者胃中有積聚不下食食即吐平驚悸衄吐下血胸滿瘀血脈證第十三寸口脈動而弱動則為驚弱則為悸趺陽脈微而浮浮則胃氣虛微則不能食此恐懼之脈憂迫所作也驚生病者其脈止而復來其人目睛不轉不能呼氣寸口脈緊趺陽脈浮胃氣則虛寸口脈緊寒之實也寒在上膲胸中必滿而噫胃氣虛者趺陽脈浮少陽脈緊心下必悸何以言之寒水相搏二氣相爭是以悸脈得諸澀濡弱為亡血寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血亡血家不可攻其表汗出則寒栗而振問曰病衄連日不止其脈何類師曰脈來輕輕在肌肉尺中自溢目睛暈黃衄必未止暈黃去目睛慧了知衄今止師曰從春至夏發衄者太陽從秋至冬發衄者陽明寸口脈微弱尺脈澀弱則發熱澀為無血其人必厥微嘔夫厥當眩不眩而反頭痛痛為實下虛上實必衄也太陽脈大而浮必衄吐血病人面無血色無寒熱脈沉弦者衄也衄家不可發其汗汗出必額上促急而緊直視而不能眴不得眠脈浮弱手按之絶者下血煩咳者必吐血寸口脈微而弱氣血俱虛男子則吐血女子則下血嘔吐汗出者為可趺陽脈微而弱春以胃氣為本吐利者為可不者此為有水氣其腹必滿小便則難病人身熱脈小絶者吐血若下血婦人亡經此為寒脈遲者胸上有寒悸氣喜唾脈有陰陽趺陽少陰脈皆微其人不吐下必亡血脈沉為在裏榮衛內結胸滿必吐血男子盛大其脈陰陽微趺陽亦微獨少陰浮大必便血而失精設言淋者當小便不利趺陽脈弦必腸痔下血病人胸滿脣痿舌青口燥其人但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血當汗出不出內結亦為瘀血病者知熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之下血先見血後見便此近血也先見便後見血此遠血也平嘔吐噦下利脈證第十四嘔而脈弱小便復利身有微熱見厥者難治趺陽脈浮者胃氣虛寒氣在上憂氣在下二氣並爭但出不入其人即嘔而不得食恐怖而死寬緩即差夫嘔家有癰膿者不可治嘔膿盡自愈先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲也問曰病人脈數數為熱當消榖引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消榖胃中虛冷故吐也陽緊陰數其人食巳即吐陽浮而數亦為吐寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食設言未止者此為胃反故尺為之微澀也寸口脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎關上脈數其人則吐脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛趺陽脈微而澀微則下利澀則吐逆殺不得入也寸口脈微而數微則無氣無氣則柔虛榮虛則血不足血不足則胸中冷木趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿榖不化名曰胃反脈緊而澀其病難治夫吐家脈來形狀如新臥起病人欲吐者不可下之嘔吐而病在膈上後思水者解急與之思水者豬芩散主之噦而腹滿視其前後知何部不利利之即愈夫六腑氣絶於外者手足寒上氣腳縮五藏氣絶於內者下利不禁下甚者手足不仁下利脈沉弦者下重其脈大者為未止脈微弱數者為欲自止雖發熱不死脈滑按之虛絶者其人必下利下利有微熱其人渴脈弱者今自愈下利脈數若微發熱汗自出者自愈設脈復緊為未解下利寸脈反浮數尺中自澀其人必清膿血下利手足厥無脈灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下利脈數而浮者令自愈設不差其人必清膿血以有熱故也下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死下利脈反弦發熱身汗者自愈下利氣者當利其小便下利清榖不可攻其表汗出必脹滿其藏寒者當下之下利脈沉而遲其人面少赤身有微熱下利清榖必鬱冒汗出而解其人微厥所以然者其面戴陽下虛故也下利腹脹滿身體疼痛先溫其裏乃攻其表下利脈遲而滑者實也利未欲止當下之下利脈反滑者當有所去下乃愈下利差至其年月日時復發此為病不盡當復下之下利而譫語者為有燥屎也宜下之下利而腹痛滿為寒實當下之下利腹中堅者當下之下利後更煩按其心下濡者為虛煩也下利後脈三部皆平按其心下堅者可下之下利脈浮大者虛也以強下之故也設脈浮華因爾腸鳴當溫之病者痿黃躁而不渴胃中寒實而下利不止者死夫風寒下者不可下之下之後心下堅痛脈遲者為寒但當溫之脈沉緊下之亦然脈大浮弦下之當巳平肺痿肺癰咳逆上氣淡飲脈證第十五問曰熱在上膲者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難數被駛藥下利重亡津液故得之寸口脈不出而反發汗陽脈早索陰脈不澀三焦踟蹰入而不出陰脈不澀身體反冷其內反煩多唾脣燥小便反難此為肺痿傷於津液便如爛瓜亦如豚腦但坐發汗故也肺痿其人欲咳不得咳咳則出乾沫久久小便不利甚則脈浮弱肺痿吐涎沫而不咳者其人不渴必遺溺小便數所以然者以上虛不能制下也此為肺中冷必眩多涎唾甘草乾姜湯以溫其藏師曰肺痿咳唾咽燥欲飲水者自愈自張口者短氣也咳而口中自有津液舌上胎滑此為浮寒非肺痿也問曰寸口脈數其人咳口中反有濁唾涎沫者何也師曰此為肺痿之病若口中辟辟燥咳則胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿脈數實者為肺癰問曰病咳逆脈之何以知此為肺癰當有膿血吐之則死後竟吐膿死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為凝滯畜結雍膿吐如米粥始萌可救膿成則死咳而胸滿振寒脈數咽乾不渴時時出濁唾腥臭久久吐膿如粳米粥者為肺癰桔梗湯生之肺癰胸滿脹一身面目浮腫鼻寒清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶歷大棗瀉肺湯主之寸口脈數趺陽脈緊寒熱相搏故振寒而咳趺陽脈浮綏胃氣如經此為肺癰問曰振寒發熱寸口脈滑而數其人飲食起居如故此為癰腫病醫反不知而以傷寒治之應不愈也何以知有膿膿之所在何以別知其處師曰假令膿在胸中者為肺癰其人脈數咳唾有膿血設膿未成其脈自緊數緊去但數膿為已成也夫病吐血喘咳上氣其脈數有熱不得臥者死上氣面浮腫肩息其脈浮大不治又加利允甚上氣躁而喘者屬肺脹欲作風水發汗則愈夫酒客咳者必致吐血此坐極飲過度所致也咳家脈弦為有水可與十棗湯下之咳而脈浮其人不咳不食如是四十日乃巳咳而時發熱脈卒弦者非虛也此為胸中寒實所致也當吐之咳家其脈弦欲行吐藥當相人強弱而無熱乃可吐之其脈沉者不可發汗久咳數歲其脈弱者可治實大數者不可治其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家問曰夫飲有四何謂也師曰有淡飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之淡飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息短氣不得臥其形如腫謂之支飲留飲者脅下痛引缺盆咳嗽轉盛胸中有留飲其人短氣而渴四肢歷節痛其脈沉者有留飲夫心下有留飲其人胸寒冷大如手病者脈伏其人欲自利利者反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之病淡飲者當以溫藥和之心下有淡飲胸脅支滿目眩甘草湯主之病溢飲者當發其汗小青龍湯主之支飲亦喘而不能臥加短氣其脈平也膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防巳湯主之心下有支飲其人若冒眩澤瀉湯主之嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之夫有支飲家咳煩胸中痛者不卒死至一百日或一歲可與十棗湯膈上之病滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲夫病人飲水多必暴喘滿凡食少飲多心下水停甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛脈偏弦者飲也肺飲不弦但喜喘短氣病人一臂不隨時復轉移在一臂其脈沉細非風也必有飲在上膲其脈虛者寫微勞榮衛氣不周故也久久自差腹滿口苦乾燥此腸間有水氣也防巳椒目葶藶大黃丸主之假令瘦人臍下悸吐涎沫而癲眩者水也五苓散主之先渴卻嘔為水停心下此屬飲家半夏加茯苓湯主之水在心心下堅築短氣惡水不欲飲水在肺吐涎味欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸平癰腫腸癰金瘡侵淫脈證第十六脈數身無熱內有癰也諸浮數脈應當發熱而反灑浙惡寒若有痛處當發其癰脈微而遲必發熱弱而數寫振寒當發癰腫脈浮而數身體無熱其形默默胸中微躁不知痛之所在此人當發癰腫脈滑而數數則為熱滑則為實滑則主榮數則主衛榮衛相逢則結為癰熱之所過則為膿也師曰諸癰腫欲知有膿與無膿以手掩腫上熱者為有膿不熱者為無膿問曰官羽林婦病醫脈之何以知婦人腸中有膿為下之則愈師曰寸口脈滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗少腹痞堅小便或澀或時汗出或復惡寒膿為巳成設脈遲緊聚為瘀血血下則愈腸癰之為病其身體甲錯腹皮急按之濡如腫狀腸癰者少腹腫按之則痛小便數如淋時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿巳成不可下也大黃牡丹湯主之問曰寸口脈微而澀法當亡血若汗出設不汗者云何答曰若身有瘡被刀器所傷亡血故也侵淫瘡從口起流向四肢者可治從四肢流來入口者不可治之
