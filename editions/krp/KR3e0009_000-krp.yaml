body:
  text: 晉太醫令王叔和撰脉理精微其體難辨絃緊浮芤展轉相類在心易了指下難明謂沈爲伏則方治永乖以緩爲遲則危殆立至況有數候俱見異病同脉者乎夫醫藥爲用性命所繫和鵲至妙猶或加思仲景明審亦候形證一毫有疑則考校以求驗故傷寒有承氣之戒嘔噦發下焦之間而遺文逺㫖代寡能用舊經秘述奥而不售遂令末學昧於原本㸦兹偏見各逞己能致㣲痾成膏肓之變滯固絶振起之望良有以也今撰集岐伯以來逮于華陀經論要決合爲十卷百病根源各新刋王氏脉經目録臣林億等類次卷第一脉形狀指下秘决平脉早晏法分别三關境界脉候所主辨尺寸隂陽榮衛度数平脉視人大小長短男女逆順法持脉輕重法兩手六脉所主五藏六腑隂陽逆順辨腑臟病脉隂陽大法辨脉隂陽大法平虚實從横逆順伏匿脉辨災恠恐怖雜脉遟疾短長雜病法平人得病所起脉診病將差難巳脉卷第二平三關隂陽二十四氣脉平人迎神門氣口前後脉平三關病候并治宜平竒經八脉病八脉爲病不在十二經故以繫此卷之末平三關隂陽二十四氣脉卷第三肝膽部心小腸部脾胃部肺大腸部腎膀胱部卷第四辨三部九候脉證平雜病脉診五藏六腑氣絶證候診四時相反脉診損至脉診脉動止投數踈數死期年月診百病死生决辨三部九候脉證卷第五張仲景論脉扁鵲隂陽脉法扁鵲華佗察聲色要訣扁鵲診諸反逆死脉要訣診三部虚實决死生卷第六肝病證膽病證心病證小腸病證脾病證胃病證肺病證大腸病證腎病證膀胱病證三膲病證卷第七病不可發汗證病可發汗證病發汗以後證病不可吐證病可吐證病不可下證病可下證病發汗吐下以後證病可温證病不可炙證病可灸證病不可刺證病可刺證病不可水證病可水證病不可火證病可火證熱病生死期日證熱病隂陽交并少隂厥逆隂陽竭盡生死證重實重虚隂陽相附生死證熱病十逆死日證熱病五藏氣絶死日證熱病至脉死日證熱病損脉死日證卷第八平卒尸厥脉證平痓濕暍脉證平陽毒隂毒百合狐惑脉證平霍亂轉筋脉證平血痺虚勞脉證平中風歴節脉證平消渴小便利淋脉證平水氣黄汗氣分脉證平黄疸寒熱瘧脉證第平腹滿寒疝宿食平匈痺心痛短氣賁豚脉證平五藏積聚脉證平驚悸衂吐下血匈滿瘀血脉證平肺痿肺癰欬逆上氣喘飲脉證平癰腫腸癰金瘡侵淫脉證平嘔􅎪下痢脉證卷第九平姙娠分别男女將産諸證平姙娠胎動血分水分吐下腹痛證平産後諸病鬱冐中風發熱煩嘔下利證平帶下絶産無子亡血居經證平鬱冐五崩漏下經閉不利腹中諸病證平咽中如有灸腐喜悲熱入血室腹滿證平隂中寒轉胞隂吹隂生瘡脫下證平婦人病生死證平小兒雜病證卷第十手檢圖三十一部目録畢
