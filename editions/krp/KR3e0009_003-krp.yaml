body:
  text: 肝膽部第一心小腸部第二脾胃部第三肺大腸部第四腎膀胱部第五肝膽部第一肝象木肝於五行象木與膽合爲府膽爲清凈之府其經足厥隂厥隂肝脉與足少陽爲表裏少陽膽脉也藏隂府陽故爲表裏其脉絃絃肝脉之大形也其相冬三月冬水王木相王春三月廢夏三月夏火王木廢囚季夏六月季夏土王木囚死秋三月秋金王木死其王日甲乙王時平旦日出並木也其困日戊己困時食時日昳並土也其死日庚辛死時晡時日入並金也其神魂肝之所藏者䰟其主色其養筋肝氣所養者筋其候目肝候出目故肝實則目赤其聲呼其色青其臭臊月令云其臭羶其液泣泣出肝其味酸其宜苦苦火味也其惡辛辛金味肝俞在背第九椎募在期門直兩乳下二肋端膽俞在背第十椎募在日月冘在期門下五分右新撰並出素問諸經昔人撰集或混雜相渉煩而難了今抄亊要分别五藏名爲一部冬至之後得甲子少陽起於夜半肝家王冬至者歲終之節甲子日者隂陽更始之数也少陽膽也膽者木也生於水故起夜半其氣常㣲少故言少陽云夜半子者水也肝者東方木肝與膽爲藏府故王東方應木行也萬物始生其氣來耎而弱寛而虚春少陽氣温和耎弱故萬物日生焉故脉爲絃肝氣養於筋故其脉絃強亦法木體強也耎即不可發汗弱即不可下寛者開開者通通者利故名曰寛而虚言少陽始起尚耎弱人榮衞湊理開通發即汗出不止不可下下之而池利不禁故言寛虚通利也春以胃氣爲本不可犯也胃者土也萬物禀土而生胃以養五藏於肝王以胃氣爲本也不可犯者不可傷也右四時經黃帝問曰春脉如絃何如而絃歧伯曰春脉肝也東方木也萬物之所以始生也故其氣來濡弱輕虚而滑端直以長故曰絃反此者病黃帝曰何如而反歧伯曰其氣來實而強此謂太過病在外其氣來不實而㣲此謂不及病在中黃帝曰春脉太過與不及其病皆何如歧伯曰太過則令人善忘忘當作怒忽忽眩冒而癲疾不及則令人匈脇痛引背下則兩脇胠滿黃帝曰善肝脉來濡弱招招如掲竿末梢曰平巢源云綽綽如按琴瑟之絃如掲長竿曰平春以胃氣爲本肝脉來盈實而滑如循長竿曰肝病肝脉來急而益勁如新張弓弦曰肝死眞肝脉至中外急如循刀刃責責然巢源云賾賾然如按琴瑟絃色青白不澤毛折乃死春胃微絃曰平絃多胃少曰肝病但絃無胃曰死有胃而毛曰秋病毛甚曰今病肝藏血血舎䰟悲哀動中則傷魂魂傷則狂妄不精不敢正當人不精不敢正當人一作其精不守令人隂縮隂縮而筋攣兩脇骨不舉毛悴色夭死于秋春肝木王其脉絃細而長名曰平脉也反得浮濇而短者千金云㣲澀而短是肺之乗肝金之刻木爲賊邪大逆十死不治一本云日月年数至三忌庚辛反得洪大而散者千金云浮大而洪是心之乗肝子之扶母爲實邪雖病目愈反得沈濡而滑者是腎之乗肝母之歸子爲虚邪雖病易治反得大而緩者是脾之乗肝土之陵木爲微邪雖病即差肝脉來濯濯如倚竿如琴瑟之絃再至曰平三至曰離經病四至脫精五至死六至命盡足厥隂脉也肝脉急甚爲惡言㣲急爲肥氣在脇下若覆杯緩甚爲善嘔微緩爲水瘕痺大甚爲内癰善嘔衂微大爲肝痺縮欬引少腹小甚爲多飲微小爲消癉滑甚爲頽疝微滑爲遺溺濇甚爲淡飲微濇爲瘈瘲攣筋足厥隂氣絶則筋縮引卵與舌厥隂者肝脉也肝者筋之合也筋者聚於隂器而脉絡於舌本故脉弗營則筋縮急筋縮急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也肝死藏浮之脉弱按之中如索不來或曲如蛇行者死右素問鍼經張仲景心小腸部第二心象火與小腸合爲府小腸爲受盛之府也其經手少隂手少隂心脉也與手太陽爲表裏手太陽小腸脉也其脉洪洪心脉之大形其相春三月木王火相王夏三月廢季夏六月囚秋七月金王火囚死冬三月水王火死其王日丙丁王時禺中日中其困日庚辛困時晡時日入其死日壬癸死時人定夜半其藏神心之所藏者神也其主臭其養血心氣所養者血其喉舌其聲言言由心出故主言其色赤其臭焦其液汗其味苦其宜甘甘脾味也其惡鹹鹹腎味也心俞在背第五椎或云第七椎募在巨闕在心下一寸小腸俞在背第十八椎募在關元臍下三寸右新撰心者南方火心主血其色赤故以夏王於南方應火行萬物洪盛垂枝布葉皆下垂如曲故名曰鈎心王之時太陽用亊故草木茂盛枝葉布舒皆下垂曲故謂之鈎也心脉洪大而長洪則衛氣實實則氣無從出脉洪者衛氣实衛氣实則􅴪理宻宻則氣无從出大則榮氣萌萌洪相薄可以發汗故名曰長榮者血也萌當爲明字之誤耳血王故明且大也榮明衛實當須發動通其津液也長洪相得即引水漿漑灌經絡津液皮膚夏熱陽氣盛故其人引水漿潤灌肌膚以養皮毛猶草木須雨澤以長枝葉太陽洪大皆是母軀幸得戊己用牢根株太陽夏火春木爲其母陽得春始生名曰少陽到夏洪盛名曰太陽故言是母軀也戊巳土也土爲火子火王即土相故用牢根株也陽氣上出汗見於頭五月枯䓸胞中空虚毉友下之此爲重虚也月當爲内䓸當爲乾枯燥也皆字誤耳内字似月由來逺矣遂以傳焉人頭者諸陽之㑹夏時飲水漿上出爲汗先從頭流於身軀以實其表是以五内乾枯燥則胞中空虚津液少也胞者膀胱津液之府也愚毉不曉故反下之令重虚也脉浮有表無裏陽無所使陽盛脉浮宜發其汗而反下之損於隂氣陽爲表隂爲裏經言陽爲隂使隂爲陽守相須而行脉浮故無裏也治之錯逆故令隂陽離别不能復相朝使不但危身井中其母言下之不但傷心并復中肝右四時經黃帝問曰夏脉如鈎何如而鈎歧伯曰夏脉心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鈎反此者病黃帝曰何如而反歧伯曰其氣來盛去亦盛此謂太過病在外其來不盛去反盛此謂不及病在中黃帝曰夏脉太過與不及其病皆何如歧伯曰太過則令人身熱而膚痛爲浸淫不及則令人煩心上見欬唾下爲氣泄帝曰善心脉來累累如連珠如循琅玕曰平夏以胃氣爲本心脉來喘喘甲乙作累累連屬其中㣲曲曰心病心脉來前曲後居如操帶鈎曰心死眞心脉至堅而搏如循薏苡子累累然其色赤黒不澤毛折乃死夏胃微鈎曰平鈎多胃少曰心病但鈎無胃曰死胃而有石曰冬病石甚曰今病心藏脉脉舎神怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死于冬夏心火王其脉洪千金作浮大而洪大而散名曰平脉反得沈濡而滑者是腎之乗心水之刻火爲賊邪大逆十死不治一本云日月年数至二忌壬癸反得大而緩者是脾之乗心子之扶母爲實邪雖病自愈反得絃細而長者是肝之乗心母之歸子爲虚邪雖病易治反得浮千金浮作微濇而短者是肺之乗心金之陵火爲微邪雖病即差心脉來累累如貫珠滑利再至曰平三至曰離經病四至脫精五至死六至命盡手少隂脉心脉急甚爲瘈瘲㣲急爲心痛引背食不下緩甚爲狂笑㣲緩爲伏梁在心下上下行時唾血大甚爲喉介微大爲心痺引背善淚出小甚爲善噦微小爲消癉滑甚爲善渇微滑爲心疝引臍少腹鳴濇甚爲瘖微濇爲血溢維厥耳鳴巓疾手少隂氣絶則脉不通少隂者心脉也心者脉之合也脉不通則血不流血不流則髮色不澤故其靣黒如漆柴者血先死壬篤癸死水勝火也心死藏浮之脉實如豆麻擊手按之益躁疾者死右素問鍼經張仲景脾胃部第三脾象土與胃合爲府胃爲水榖之府其經足太隂太隂脾之脉也與足偒明爲表裏陽明胃脉其脉緩緩脾脉之大形也其相夏三月火王土相王季夏六月廢秋三月囚冬三月死春三月其王日戊己王時食時日昳困日壬癸困時人定夜半其死日甲乙死時平旦日出並木時也其神意其主味其養肉其候口其聲歌其色黃其臭香其液涎其味甘其宜辛其惡酸脾俞在背第十一椎募在章門季肋端是胃俞在背第十二椎募在太倉右新撰脾者土也敦而福敦者厚也萬物衆色不同脾主水榖其氣微弱水榖不化脾爲土行王於季夏土性敦厚育養萬物當此之時草木備具枝葉茂盛種類衆多或有黃赤白黑色各不同矣故名曰得福者廣土生養万物當此之時脾則同禀諸藏故其德爲廣大萬物懸根住莖其葉在巔蜎蜚蠕動蚑蠷喘息皆蒙土恩懸根住莖草木之類也其次則蛾蚋幾微之虫因隂陽氣変化而生者也喘息有血脉之類也言普天之下草木昆虫無不𬒳蒙土之恩福也德則爲緩恩則爲遟故令太隂脉緩而遟尺寸不同太隂脾也言脾王之時脉緩而遟尺寸不同者尺遟而寸緩也酸鹹苦辛大一作太沙一作渉又作妙而生互行其時而以各行皆不群行盡可常服肝酸腎鹹心苦肺辛濇皆四藏之味也脾主調和五味以禀四藏四藏受味於脾脾王之時其脉沙逹於肌肉之中互行人身軀乃復各行隨其四支使其氣周匝榮諸藏府以養皮毛皆不群行至一處也故言尽可常服也土寒則温土熱則凉冬陽氣在下土中温煖夏隂氣在下土中清凉脾氣亦然土有一子名之曰金懷挾抱之不離其身金乃畏火恐熱來熏遂棄其母逃歸水中水自金子而藏火神閉門塞户内外不通此謂冬時也陽氣在中陽爲火行金性畏火故恐熏之金歸水中而避火也母子相得益盛閉塞不通者言水氣充實金在其中此爲強固火無復得往刻之者神宻之類也土亡其子其氣衰微水爲洋溢浸漬爲池一作其地走擊皮膚面目浮腫歸於四胑此爲脾之衰損土以防水今土弱而水強故水得陵之而妄行愚醫見水直往下之虚脾空胃水遂居之肺爲喘浮脾胃巳病宜扶養其氣通利水道愚毉不曉而往下之此爲重傷水氣遂更陵之上侵匈中肺得水而浮故言喘浮肝反畏肺故下沈没肺金肝木此爲相刻肺浮則實必復刻肝故畏之沈没於下下有荆棘恐傷其身避在一邊以爲水流荆棘木之類肝爲木今没在下則爲荆棘其身脾也脾爲土土畏木是以避在下邊避木也水流者水之流路也土本刻水而今微弱又復觸木無復制水故水得流行心衰則伏肝微則沈故令脉伏而沈心火肝木火則畏水而木畏金金水相得其氣則實刻於肝心故令二藏衰微脉爲沈伏也工醫來占固轉孔穴利其溲便遂通水道甘液下流亭其隂陽喘息則微汗岀正流肝著其根心氣因起陽行四胑肺氣亭來實而盈数如雞舉足曰脾病脾脉來堅兊如烏之喙如鳥之距如屋之漏如水之溜曰脾死眞脾脉至弱而乍踈乍散一作数色青黃不澤毛折乃死長夏胃微濡弱曰平弱多胃少曰脾病但代無胃曰死濡弱有石曰冬病石甚曰今病脾藏榮榮舎意愁憂不解則傷意意傷則悶亂四胑不舉毛悴色夭死于春六月季夏建未坤未之間土之位脾王之時其脉大阿阿而緩名曰平脉反得絃細而長者是肝之乗脾木之刻土爲賊邪大逆十死不治反得浮千金浮作微濇而短者是肺之乗脾子之扶母爲實邪雖病自愈反得洪大而散者千金作浮大而洪是心之乗脾母之歸子爲虚邪雖病易治反得沈濡而滑者腎之乗脾水之陵土爲微邪雖病即差脾脉萇萇而弱千金萇萇作長長來踈去数再至曰平三至曰離經病四至脫精五至死六至命盡足太隂脉也脾脉急甚爲瘈瘲㣲急爲脾中滿食飲入而還出後沃沬緩甚爲痿厥㣲緩爲風痿四肢不用心慧然若無病大甚爲擊仆㣲大爲痞氣裹大膿血在腸胃之外小甚爲寒熱微小爲消癉滑甚爲頽癃㣲滑爲蟲毒蚘腸鳴熱濇甚爲腸頽微濇爲内潰多下膿血也足太隂氣絶則脉不營其口脣口脣者肌肉之本也脉不營則肌肉濡肌肉濡則人中滿人中滿則脣反脣反者肉先死甲篤乙死木勝土也脾死藏浮之脉大緩一作堅按之中如覆杯絜絜狀如揺者死一云漐漐狀如炙肉右素問鍼經張仲景肺大腸部第四肺象金與大腸合爲府大腸爲傳導之府也其經手大隂手太隂肺脉也與手陽明爲表裏手陽明大腸脉也其脉浮浮肺脉之大形也其相季夏六月季夏土王金相其王秋三月廢冬三月囚春三月死夏三月夏火王金死其王日庚辛王時晡時日入其困日甲乙困時平旦日出其死日丙丁死時禺中日中其神魄其主聲其養皮毛其候鼻其聲哭其色白其臭腥其液涕其味辛其宜鹹其惡苦肺俞在背第三椎或云第五椎也募在中府直兩乳上下肋間大腸俞在背第十六椎募在天樞俠臍傍各一寸半右新撰肺者西方金萬物之所終金性剛故王西方割断萬物萬物是以皆終於秋也宿葉落柯萋萋枝條其杌然獨在其脉爲微浮毛衛氣遟萋萋者零落之貌也言草木宿葉得秋隨風而落但有枝條杌然獨在此時陽氣則遟脉爲虚微如毛也榮氣數數則在上遟則在下故名曰毛諸陽脉数諸隂脉遟榮爲隂不應數反言榮氣數隂得秋節而昇轉在陽位故一時数而在上也此時隂始用事陽即下藏其氣反遟是以肺脉數散如毛也陽當䧟而不䧟隂當昇而不昇爲邪所中隂陽交易則不以時定二氣感激故爲風寒所中陽中邪則捲隂中邪則緊捲則惡寒緊則爲慄寒慄相薄故名曰瘧弱則發熱浮乃來出捲者其人拘捲也緊者脉緊也此謂𥘉中風寒之時脉緊其人則寒寒止而脉更㣲弱弱則其人發熱熱止則脉浮浮者瘧觧王脉出也旦中旦發暮中暮發言瘧發皆隨其𥘉中風邪之時也藏有逺近脉有遟疾周有度數行有漏刻藏謂人五藏肝心脾肺腎也心肺在隔上呼則其氣出是爲近呼爲陽其脉疾腎肝在膈下吸則其氣入是爲逺也吸爲隂其脉遟度數謂經脉之長短周身行者榮衞之行也行隂陽各二十五度爲一周也以應漏下百刻也遟在上傷毛采數在下傷下焦中焦有惡則見有善則匿秋則陽氣遟隂氣數遟當在下数當在上隨節変故言傷毛采也人之皮毛肺氣所行下焦在臍下隂之所治也其脉應循榆葉曰春平脉藹藹如車蓋按之益大曰秋平脉肺脉來不上不下如循雞羽曰肺病巢源無不字肺脉來如物之浮如風吹毛曰肺死眞肺脉至大而虚如以毛羽中人膚色赤白不澤毛折乃死秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有絃曰春病絃甚曰今病肺藏氣氣舎魄喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死于夏秋金肺王其脉浮千金浮作㣲濇而短曰平脉反得洪大而散者千金作浮大而洪是心之乗肺火之刻金爲賊邪大逆十死不治一本云日月年數至四忌丙丁反得沈濡而滑者是腎之乗肺子之扶母爲实邪雖病自愈反得大而緩者是脾之乗肺母之歸子爲虚邪雖病易治反得絃細而長者是肝之乗肺木之陵金爲虚邪雖病即差肺脉來汎汎輕如㣲風吹鳥背上毛再至曰平三至曰離經病四至脫精五至死六至命盡手太隂脉也肺脉急甚爲癲疾微急爲肺寒熱怠墮欬陲血引腰背􅎍苦鼻息肉不通緩甚爲多汗㣲緩爲痿偏風一作漏風頭以下汗出不可止大甚爲脛腫㣲汗爲肺痺引匈背起腰内小甚爲飱泄㣲小爲消癉滑甚爲息賁上氣㣲滑爲上下出血濇甚爲嘔血㣲濇爲䑕瘻在頸支掖之間下不勝其上其能喜酸手太隂氣絶則皮毛焦太隂者行氣温皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷者則瓜瓜字一作皮枯毛折毛折者則氣氣字一作毛先死丙篤丁死火勝金也肺死藏浮之虚按之弱如葱葉下無根者死右素問鍼經張仲景腎膀胱部第五腎象木與膀胱合爲府膀胱為津液之府其經足少隂足少隂腎脉也與足太陽爲表裏足太陽膀胱脉也其脉沈沈腎脉之大形也其相秋三月秋金王水相其王冬三月廢春三月囚夏三月其死季夏六月其王日壬癸王時人定夜半其困日丙丁困時禺中日中其死日戊已死時食時日昳其神志腎之所藏者志也其主液其養骨其候耳其聲呻其色黑其臭腐其液唾其味鹹其宜酸其惡甘腎俞在背第十四椎募在京門膀胱俞在第十九椎募在中極横骨上一寸在臍下五寸前䧟者中右新撰腎者北方水万物之所藏冬則北方用亊王在三時之後腎在四藏之下故王北方也万物春生夏長秋收冬藏百蟲伏蟄冬伏蛰不食之虫言有百種也陽氣下䧟隂氣上升陽氣中出隂氣烈爲霜遂不上昇化爲雪霜猛獸伏蟄蜾蟲匿藏陽氣下䧟者謂降於上中也其氣猶越而昇出隂氣在上寒盛陽氣虽昇岀而不能自致因而化作霜雪或謂陽氣中出是十月則霜降猛獸伏蛰者盖謂龍蛇冬時而潜処蜾䖝无毛甲者得寒皆伏蛰逐陽氣所在如此避氷霜自温養也其脉爲沈沈爲隂在裏不可發汗發則蜾蟲出見其霜雪陽氣在下故冬脉沈温飬於藏府此爲裏实而表虚復從外發其汗此爲逆治非其法也猶百䖝伏蛰之時而反出土見於氷霜必死不疑逆治者死此之謂也隂氣在表陽氣在藏慎不可下下之者傷脾脾土弱即水氣妄行陽氣在下温飬諸藏故不可下也下之旣損於陽氣而脾胃復傷土以防水而今反傷之故令水得盈溢而妄行也下之者如魚出水蛾入湯言治病逆則殺人如魚出水蛾入湯火之中立死重客在裏慎不可熏熏之逆客其息則喘重客者猶陽氣也重者尊重之皃也陽位尊処於上今一時在下非其常所故言客也熏謂燒鍼及以偒火之軰熏發其汗如此則客熱從外入与陽氣相薄是爲逆也氣上熏匈中故令喘息無持客熱令口爛瘡无持者无以湯火發熏其汗也熏之則火氣入裏爲客熱故令其口生瘡隂脉且解血散不通正陽遂厥隂不往從血行脉中氣行脉外五十周而復㑹如環之无端也血爲隂氣爲陽相須而行發其汗使隂陽離别脉爲觧散血不得通厥者逆也謂陽氣逆而不復相朝使治病失所故隂陽錯逆可不慎也客熱狂入内爲結匈隂陽錯乱外熱狂入留結匈中也脾氣遂弱清溲利通脾主水榖其氣微弱水榖不化下痢不息清者厠也溲從水道出而反清溲者是謂下利至廁也右四時經黄帝問曰冬脈如營何如而營岐伯對曰冬脈腎也北方水也萬物之所以合藏故其氣來沈以搏甲乙作濡故曰營反此者病黄帝曰何如而反岐伯曰其氣如彈石者此為太過病在外其去如數者此謂不及病在中黄帝曰冬脈太過與不及其病皆如何岐伯曰太過則令人解㑊脊脈痛而少氣不欲言不及則令人心懸如病飢脛中清脊中痛小腹滿小便黄赤腎脈來喘喘絫絫如鉤按之而堅曰腎平冬以胃氣為本腎脈如引葛按之益堅曰腎病腎脈來發如奪索辟辟如彈石曰腎死眞腎脈至搏而絶如以石投諸水千金作如以指彈石然其色黑赤不澤毛折乃死冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤夏病鉤甚曰今病凡人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真藏脈不得胃氣也所謂脈不得胃氣者肝但弦心但鉤胃但弱肺但毛腎但石也腎藏精精舍志盛怒而不止則傷志志傷則善忘其前言腰脊痛不可以俛仰屈伸毛悴色夭死於季夏冬腎水王其脈沈濡而滑曰平脈反得大而緩者是脾之乘腎土之克水為賊邪大逆十死不治一本云日月年數至一忌戊己反得弦細而長者是肝之乘腎子之扶母為實邪雖病自愈反得浮千金作微濇而短者是肺之乘腎母之歸子為虚邪雖病易治反得洪大而散者千金作浮大而洪是心之乘腎火之陵水為微邪雖病即差腎脈沈細而緊再至曰平三至曰離經病四至脱精五至死六至命盡足少隂脉也腎脉急甚爲骨痿癲疾微急爲奔豚沈厥足不收不得前後緩甚爲折脊微緩爲洞下洞下者食不化入咽還出大甚爲隂痿微大爲石水起臍下以至小腹腫垂垂然上至胃管死不治小甚爲洞泄微小爲消癉滑甚爲癃㿗微滑爲骨痿坐不能起目無所見視見黒花濇甚爲大癕㣲濇爲不月水沈痔足少隂氣絶則骨枯少隂者冬脉也伏行而濡骨髓者也故骨不濡則肉不能著骨也骨肉不相親則肉濡而却肉濡而却故齒長而垢難經垢字作枯髮無澤髮無澤者骨先死戊篤已死土勝水也腎死藏浮之堅按之亂如轉圎益下入尺中者死右素問鍼經張仲景新刋王氏脉經卷第三
