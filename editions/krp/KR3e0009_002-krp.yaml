front:
  text: 新刋王氏脉經卷第二臣林億等類次
  hash: sha256:56009920a0486d76e22348c2d8cc3c26aa33ce13211264ad1618034f6b36de44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0009_SBCK_002-1a}
body:
  text: 平三關隂陽二十四氣脉第一平人迎神門氣口前後脉第二平三關病候并治冝第三平竒經八脉病第四八脉爲病不在十二經故以繫此卷之末平三關隂陽二十四氣脉第一左手關前寸口陽絶者無小腸脉也苦臍痺小腹中有疝瘕王月王字一本作五即冷上搶心刺手心主經治隂心主在掌後橫理中即太陵穴也左手關前寸口陽實者小腸實也苦心下急痺一作急痛小腸有熱小便赤黄刺手太陽經治陽一作手少陽者非太陽在手小指外側本節䧟中即後谿穴也左手關前寸口隂絶者無心脉也苦心下毒痛掌中熱時時善嘔口中傷爛刺手太陽經治陽左手關前寸口隂實者心實也苦心下有水氣憂恚發之刺手心主經治隂左手關上陽絶者無膽脉也若膝疼口中苦眯目善畏如見鬼狀多驚少力刺足厥隂經治隂在足大指間即行間穴也或刺三毛中左手關上陽實者膽實也苦腹中實不安身軀習習也刺足少陽經治陽在足上第二指本節後一寸第二指當云小指次指即臨泣穴也左手關上隂絶者無肝脉也苦癃遺溺難言脅下有邪氣善吐吐刺足少陽經治陽左手關上隂實者肝實也苦肉中痛動善轉筋刺足厥隂經治隂左手關後尺中陽絶者無膀胱脉也苦逆冷婦人月使不調王月則閉男子失精尿有餘瀝刺足少隂經治隂在足内踝下動脉即太谿穴也左手關後尺中陽實者膀胱實也苦逆冷脅下有邪氣相引痛刺足太陽經治陽在足小指外側本節後䧟中即束骨穴也左手關後尺中隂絶者無腎脉也苦足下熱兩髀裏急精氣竭少勞倦所致刺足太陽經治陽左手關後尺中隂實者腎實也苦恍惚健忘目視􅉩􅉩耳聾悵悵善鳴刺足少隂經治隂右手關前寸口陽絶者無太腸脉也苦少氣心下有水氣立秋節即欬刺手太隂經治隂在魚際間即太渊穴也右手關前寸口陽實者大腸實也苦腸中切痛如錐刀所刺無休息時刺手陽明經治陽在手腕中即陽谿穴也右手關前寸口隂絶者無肺脉也苦短氣欬逆喉中塞噫逆刺手陽明經治陽右手關前寸口隂實者肺實也苦少氣匈中滿彭彭與肩相引刺手太隂經治隂右手關上陽絶者無胃脉也苦呑酸頭痛胃中有冷刺足太隂經治隂在足大指本節後一寸即公孫穴也右手關上陽實者胃實也苦腸中伏伏一作愊愊不思食物得食不能消刺足陽明經治陽在足上動脉即衝陽穴也右手關上隂絶者無脾脉也苦少氣下利腹滿身重四胑不欲動善嘔刺足陽明經治陽右手關上隂實者脾實也苦腸中伏伏如堅狀大便難刺足太隂經治隂右手關後尺中陽絶者無子户脉也苦足逆寒絶産帶下無子隂中寒刺足少隂經治隂右手關後尺中陽實者膀胱實也苦少腹滿引腰痛刺足太陽經治陽右手關後尺中隂絶者無腎脉也苦足逆冷上搶􅎍痛夢入水見鬼善厭寐黒色物來掩人上刺足太陽經治陽右手關後尺中隂實者腎實也苦骨疼腰脊痛内寒熱刺足少隂經治隂右脉二十四氣事平人迎神門氣口前後脉第二心實左手寸口人迎以前脉隂實者手厥隂經也病苦閉大便不利腹滿四肢重身熱苦胃脹刺三里心虚左手寸口人迎以前脉隂虚者手厥隂經也病苦悸恐不樂心腹痛難以言心如寒狀恍惚小腸實左手寸口人迎以前脉陽實者手太陽經也病苦身熱熱來去汗出一作汗不出而煩心中滿身重口中生瘡小腸虚左手寸口人迎以前脉陽虚者手太陽經也病苦顱際偏頭痛耳頰痛心小腸俱實左手寸口人迎以前脉隂陽俱實者手少隂與太陽經俱實也病苦頭痛身熱大便難几腹煩滿不得卧以胃氣不轉水榖實也心小腸俱虚左手寸口人迎以前脉隂陽俱虚者手少隂與太陽經俱虚也病苦洞泄苦寒少氣四胑寒腸澼肝實左手關上脉隂實者足厥隂經也病苦心下堅滿常兩脅痛自忿忿如怒狀肝虚左手關上脉隂虚者足厥隂經也病苦脅下堅寒熱腹滿不欲飲食腹脹悒悒不樂婦人月經不利腰腹痛膽實左手關上脉陽實者足少陽經也病苦腹中氣滿飲食不下咽乾頭重痛洒洒惡寒脇痛膽虚左手關上脉陽虚者足少陽經也病苦眩厥痿足指不能揺躄坐不能起僵仆目黃失精􅉩􅉩肝膽俱實左手關上脉隂陽俱實者足厥隂與少陽經俱實也病苦胃脹嘔逆食不消肝膽俱虚左手關上脉隂陽俱虚者足厥隂與少陽經俱虚也病苦恍惚尸厥不知人妄見少氣不能言時時自驚腎實左手尺中神門以後脉隂實者足少隂經也病苦膀胱脹閉少腹與腰脊相引痛左手尺中神門以後脉隂實者足少隂經也病苦舌燥咽腫心煩嗌乾匈脇時痛喘欬汗出小腹脹滿腰背彊急體重骨熱小便赤黃好怒好忘足下熱疼四肢黒耳聾腎虚左手尺中神門以後脉隂虚者足少隂經也病苦心中悶下重足腫不可以按地膀胱實左手尺中神門以後脉陽實者足太陽經也病苦逆滿腰中痛不可俛仰勞也膀胱虚左手尺中神門以後脉陽虚者足太陽經也病苦脚中筋急腹中痛引腰背不可屈伸轉筋惡風偏枯腰痛外踝後痛腎膀胱俱實左手尺中神門以後脉隂陽俱實者足少隂與太陽經俱實也病苦脊彊反折戴眼氣上搶心脊痛不能自反側腎膀胱俱虚左手尺中神門以後脉隂陽俱虚者足少隂與太陽經俱虚也病苦小便利心痛背寒時時少腹滿肺實右手寸口氣口以前脉隂實者手太隂經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀肺虚右手寸口氣口以前脉隂虚者手太隂經也病苦少氣不足以息嗌乾不朝津液大腸實右手寸口氣口以前脉陽實者手陽明經也病苦腹滿善喘欬面赤身熱喉咽一本作咽喉中如核狀大腸虚右手寸口氣口以前脉陽虚者手陽明經也病苦匈中喘腸鳴虚渇脣口乾目急善驚泄白肺大腸俱實右手寸口氣口以前脉隂陽俱實者手太隂與陽明經俱實虚病苦頭痛目眩驚狂喉痺痛手臂捲脣吻不收肺大腸俱虚右手寸口氣口以前脉隂陽俱虚者手太隂與陽明經俱虚也病苦耳鳴嘈嘈時妄見光明情中不楽或如恐怖脾實右手關上脉隂實者足太隂經也病苦足寒脛熱腹脹滿煩擾不得卧脾虚右手關上脉隂虚者足太隂經也病苦泄注腹滿氣逆霍亂嘔吐黃疸心煩不得卧腸鳴胃實右手關上脉陽實者足陽明經也病苦腹中堅痛而熱千金作病苦頭痛汗不出如温瘧脣口乾善􅎪乳癰缺盆腋下腫痛胃虚右手關上脉陽虚者足陽明經也病苦脛寒不得卧惡寒洒洒目急腹中痛虚鳴外臺作耳虚鳴時寒時熱脣口乾面目浮腫脾胃俱實右手關上脉隂陽俱實者足太隂與陽明經俱實也病苦脾脹腹堅搶脇下痛胃氣不轉大便難時反泄利腹中痛上衝肺肝動五藏立喘鳴多驚身熱汗不出喉痺精少脾胃俱虚右手關上脉隂陽俱虚者足太隂與陽明經俱虚也病苦胃中如空狀少氣不足以息四逆寒泄注不巳腎實右手尺中神門以後脉隂實者足少隂經也病苦痺身熱心痛脊脇相引痛足逆熱煩腎虚右手尺中神門以後脉隂虚者足少隂經也病苦足脛小弱惡風寒脉代絶時不至足寒上重下輕行不可以按地少腹脹滿上搶匈脇痛引肋下膀胱實右手尺中神門以後脉陽實者足太陽經也病苦轉胞不得小便頭眩痛煩滿脊背彊膀胱虚右手尺中神門以後脉陽虚者足太陽經也病苦肌肉振動脚中筋急耳聾忽忽不聞惡風颼颼作聲腎膀胱俱實右手尺中神門以後脉隂陽俱實者足少隂與太陽經俱實也病苦癲疾頭重與目相引痛厥欲起走反眼大風多汗腎膀胱俱虚右手尺中神門以後脉隂陽俱虚者足少隂與太陽經俱虚也病苦心痛若下重不自收篡反出時時苦洞泄寒中泄腎心俱痛一說云腎有左右而膀胱無二今用當以左腎合膀胱右腎合三焦平三關病候并治宜第三寸口脉浮中風發熱頭痛宜服桂枝湯葛根湯針風池風府向火灸身摩治風膏覆令汗出寸口脉緊苦頭痛骨肉疼是傷寒宜服麻黃湯發汗針眉衝顳顬摩治傷寒膏寸口脉㣲苦寒爲衂宜服五味子湯摩茱茰膏令汗出寸口脉數即爲吐以有熱在胃管熏匈中宜服藥吐之及針胃管服除熱湯若是傷寒七八日至十日熱在中煩滿渴者宜服知母湯寸口脉緩皮膚不仁風寒在肌肉宜服防風湯以薬薄熨之摩以風膏灸諸治風穴寸口脉滑陽實匈中壅滿吐逆宜服前胡湯針太陽巨闕瀉之寸口脉絃心下愊愊㣲頭痛心下有水氣宜服甘遂圎針期門瀉之寸口脉弱陽氣虚自汗出而短氣宜服茯苓湯内𥙷散適飲食消息勿極勞針胃管𥙷之寸口脉澀是胃氣不足宜服乾地黃湯自養調和飲食針三里𥙷之三里一作胃𬋩寸口脉芤吐血微芤者衂血空虚去血故也宜服竹皮湯黃土湯灸膻中寸口脉伏匈中逆氣噎塞不通是胃中冷氣上衝心匈宜服前胡湯大三建圎針巨闕上管灸膻中寸口脉沉匈中引脅痛匈中有水氣宜服澤漆湯針巨闕瀉之寸口脉濡陽氣弱自汗出是虚損病宜服乾地黃湯著預圎内𥙷散牡蠣散并粉針太衝𥙷之寸口脉遟上焦有寒心痛咽酸吐酸水宜服附子湯生薑湯調和飲食以煖之寸口脉實即生熱在脾肺嘔逆氣塞虚即生寒在脾胃食不消化有熱即宜服竹葉湯葛根湯有寒宜服茱茰圎生薑湯寸口脉細發熱吸吐宜服黃苓龍膽湯吐不止宜服橘皮桔梗湯灸中府寸口脉洪大匈脇滿宜服生薑湯白薇圎亦可紫菀湯下之針上管期門章門右上部寸口十七條關脉浮腹滿不欲食浮爲虚滿宜服平胃圎茯苓湯生薑前胡湯針胃管先瀉後𥙷之關脉緊心下苦滿急痛脉緊者爲實宜服茱茰當歸湯又大黃湯兩治之良針巨闕下管瀉之千金云服茱茰當歸湯又加大黃二兩佳關脉微胃中冷心下拘急宜服附子湯生薑湯附子圎針巨闕𥙷之關脉數胃中有客熱宜服知母圎除熱湯針巨闕上管瀉之關脉緩其人不欲食此胃氣不調脾胃不足宜服平胃圎𥙷脾湯針章門𥙷之關脉滑胃中有熱滑爲熱實以氣滿故不欲食食即吐逆宜服紫菀湯下之大平胃圎針胃管瀉之千金云宜服朴消麻黃湯平胃圎關脉絃胃中有寒心下厥逆此以胃氣虚故爾宜服茱茰湯温調飲食針胃管𥙷之關脉弱胃氣虚胃中有客熱脉弱爲虚熱作病其說云有熱不可大攻之熱去則寒起正宜服竹枽湯針胃管𥙷之關脉濇血氣逆冷脉濇爲血虚以中焦有㣲熱宜服乾地黄湯内𥙷散針足太衝上𥙷之關脉芤大便去血數斗者以膈輸傷故也宜服生地黃并生竹皮湯灸膈輸若重下去血者針關元甚者宜服龍骨圎必愈關脉伏中焦有水氣溏泄宜服水銀圎針關元利小便溏泄便止關脉沈心下有冷氣苦滿呑酸宜服白薇茯苓圎附子湯針胃管𥙷之關脉濡苦虚冷脾氣弱重下病宜服赤石脂湯女萎圎針關元𥙷之關脉遟胃中寒宜服桂枝圎茱茰湯針胃管𥙷之關脉實胃中痛宜服梔子湯茱茰烏頭圎針胃管𥙷之關脉牢脾胃氣塞盛熱即腹滿響響宜服紫菀圎瀉脾圎針灸胃管瀉之關脉細虚腹滿宜服生薑茱茰蜀椒湯白薇圎針炙三管關脉洪胃中熱必煩滿宜服平胃圎針胃管先瀉後𥙷之右中部關脉十八條尺脉浮下熱風小便難宜服瞿麥湯滑石散針横骨關元瀉之尺脉緊臍下痛宜服當歸湯灸天樞針關元𥙷之尺脉㣲厥逆小腹中拘急有寒氣宜服小建中湯一本更有四順湯針氣海尺脉數惡寒臍下熱痛小便赤黃宜服雞子湯白魚散針横骨瀉之尺脉緩脚弱下腫小便難有餘瀝宜服滑石湯瞿麥散針横骨瀉之尺脉滑血氣實婦人經脉不利男子尿血宜服朴消煎大黃湯下去經血鍼關元瀉之尺脉絃小腹疼小腹及脚中拘急宜服建中湯當歸湯針血海瀉之尺脉弱陽氣少發熱骨煩宜服前胡湯乾地黃湯茯苓湯針關元𥙷之尺脉濇足脛逆冷小便赤宜服附子四逆湯針足太衝𥙷之尺脉芤下焦虚小便去血宜服竹皮生地黃湯灸丹田關元亦針𥙷之尺脉伏小腹痛癥疝水榖不化宜服大平胃圎桔梗圎針關元𥙷之桔梗圎一云結腸圎尺脉沈腰背痛宜服腎氣圎針京門𥙷之尺脉濡苦小便難千金云脚不收風痺宜服瞿麥湯白魚散針關元瀉之尺脉遟下焦有寒宜服桂枝圎針氣海關元𥙷之尺脉實小腹痛小便不禁宜服當歸湯加大黃一兩以利大便針關元𥙷之止小便尺脉牢腹滿隂中急宜服葶藶子茱茰圎針丹田關元中極右下部尺脉十六條平竒經八脉病第四脉有竒經八脉者何謂也然有陽維隂維有陽蹻隂蹻有衝有督有任有帶之脉凢此八脉者皆不拘於經故曰竒經八脉也經有十二絡有十五凢二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不虞天雨降下溝渠溢滿滂沛妄行當此之時聖人不能復圖也此絡脉流溢諸經不能復拘也竒經八脉者旣不拘於十二經皆何起何繫也然陽維者起扵諸陽之㑹隂維者起於諸隂之交陽維隂維者維絡于身溢畜不能環流漑灌諸經者也陽蹻者起於跟中循外踝而上行入風池隂蹻者亦起於跟中循内踝而上行至咽喉交貫衝􆄪衝脉者起於關元循腹裏直上至咽喉中一云衝脉者起於氣衝並陽明之經夾臍上行至匈中而散也督脉者起於下極之輸並於脊裏循背上至風府衝脉者隂脉之海也督脉者陽脉之海也任脉者起於胞門子户夾臍上行至匈中一云任脉者起於中極之下以上毛際循腹裏上関元至喉咽帶脉者起於季肋難經作季脅廻身一周此八者皆不繫於十二經故曰竒經八脉者也竒經之爲病何如然陽維維於陽隂維維於隂隂陽不能相維悵然失志容容難經作溶溶不能自收持悵然者其人驚即維脉緩緩即令身不能自收持即失志善忘恍惚也陽維爲病苦寒熱隂維爲病苦心痛陽維為衛衛爲寒熱隂維爲榮榮為血血者主心故心痛也隂蹻爲病陽緩而隂急隂蹻在内踝病即其脉急當從内踝以上急外踝以上緩陽蹻爲病隂緩而陽急陽蹻在外踝病即其病急其人當從外踝以上急內踝以上緩衝之爲病逆氣而裏急衝脉從関元至咽喉故其爲病逆氣而裏急督之爲病脊彊而厥督脉在背病即其脉急故令脊彊也任之爲病其内苦結男子爲七疝女子爲瘕聚任脉起於胞門子户故其病結爲七病瘕聚帶之爲病苦腹滿腰容容難經作溶溶若坐水中狀帶脉者廻帶人之身體病即其脉緩故令腰容容也此竒經八脉之爲病也診得陽維脉浮者蹔起目眩陽盛實苦肩息洒洒如寒診得隂維脉沈大而實者苦匈中痛脇下支滿心痛診得隂維如貫珠者男子兩脇實腰中痛女子隂中痛如有瘡狀診得帶脉左右遶臍腹腰脊痛衝隂股也兩手脉浮之俱有陽沈之俱有隂隂陽皆實盛者此爲衝督之脉也衝督之脉者十二經之道路也衝督用事則十二經不復朝於寸口其人皆苦恍惚狂疑不者必當由豫有兩心也兩手陽脉浮而細㣲綿綿不可知俱有隂脉亦復細綿綿此爲隂蹻陽蹻之脉也此家曽有病鬼魅風死苦恍惚亡人爲禍也診得陽蹻病拘急隂蹻病緩尺寸俱浮直上直下此爲督脉腰背強病不得俛仰大人癲病小人風癎疾脉來中央浮直上下痛者督脉也動苦腰背膝寒大人癲小兒癎也灸頂上三圎正當頂上尺寸脉俱牢一作芤直上直下此爲衝脉匈中有寒疝也脉來中央堅實徑至關者衝脉也動苦少腹痛上搶心有瘕疝絶孕遺失溺脇支滿煩也横寸口邊丸丸此爲任脉苦腹中有氣如指上搶心不得俛仰拘急脉來緊細實長至關者任脉也動苦少腹繞臍下引横骨隂中切痛取臍下三寸新刋王氏脉經卷第二
