front:
  text: 新刋王氏脉經卷第五
  hash: sha256:2d278ec2a0303a4bb9a955a4e05aec11d166a631890cdf5e798ea34dcf6677c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0009_SBCK_005-1a}
body:
  text: 朝散大夫守光禄卿直秘閣判登聞檢院上護軍臣林億等類次張仲景論脉第一扁鵲隂陽脉法第二扁鵲脉法第三扁鵲華佗察聲色要訣第四扁鵲診諸反逆死脉要訣第五張仲景論脉第一脉有三部隂陽相乗榮衛氣血在人躰躬千金作而行人躬呼吸出入上下於中因息遊布津液流通隨時動作俲象形容春弦秋浮冬沉夏洪察色觀脉大小不同一時之間変無經常尺寸參差死短或長上下乖錯或存或亡病輙改易進退低昻心迷意惑動失紀綱願爲縷陳令得分明師曰子之所問道之根源脉有三部尺寸及関榮衞流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入昇降漏刻周旋水下二刻臣億等詳水下二刻疑撿舊本如此脉一周身旋復寸口虚實見焉変化相乗隂陽相干風則浮虚寒則緊弦沈潜水滀支飲急弦動弦爲痛數洪熱煩設有不應知変所縁三部不同病各異端太過可怪不及亦然邪不空見終必有奸審審表裏三焦别分知邪所舎消息診看料度腑藏獨見若神爲子條記傳與賢人扁鵲隂陽脉法第二脉平旦曰太陽日中見陽明晡時曰少陽黄昏曰少隂夜半曰大隂雞鳴曰厥隂是三隂三陽時也少陽之脉乍小乍大乍長乍短動揺六分王十一月甲子夜半正月二月甲子王太陽之脉洪大以長其來浮於筋上動揺九分三月四月甲子王陽明之脉浮大以短動揺三分大前小後狀如科斗其至跳五月六月甲子王少隂之脉緊細動揺六分王五月甲子日中七月八月甲子王太隂之脉緊細以長乗於筋上動揺九分九月十月甲子王厥隂之脉沈短以緊動揺三分十一月十二月甲子王厥隂之脉急弦動揺至六分巳上病遟脉寒少腹痛引腰形喘者死脉緩者可治刺足厥隂入五分少陽之脉乍短乍長乍大乍小動揺至六分巳上病頭痛脇下滿嘔可治擾即死一作傴可治偃即死刺兩季肋端足少陽也入七分陽明之脉洪大以浮其來滑而跳大前細后狀如科斗動揺至三分巳上病眩頭痛腹滿痛嘔可治擾即死刺臍上四寸臍下三寸各六分從二月至八月陽脉在表從八月至正月陽脉在裏附陽脉強附隂脉弱至即驚实則痸瘲細而沈不痸瘲即泄泄即煩煩即渴渴即腹滿滿即擾擾即腸澼澼即脉代乍至乍不至大而沈即欬欬即上氣上氣甚則肩息肩息甚則口舌血出血出甚即鼻血出変出寸口隂陽表裏以互相乗如風有道隂脉乗陽也寸口中前後溢者行風寸口中外实因不滿者三風四温寸口者勞風勞風者大病亦發駃行汗出亦發耎風者上下㣲㣲扶骨是其診也表緩腹内急者耎風也猥雷實夾者飄風從隂趨陽者風邪一來調一來速鬼邪也隂緩陽急者表有風來入藏也隂急者風巳抱陽入腹上逯逯下宛宛不能至陽流飲也上下血微隂強者爲漏僻陽強者酒僻也傴偷不過微反陽澹漿也隂扶骨絶者從寸口前頓趣於隂汗水也來調四布者欲病水也隂脉不偷陽脉傷復少津寸口中後大前兊至陽而實者僻食小過陽一分者七日僻二分者十日僻三分者十五日僻四分者二十日僻四分中伏不過者半歲僻敦敦不至胃隂一分飲餔餌僻也外勾者乆僻也内卷者十日以還外強内弱者裹大核也并浮而弦者汁核并浮緊而數如沈病暑食粥一作㣲有内緊而伏麥飰若餅寸口脉倚陽緊細以微瓜菜皮也若倚如緊薺藏菜也賾賾無數生肉僻也附陽者灸肉僻也小倚生浮大如故生麥豆也扁鵲脉法第三扁鵲曰人一息脉二至謂平脉體形無苦人一息脉三至謂病脉一息四至謂痺者脫脉氣其眼睛青者死人一息脉五至以上死不可治也都一作聲息病脉來動取極五至病有六七至也扁鵲曰平和之氣不緩不急不滑不濇不存不亡不短不長不俛不仰不從不横此謂平脉腎一作緊受如此一作剛身無苦也扁鵲曰脉氣弦急病在肝少食多厭裏急多言頭眩目痛腹滿筋攣癲疾上氣少腹積堅時時唾血咽喉中乾相病之法視色聽聲觀病之所在候脉要訣豈不㣲乎脉浮如數無熱者風也若浮如數而有熱者氣也脉洪大者又兩乳房動脉復數加有寒熱此傷寒病也若羸長病如脉浮溢寸口復有㣲熱此疰氣病也如復欬又多熱乍劇乍差難治也又療無劇者易差不欬者易治也扁鵲華佗察聲色要訣第四病人五藏巳奪神明不守聲嘶者死病人循衣縫譫言者不可治病人隂陽俱絶掣衣掇空妄言者死病人妄語錯亂及不能語者不治熱病者可治病人隂陽俱絶失音不能言者三日半死病人兩目眥有黃色起者其病方愈病人面黃目青者不死青如草滋死病人面黃目赤者不死赤如衃血死病人面黃目白者不死白如枯骨死病人面黃目黒者不死黒如炲死病人面目俱等者不死病人面黒目青者不死病人面青目白者死病人面黒目白者不死病人面赤目青者六日死病人面黃目青者九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則爲青雖有天救不可復生病人面赤目白者十日死憂恚思慮心氣内索面色反好急求棺槨病人面白目黒者死此謂榮華巳去血脉空索病人面黒目白者八日死腎氣内傷病因留積病人面青目黃者五日死病人著牀心痛短氣脾竭内傷百日復愈能起傍徨因坐於地其亡倚牀能治此者可謂神良病人面無精光若土色不受飲食者四日死病人目無精光及牙齒黒色者不治病人耳目鼻口有黒色起入于口者必死病人耳目及顴頰赤者死在五日中病人黒色出於額上髮際下直鼻脊兩顴上者亦死在五日中病人黒氣出天中下至年上顴上者死病人及健人黒色若白色起入目及鼻口死在三日中病人及健人靣忽如馬肝色望之如青近之如黒者死病人面黒目直視惡風者死病人面黒脣青者死病人面青脣黒者死病人面黒兩脇下滿不能自轉反者死病人面回回直視肩息者一日死病人頭目乆痛卒視無所見者死病人隂結陽絶目精脫恍惚者死病人隂陽絶竭目眶䧟者死病人眉系傾者七日死病人口如魚口不能復閉而氣出多不反者死病人口張者三日死病人脣青人中反三日死病人脣反人中反者死病人脣口忽乾者不治病人脣腫齒焦者死病人隂陽俱竭其齒如熟小豆其脉駃者死病人齒忽變黒者十三日死病人舌卷夘縮者必死病人汗出不流舌卷黒者死病人髮直者十五日死病人髮如乾麻善怒者死病人髮與眉衝起者死病人爪甲青者死病人爪甲白者不治病人手足爪甲下肉黒者八日死病人榮衞竭絶面浮腫者死病人卒腫其面蒼黒者死病人手掌腫無文者死病人臍腫反出者死病人隂囊莖俱腫者死病人脉絶口張足腫五日死病人足趺上腫兩膝大如斗者十日死病人卧遺屎不覺者死病人尸臭者不可治肝病皮黒肺之日庚辛死心病目黒腎之日壬癸死脾病脣青肝之日甲乙死肺病頰赤目腫心之日丙丁死腎病面腫脣黄脾之日戊己死青欲如蒼璧之澤不欲如藍赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽黒欲重漆不欲如炭黃欲如羅裹雄黃不欲如黃土目色赤者病在心白在肺黒在腎黃在脾青在肝黃色不可名者病胷中診目病赤脉從上下者太陽病也從下上者陽明病也從外入内者少陽病也診寒熱瘰􅊓目中有赤脉從上下至瞳子見一脉一歲死見一脉半一歲半死見二脉二歲死見二脉半二歲半死見三脉三歲死診齲齒痛按其陽明之脉來有過者獨熱在右右熱在左左熱在上上熱在下下熱診血者脉多赤多熱多青多痛多黒爲乆痺多赤多黒多青皆見者寒熱身痛面色㣲黃齒垢黃爪甲上黃黃疸也安卧少黃赤脉小而濇者不嗜食扁鵲診諸反逆死脉要訣第五扁鵲曰夫相死脉之氣如群鳥之聚一馬之馭系水交馳之狀如懸石之落出筋之上藏筋之下堅關之裏不在榮衞伺候交射不可知也脉病人不病脉來如屋漏雀啄者死屋漏者其來旣絶而止時時復起而不相連属也雀啄者脉來甚數而疾絶上復頓來也又經言得病七八日脉如屋漏雀啄者死肺彈人手如黍米也脉來如彈石去如解索者死彈石者辟辟急也觧索者動數而隨散亂無復次緒也脉困病人脉如蝦之游如魚之翔者死蝦游者苒苒而起尋復退没不知所在乆乃復起起輒遟而没去速者是也魚翔者似魚不行而但掉尾動頭身揺而乆住者是也脉如懸薄卷索者死脉如轉豆者死脉如偃刀者死脉涌涌不去者死脉忽去忽來暫止復來者死脉中侈者死脉分絶者死上下分散也脉有表無裏者死經名曰結去即死何謂結脉在指下如麻子動揺属腎名曰結去死近也脉五來一止不復増减者死經名曰代何謂代脉五來一止也脉七來是人一息半時不復増减亦名曰代正死不疑經言病或有死或有不治自愈或有連年月而不巳其死生存亡可切脉而知之邪然可具知也設病者若閉目不欲見人者脉當得肝脉弦急而長反得肺脉浮短而濇者死也病若開目而渴心下牢者脉當得緊實而數反得沈滑而㣲者死病若吐血復􅍠衂者脉當得沈細而反浮大牢者死病若譫言妄語身當有熱脉當洪大而反手足四逆脉反沈細微者死病若大腹而洩脉當微細而澀反得緊大而滑者死此之謂也經言形脉與病相反者死柰何然病若頭痛目痛脉反短濇者死之病若腹痛脉反浮大而長者死病若腹滿而喘脉反滑利而沈者死病若四肢厥逆脉反浮大而短者死病若耳聾脉反浮大而濇者死千金翼云脉大者生沈遟細者難治病若目􅉩􅉩脉反大而緩者死左有病而右痛右有病而左痛下有病而上痛上有病而下痛此爲逆逆者死不可治脉來沈之絶濡浮之不止推手者半月死一作半日脉來微細而絶者人病當死人病脉不病者生脉病人不病者死人病尸厥呼之不應脉絶者死脉當大反小者死肥人脉細小如絲欲絶者死羸人得躁脉者死人身澀而脉來往滑者死人身滑而脉來往澀者死人身小而脉來往大者死人身短而脉來往長者死人身長而脉來往短者死人身大而脉來往小者死尺脉不應寸時如馳半日死千金云尺脉上應寸口太遟者半日死肝脾俱至則榖不化肝多即死肺肝俱至則癰疽四胑重肺多即死心肺俱至則痺消渴懈怠心多即死腎心俱至則難以言九竅不通四肢不舉腎多即死脾腎俱至則五藏敗壞脾多即死肝心俱至則熱甚痸瘲汗不出妄見邪肝腎俱至則疝瘕少腹痛婦人月使不來肝滿腎滿肺滿皆實則爲腫肺之雍喘而兩胠滿肝雍兩胠滿卧則驚不得小便腎雍脚下至小腹滿脛有大小髀胻大跛易偏枯心肺滿大癎痸筋攣肝脉小急癎痸筋攣肝脉騖暴有所驚駭脉不至若瘖不治自巳腎脉小急肝脉小急心脉小急不鼓皆爲瘕腎脉并沈爲石水并浮爲風水并虚爲死并小弦欲驚腎脉大急沈肝脉大急沈皆爲疝心脉搏滑急爲心疝肺脉沈搏爲肺疝脾脉外鼓沈爲腸澼乆自巳肝脉小緩爲腸澼易治腎脉小搏沈爲腸澼下血血温身熱者死心肝澼亦下血二藏同病者可治其脉小沈濇者爲腸澼其身熱者死熱見七日死胃脉沈鼓濇胃外鼓大心脉小緊急皆膈偏枯男子發左女子發右不瘖舌轉可治三十日起其順者瘖三歲起年不滿二十者三歲死脉至而搏血衂身有熱者死脉來如懸鈎浮爲熱脉至如喘名曰氣厥氣厥者不知與人言素問甲乙作暴厥脉至如數使人暴驚三四日自巳脉至浮合浮合如數一息十至十至以上是爲經氣予不足也微見九十日死脉至如火新然是心精之予奪也草乾而死脉至如散葉是肝氣予虚也木葉落而死木葉落作棗革脉至如省客省客者脉塞而鼓是腎氣予不足也懸去棗華而死脉至如泥丸是胃精予不足也榆莢落而死素問莢作葉脉至如橫格是膽氣予不足也禾熟而死脉至如弦縷是胞精予不足也病善言下霜而死不言可治脉至如交漆者左右傍至也微見四十日死甲乙作交棘脉至如涌泉浮鼓肌中是太陽氣予不足也少氣味韭英而死脉至委委土素問作頽土之狀按之不得是肌氣予不足也五色先見黒白壘一作藟發死脉至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死脉至如偃刀偃刀者浮之小急也按之堅大急五藏菀熟寒熱獨并於腎也如此其人不得坐立春而死脉至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脉至如舂者令人善恐不欲坐卧行立常聽是小腸氣予不足也季秋而死問曰甞以春二月中脉一病人其脉反沈師記言到秋當死其病反愈到七月復病因往脉之其脉續沈復記言至冬死問曰二月中得沈脉何以故處之至秋死也師曰二月之時其脉自當濡弱而弦得沈脉到秋自沈脉見浮即死故知到秋當死也七月之時脉復得沈何以處之至冬當死師曰沈脉屬腎其藏脉也非時妄見經言王相囚死冬脉本王脉不再見故知至冬當死也然後至冬復病王以冬至日死故知爲諦華佗傚此新刋王氏脉經卷第五
