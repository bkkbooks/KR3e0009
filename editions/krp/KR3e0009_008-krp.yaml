body:
  text: 臣林億等類次平卒尸厥脉證第一平痓濕暍脉證第二平陽毒隂毒百合狐惑脉證第三平霍亂轉筋脉證第四平中風歴節脉證第五平血痺虚勞脉證第六平消渴小便利淋脉證第七平水氣黄汗氣分脉證第八平黄疸寒熱瘧脉證第九平匈痺心痛短氣賁豚脉證第十平腹滿寒疝宿食脉證第十一平五藏積聚脉證第十二平驚悸衂吐下血匈滿瘀血脉證第十三平嘔􅎪下痢脉證第十四平肺痿肺癰欬逆上氣喘飲脉證第十五平癰腫腸癰金瘡侵淫脉證第十六平卒尸厥脉證第一寸口沈大而滑沈則爲實滑則爲氣實氣相摶血氣入於藏即死入於腑即愈此爲卒厥不知人脣青身冷爲入藏即死如身温和汗自出爲入腑而復自愈平痓濕暍脉證第二痓一作痙太陽病發熱無汗而反惡寒者名剛痓太陽病發熱汗出而不惡寒者名柔痓一云惡寒大陽病發熱其脉沈而細者爲痓太陽病發其汗因致痓論云發其汗太多因致痓病者身熱足寒頸項強急惡寒時頭熱面赤目脉赤獨頭動揺者爲痓論云獨頭靣摇卒口禁背反張者痓病也太陽病無汗而小便反少氣上衝匈口噤不得語欲作剛痓葛根湯主之剛痓爲病匈滿口噤臥不著席脚攣急其人必齘齒可與大承氣湯痓病發其汗巳其脉浛浛如蛇暴腹脹大者爲欲觧脉如故反伏弦者必痓一云痓脉出欲巳痓脉來按之築築而弦直上下行痓家其脉伏堅直上下夫風病下之則痓復發其汗必拘急太陽病其證備身體強几几然脉沈遟此爲痓栝楼桂枝湯主之痓病有灸瘡難療瘡家雖身疼痛不可發其汗汗出則痓太陽病關節疼痛脉沈而緩者爲中濕論云中􅊜爲􅊜痺之候其人小便不利大便反快但當利其小便病者一身盡疼一云疼煩發熱日晡即劇此爲風濕汗出所致也論云此病傷於汗出當風或乆傷取冷所致濕家之爲病一身盡疼發熱而身色熏黄也濕家之爲病其人但頭汗出而背強欲得𬒳覆向火若下之早則􅎪或匈滿小便利一云不利舌上如胎此爲丹田有熱匈上有寒渴欲飲而不能飲則口燥也濕家下之額上汗出㣲喘小便利一云不利者死若下利不止者亦死問曰風濕相摶身體疼痛法當汗出而觧值天隂雨不止師云此可發汗而其病不愈者何也荅曰發其汗汗大出者但風氣去濕氣續在是故不愈若治風濕者發其汗微微似欲出汗首則風濕俱去也濕家身煩疼可與麻黄湯加术四兩發其汗爲宜愼不可以火攻之風濕脉浮身重汗出惡風者防己湯主之病人喘頭痛鼻塞而煩其脉大自能飲食腹中和無病病在頭中寒濕故鼻塞内藥鼻中即愈論云􅊜家病身疼痛發熱靣黄而喘頭痛鼻窒而煩傷寒八九日風濕相摶身體疼痛不能自轉側不嘔不渴脉浮虚而澀者桂枝附子湯主之若其人大便鞕小便自利者术附子湯主之風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身㣲腫者甘草附子湯主之太陽中熱暍是也其人汗出惡寒身熱而渴也白虎湯主之太陽中暍身熱疼痛而脉㣲弱此以夏月傷冷水水行皮膚中所致也瓜蔕湯主之太陽中暍發熱惡寒身重而疼痛其脉弦細芤遟小便巳洒洒然毛聳手足逆冷小有勞身熱口前開板齒燥若發其汗惡寒則甚加温針則發熱益甚数下之淋復甚平陽毒隂毒百合狐惑脉證第三陽毒爲病身重腰背痛煩悶不安狂言或走或見鬼或吐血下痢其脉浮大数靣赤斑斑如錦文喉咽痛唾膿血五日可治至七日不可治也有傷寒一二日便成陽毒或服藥吐下後變成陽毒升麻湯主之隂毒爲病身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆脣青面黒四肢厥冷其脉沈細緊数身如𬒳打五六日可治至七日不可治也或傷寒𥘉病一二日便結成隂毒或服藥六七日以上至十日變成隂毒甘草湯主之百合之爲病其狀常黙黙欲臥復不能臥或如強健人欲得出行而復不能行意欲得食復不能食或有美時或有不用聞飲食臭時如寒無寒如熱無熱朝至口苦小便赤黄身形如和其脉㣲数百脉一宗悉病各隨證治之百合病見於隂者以陽法救之見於陽者以隂法救之見陽攻隂復發其汗此爲逆其病難治見隂攻陽乃復下之此亦爲逆其病難治千金方云見在於隂而攻其陽則隂不得觧也復發其汗爲逆也見在於陽而攻其隂則陽不得觧也復下之其病不愈狐惑爲病其氣如傷寒黙黙欲眠目不得閉臥起不安蝕於喉爲惑蝕於隂爲狐狐惑之病並不欲飲食聞食臭其面目乍赤乍白乍黒其毒蝕於上者則聲喝其毒蝕下部者咽乾蝕於上部瀉心湯主之蝕於下部苦參湯淹洗之蝕於肛者雄黄熏之其人脉数無熱㣲煩黙黙欲卧汗出𥘉得三四日目赤如鳩眼得之七八日目四眥黄黒若能食者膿巳成也赤小豆當歸散主之病人或從呼吸上蝕其咽或從下膲蝕其肛隂蝕上爲惑蝕下爲狐狐惑病者猪苓散主之平霍亂轉筋脉證第四問曰病有霍亂者何師曰嘔吐而利此爲霍亂問曰病者發熱頭痛身體疼惡寒而復吐利當属何病師曰當爲霍亂霍亂吐利止而復發熱也傷寒其脉㣲澀夲是霍亂今是傷寒却四五日至隂經上轉入隂必吐利轉筋爲病其人臂脚直脉上下行㣲弦轉筋入腹雞屎白散主之平中風歷節脉證第五夫風之爲病當半身不遂或但臂不遂者此爲痺脉㣲而数中風使然頭痛脉滑者中風風脉虚弱也寸口脉浮而緊緊則爲寒浮則爲虚虚寒相摶邪在皮膚浮者血虚絡脉空虚賊邪不瀉或左或右邪氣反緩正氣則急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經則重不勝邪入於腑則不識人邪入於藏舌即難言口吐於涎寸口脉遟而緩遟則爲寒緩則爲虚榮緩則爲亡血衛遟則爲中風邪氣中經則身癢而癮疹心氣不足邪氣入中則匈滿而短氣趺陽脉浮而滑滑則榖氣實浮則汗自出少隂脉浮而弱弱則血不足浮則爲風風血相摶則疼痛如掣盛人脉濇小短氣自汗出歴節疼不可屈伸此皆飲酒汗出當風所致也寸口脉沈而弱沈則主骨弱則主筋沈則爲腎弱則爲肝汗出入水中如水傷心歴節黄汗出故曰歴節也味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相摶名曰断泄榮氣不通衛不獨行榮衛俱㣲三膲無所御四属断絶身體羸瘦獨足腫大黄汗出脛冷假令發熱便爲歴節也病歴節疼痛不可屈伸鳥頭湯主之諸肢節疼痛身體魁漯脚腫如脫頭眩短氣温温欲吐桂枝芍藥知母湯主之平血痺虚勞脉證第六問曰血痺從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動揺加𬒳㣲風遂得之形如風狀巢原云其狀如𬒳㣲風所吹但以脉自㣲濇在寸口關上小緊冝針引陽氣令脉和緊去則愈血痺隂陽俱㣲寸口関上㣲尺中小緊外證身體不仁如風狀黄耆桂五物湯主之夫欲治病當先知其證何趣乃當攻之耳男子平人脉大爲勞極虚亦爲勞男子勞之爲病其脉浮大手足暖春夏劇秋冬差隂寒精自出酸削不能行少隂虚滿人年五十六十其脉浮大者痺俠背行苦腸鳴馬刀俠嬰者皆爲勞得之男子平人脉虚弱細㣲者喜盜汗出也男子面色薄者主渇及亡血卒喘悸其脉浮者裏虚也男子脉虚沈弦無寒熱短氣裏急小便不利而色白時時目瞑此人喜衂少腹滿此爲勞使之然男子脉㣲弱而澀爲無子精氣清冷夫失精家少腹弦急隂頭寒目睢痛一云目眩髪落脉極虚芤遟爲清榖亡血失精脉得諸芤動㣲緊男子失精女子夢交通桂枝加龍骨牡蠣湯主人脉沈小遟名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也脉弦而大弦則爲减大則爲芤减則爲寒芤則爲虚寒虚相摶此名爲革婦人則半産漏下男子則亡血失精平消渴小便利淋脉證第七師曰厥隂之爲病消渴氣上衝心心中疼熱飢而不欲食食即吐下之不肯止寸口脉浮而遟浮則爲虚遟則爲勞虚則衛氣不足遟則榮氣竭趺陽脉浮而数浮則爲氣数則消榖而緊要畧緊作大堅氣盛則溲数溲数則緊要畧作堅緊数相摶則爲消渴男子消渴小便反多以飲一斗小便一斗腎氣圎主之師曰熱在一作結下膲則溺血亦令人淋閉不通淋之爲病小便如粟狀少腹弦急痛引臍中寸口脉細而数数則爲熱細則爲寒数爲強吐趺陽脉数胃中有熱則消榖引食大便必堅小便則数少隂脉数婦人則隂中生瘡男子則氣淋淋家不可發汗發汗則必便血平水氣黃汗氣分脉證第八師曰病有風水有皮水有正水有石水有黄汗風水其脉自浮外證骨節疼痛其人惡風皮水其脉亦浮外證胕腫按之没指不惡風其腹如鼓如鼓一作如故不滿不渴當發其汗正水其脉沈遟外證自喘石水其脉自沈外證腹滿不喘黄汗其脉沈遟身體發熱匈滿四肢頭面腫乆不愈必致癰膿脉浮而洪浮則爲風洪則爲氣風氣相摶風強則爲癮疹身體爲癢癢爲泄風乆爲痂癩氣強則爲水難以俛仰風氣相擊身體洪腫汗出乃愈惡風則虚此爲風水不惡風者小便通利上膲有寒其口多涎此爲黄汗寸口脉沈滑者中有水氣面目腫大有熱名曰風水視人之目裹上微擁如新臥起狀其頸脉動時時欬按其手足上䧟而不起者風水太陽病脉浮而緊法當骨節疼痛而反不疼身體反重而酸其人不渴汗出即愈此爲風水惡寒者此爲極虚發汗得之渴而不惡寒者此爲皮水身腫而冷狀如周痺匈中窒不能食反聚痛暮躁不眠此爲黄汗痛在骨節欬而喘不渴者此爲脾脹其形如腫發汗即愈然諸病此者渴而下利小便数者皆不可發汗風水其脉浮浮爲在表其人能食頭痛汗出表無佗病病者言但下重故從腰以上爲和腰以下當腫及隂難以屈伸防巳黄耆湯主之一云風水脉浮身重汗出惡風者防已黄耆湯主之風水惡風一身悉腫脉浮不渴續自汗出而無大熱者越婢湯主之師曰裹水者一身面目洪腫其脉沈小便不利故令病水假如小便自利亡津液故令渴也越婢加术湯主之一云皮水其脉沈頭面浮腫小便不利故令病水假令小便自利亡津液故令渴也皮水之爲病四肢腫水氣在皮膚中四肢聶聶動者防巳茯苓湯主之趺陽脉當伏今反緊本自有寒疝瘕腹中痛醫反下之下之則匈滿短氣趺陽脉當伏今反数本自有熱消榖一作消渴小便数今反不利此欲作水寸口脉浮而遟浮脉熱遟脉潜熱潜相摶名曰沈趺陽脉浮而数浮脉熱数脉止熱止相摶名曰伏沈伏相搏名曰水沈則絡脉虚伏則小便難虚難相摶水走皮膚則爲水矣寸口脉弦而緊弦則衛氣不行衛氣不行則惡寒水不沾流走在腸間少隂脉緊而沈緊則爲痛沈則爲水小便即難師曰脉得諸沈者當責有水身體腫重水病脉出者死夫水病人目下有卧𧖟面目鮮澤脉伏其人消渴病水腹大小便不利其脉沈絶者有水可下之問曰病下利後渴飲水小便不利腹滿因腫者何也荅曰此法當病水若小便自利及汗出者自當愈水之爲病其脉沈小属少隂浮者爲風無水虚脹者爲氣水發其汗即巳沈者與附子麻黄湯浮者與杏子湯心水者其身重而少氣不得卧煩而躁其隂大腫肝水者其腹大不能自轉側脇下腹中痛時時津液微生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷面又痩一云大便反堅師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈師曰寸口脉沈而遟沈則爲水遟則爲寒寒水相摶趺陽脉伏水榖不化脾氣衰則鶩溏胃氣衰則身腫少陽脉卑少隂脉細男子則小便不利婦人則經水不通經爲血血不利則爲水名曰血分一云水分問曰病者若水面目身體四肢皆腫小便不利師脉之不言水反言匈中痛氣上衝咽狀如炙肉當㣲欬喘審如師言其脉何類師曰寸口脉沈而緊沈爲水緊爲寒沈緊相摶結在関元始時當㣲年盛不覺陽衰之後榮衛相干陽損隂盛結寒㣲動緊氣上衝喉咽塞噎脇下急痛醫以爲留飲而大下之氣擊不去其病不除後重吐之胃家虚煩咽躁欲飲水小便不利水榖不化面目手足浮腫又與葶􅏣丸下水當時如小差食飲過度腫復如前匈脇苦痛象若奔豚其水揚溢則浮欬喘逆當先攻擊衝氣令止乃治欬欬止自喘自差先治新病病當在後黄汗之病身體洪腫一作重發熱汗出而渇而渇一作不渇狀如風水汗沾衣色正黄如蘗汗其脉自沈問曰黄汗之病從何得之師曰以汗出入水中浴水從汗孔入得之黄耆芍藥桂枝苦酒湯主之黄汗之病兩脛自冷假令發熱此属歴節食巳汗出又身常暮卧盗汗出者此勞氣也若汗出巳反發熱者乆乆其身必甲錯發熱不止者必生惡瘡若身重汗出巳輙輕者乆乆必身瞤瞤則匈中痛又從腰以上必汗出下無汗腰寛弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此爲黄汗桂枝加黄耆湯主之寸口脉遟而濇遟則爲寒濇爲血不足趺陽脉㣲而遟㣲則爲氣遟則爲寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脇嗚相逐氣轉膀胱榮衛俱勞陽氣不通則身冷隂氣不通則骨疼陽前通則惡寒隂前通則痺不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虚則遺溺名曰氣分氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻黄細辛附子湯主之心下堅大如盤邊如旋盤水飲所作枳實术湯主之平黄疸寒熱瘧脉證第九凡黄候其寸口脉近掌無脉口鼻冷並不可治脉沈渇欲飲水小便不利者皆發黄腹滿舌痿黄躁不得睡属黄家師曰病黄疸發熱煩喘匈滿口躁者以發病時火刼其汗兩熱所得然黄家所得從濕得之一身盡發熱而黄肚熱熱在裏當下之師曰黄疸之病當以十八日爲期治之十日以上爲差反劇爲難治又曰疸而渇者其疸難治疸而不渇者其疸可治發於隂部其人必嘔發於陽部其人振寒而發熱也師曰諸病黄家但利其小便假令脉浮當以汗觧之宜桂枝加黃耆湯又男子黄小便自利當與小建中湯黃疸腹满小便不利而赤自汗出此爲表和裏實當下之宜大黃黄蘗梔子芒消湯黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必􅎪􅎪者小半夏湯主之夫病酒黃疸必小便不利其喉心中熱足下熱是其證也心中懊憹而熱不能食時欲吐名曰酒疸酒黃疸者或無熱靖言了了腹滿欲吐鼻燥其脉浮者先吐之沈弦者先下之酒疸心中熱欲嘔者吐之即愈酒疸黃色心下結熱而煩酒疸下之乆乆爲黒疸目青面黒心中如噉蒜虀狀大便正黒皮膚爪之不仁其脉浮弱雖黒㣲黄故知之寸口脉㣲而弱㣲則惡寒弱則發熱當發不發骨節疼痛當煩不煩而極汗出趺陽脉緩而遟胃氣反強少隂脉㣲㣲則傷精隂氣寒冷少隂不足榖氣反強飽則煩滿滿則發熱客熱消榖發巳復飢熱則腹滿㣲則傷精榖強則瘦名曰榖寒熱陽明病脉遟者食難用飽飽則發煩頭眩者必小便難此欲作榖疸雖下之腹滿如故所以然者脉遟故也師曰寸口脉浮而緩浮則爲風緩則爲痺痺非中風四肢苦煩脾色必黃瘀熱以行趺陽脉緊而數數則爲熱熱則消榖緊則爲寒食即滿也尺脉浮爲傷腎趺陽脉緊爲傷脾風寒相搏食榖則眩榖氣不消胃中苦濁濁氣下流小便不通隂彼其寒熱流膀胱身體盡黃名曰榖疸額上黒㣲汗出手足中熱薄暮則發膀胱急小便自利名曰女勞疸腹如水狀不治黄家日晡所發熱而反惡寒此爲女勞得之膀胱急少腹滿身盡黄額上黒足下熱因作黒疸其腹脹如水狀大便必黒時溏此女勞之病非水也腹滿者難治消石礬石散主之夫瘧脉自弦也弦數者多熱弦遟者多寒弦小緊者可下之弦遟者可温藥若脉緊數者可發汗針灸之浮大者吐之脉弦數者風發也以飲食消息止之瘧病結爲癥瘕名曰瘧母鼈甲煎圎主之瘧但見熱者温瘧也其脉平身無寒但熱骨節疼煩時嘔朝發暮解暮發朝解名曰温瘧白虎加桂枝湯主之瘧多寒者牡瘧也蜀漆散主之平匈痺心痛短氣賁豚脉證第十師曰夫脉當取太過與不及陽㣲隂弦則匈痺而痛所以然者責其極虚也今陽虚知在上膲所以匈痺心痛者以其脉隂弦故也匈痺之病喘息欬唾匈背痛短氣寸口脉沈而遟關上小緊數者栝樓薤白白酒湯主之平人無寒熱短氣不足以息者實也賁豚病者從少腹起上衝咽喉發作時欲死復止皆從驚得其氣上衝匈腹痛及往來寒熱賁豚湯主之師曰病有賁豚有吐膿有驚怖有火邪此四部病皆從驚發得之平腹滿寒疝宿食脉證第十一趺陽脉㣲弦法當腹滿不滿者必下部閉塞大便難兩胠一云脚疼痛此虚寒從下上也當以温藥服之病者腹滿按之不痛爲虚痛者爲實可下之舌黄未下者下之黄自去腹滿時減減復如故此爲寒當與温藥趺陽脉緊而浮緊則爲痛浮則爲虚虚則腸鳴緊則堅滿雙脉弦而遟者必心下堅脉大而緊者陽中有隂也可下之病腹中滿痛爲實當下之腹滿不減減不足言當下之病腹滿發熱数十日脉浮而数飲食如故厚朴三物湯主之寸口脉遟而緩遟則爲寒緩即爲氣氣寒相摶轉絞而痛寸口脉遟而澀遟爲寒澀爲無血夫中寒家喜欠其人淸涕出發熱色和者善嚏中寒其人下利以裏虚也欲嚏不能此人肚中寒一作痛夫廋人繞臍痛必有風冷榖氣不行而反下之其氣必衝不衝者心下則痞寸口脉弦者則脇下俱急而痛其人嗇嗇惡寒也寸口脉浮而滑頭中痛趺陽脉緩而遟緩則爲寒遟則爲虚虚寒相摶則欲食温假令食冷則咽痛寸口脉㣲尺中緊而澀緊則爲寒㣲則爲虚澀則血不足故知發汗而復下之也緊在中央知寒尚在此本寒氣何爲發汗復下之耶夫脉浮而緊乃弦狀如弓弦按之不移脉数弦者當下其寒脇下偏痛其脉緊弦此寒也以温藥下之宜大黄附子湯寸口脉弦而緊弦則衛氣不行衛氣不行則惡寒緊則不欲食弦緊相摶則爲寒疝趺陽脉浮而遟浮則爲風虚遟則爲寒疝寒疝繞臍痛若發則白汗出手足厥寒其脉沈弦者大烏頭湯主之問曰人病有宿食何以别之師曰寸口脉浮太按之反澀尺中亦㣲而澀故知有宿食寸口脉緊如轉索左右無常者有宿食寸口脉緊即頭痛風寒或腹中有宿食不化脉滑而数者實也有宿食當下之下利不欲食者有宿食當下之大下後六七日不大便煩不觧腹滿痛此有燥屎也所以然者本有宿食故也宿食在上管當吐之平五藏積聚脉證第十二問曰病有積有聚有繫氣繫一作榖下同何謂也師曰積者藏病也終不移聚者腑病也發作有時展轉痛移爲可治繫氣者脇下痛按之則愈愈復發爲繫氣夫病巳愈不得復發今病復發即爲繫氣也諸積大法脉來細而附骨者乃積也細一作結寸口積在匈中㣲出寸口積在喉中関上積在臍傍上関上積在心下㣲下関積在少腹尺積在氣街脉出在左積在左脉出在右積在右脉兩出積在中央各以其部處之診得肺積脉浮而毛按之辟易脇下氣逆背相引痛少氣善忘目瞑皮膚寒秋差夏劇主皮中時痛如蝨縁之狀甚者如針刺時癢其色白診得心積脉沈而芤上下無常處病匈滿悸腹中熱面赤嗌乾心煩掌中熱甚即唾血主身瘈瘲主血厥夏差冬劇其色赤診得脾積脉浮大而長飢則减飽則見䐜起與榖爭减心下累累如桃李起見於外腹滿嘔泄腸鳴四肢重足脛腫厥不能卧是主肌肉損其色黄診得䏏積脉弦而細兩脇下痛邪走心下足腫寒脇痛引少腹男子積疝女子瘕淋身無膏澤喜轉筋爪甲枯黒春差秋劇其色青診得腎積脉沈而急苦脊與腰相引痛飢則見飽則減少腹裏急口乾咽腫傷爛目􅉩􅉩骨中寒主髓厥善忘其色黒寸口脉沈而横者脇下及腹中有横積痛其脉弦腹中急痛腰背痛相引腹中有寒疝瘕脉弦緊而㣲細者癓也夫寒痺癥瘕積聚之脉皆弦緊若在心下即寸弦緊在胃管即關弦緊在臍下即尺弦緊一日関脉弦長有積在臍左右上下也又脉癥法左手脉横癥在左右手脉横癥在右脉頭大者在上頭小者在下又法横脉見左積在右見右積在左偏得洪實而滑亦爲積弦緊亦爲積爲寒痺爲疝痛内有積不見脉難治見一脉一作脇相應爲易治諸不相應爲不治左手脉大右手脉小上病在左脇下病在左足右手脉大左手脉小上病在右脇下病在右足脉弦而伏者腹中有癥不可轉也必死不治脉來細而沈時直者身有癰腫若腹中有伏梁脉來小沈而實者胃中有積聚不下食食即吐平驚悸衂吐下血匈滿瘀血脉證第十三寸口脉動而弱動則爲驚弱則爲悸趺陽脉微而浮浮則胃氣虚㣲則不能食此恐懼之脉憂迫所作也驚生病者其脉止而復來其人目睛不轉不能呼氣寸口脉緊趺陽脉浮胃氣則虚寸口脉緊寒之實也寒在上膲匈中必满而噫胃氣虚者趺陽脉浮少陽脉緊心下必悸何以言之寒水相搏二氣相爭是以悸脉得諸澀濡弱爲亡血寸口脉弦而大弦則爲减大則爲芤减則爲寒芤則爲虚寒虚相摶此名爲革婦人則半産漏下男子則亡血亡血家不可攻其表汗出則寒慄而振問曰病衂連日不止其脉何類師曰脉來輕輕在肌肉尺中自溢一云尺脉浮目睛暈黄衂必未止暈黄去目睛慧了知衂今止師曰從春至夏發衂者太陽從秋至冬發衂者陽明寸口脉㣲弱尺脉澀弱則發熱澀爲無血其人必厥㣲嘔夫厥當眩不眩而反頭痛痛爲實下虚上實必衂也太陽脉大而浮必衂吐血病人面無血色無寒熱脉沈弦者衂也衂家不可發其汗汗出必額上促急而緊直視而不能眴不得眠脉浮弱手按之絶者下血煩欬者必吐血寸口脉㣲而弱氣血俱虚男子則吐血女子則下血嘔吐汗出者爲可趺陽脉㣲而弱春以胃氣爲夲吐利者爲可不者此爲有水氣其腹必滿小便則難病人身熱脉小絶者吐血若下血婦人亡經此爲寒脉遟者匈上有寒悸氣喜唾脉有隂陽趺陽少隂脉皆㣲其人不吐下必亡血脉沈爲在裏榮衛内結匈滿必吐血男子盛大其脉隂陽㣲趺陽亦㣲獨少隂浮大必便血而失精設言淋者當小便不利趺陽脉弦必腸痔下血病人匈滿脣痿舌青口燥其人但欲漱水不欲嚥無寒熱脉㣲大來遟腹不滿其人言我滿爲有瘀血當汗出不出内結亦爲瘀血病者如熱狀煩滿口乾燥而渇其脉反無熱此爲隂伏是瘀血也當下之下血先見血後見便此近血也先見便後見血此逺血也平嘔吐􅎪下利脉證第十四嘔而脉弱小便復利身有㣲熱見厥者難治趺陽脉浮者胃氣虚寒氣在上憂氣在下二氣並爭但出不入其人即嘔而不得食恐怖而死寛緩即差夫嘔家有癰膿者不可治嘔膿盡自愈先嘔却渇者此爲欲解先渇却嘔者爲水停心下此属飲家嘔家本渇今反不渇者以心下有支飲也問曰病人脉数数爲熱當消榖引食而反吐者何也師曰以發其汗令陽㣲膈氣虚脉乃数数爲客熱不能消榖胃中虚冷故吐也陽緊隂数其人食巳即吐陽浮而数亦爲吐寸緊尺澀其人匈滿不能食而吐吐止者爲下之故不能食設言未止者此爲胃反故尺爲之㣲澀也寸口脉緊而芤緊則爲寒芤則爲虚虚寒相搏脉爲隂結而遟其人則噎関上脉数其人則吐脉弦者虚也胃氣無餘朝食暮吐変爲胃反寒在於上醫反下之今脉反弦故名曰虚趺陽脉㣲而澀㣲則下利澀則吐逆殺不得入也寸口脉㣲而数㣲則無氣無氣則柔虚榮虚則血不足血不足則匈中冷趺陽脉浮而澀浮則爲虚澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿榖不化名曰胃反脉緊而澀其病難治夫吐家脉來形狀如新卧起病人欲吐者不可下之嘔吐而病在膈上後思水者觧急與之思水者猪苓散主之􅎪而腹滿視其前後知何部不利利之即愈夫六腑氣絶於外者手足寒上氣脚縮五藏氣絶於内者下利不禁下甚者手足不仁下利脉沈弦者下重其脉大者爲未止脉㣲弱数者爲欲自止雖發熱不死脉滑按之虚絶者其人必下利下利有㣲熱其人渴脉弱者今自愈下利脉數若㣲發熱汗自出者自愈設脉復緊爲未觧下利寸脉反浮數尺中自澀其人必清膿血下利手足厥無脉灸之不温若脉不還反微喘者死少隂負趺陽者爲順也下利脉數而浮一作偈者今自愈設不差其人必清膿血以有熱故也下利後脉絶手足厥冷晬時脉還手足温者生脉不還者死下利脉反弦發熱身汗者自愈下利氣者當利其小便下利清榖不可攻其表汗出必脹滿其藏寒者當下之下利脉沈而遟其人面少赤身有微熱下利清榖必鬱冐汗出而解其人微厥所以然者其面戴陽下虚故也下利腹脹滿身體疼痛先温其裏乃攻其表下利脉遟而滑者實也利未欲止當下之下利脉反滑者當有所去下乃愈下利差至其年月日時復發此爲病不盡當復下之下利而譫語者爲有燥屎也宜下之下利而腹痛滿爲寒實當下之下利腹中堅者當下之下利後更煩按其心下濡者爲虚煩也下利後脉三部皆平按其心下堅者可下之下利脉浮大者虚也以強下之故也設脉浮革因爾腸嗚當温之病者痿黃躁而不渴胃中寒實而下利不止者死夫風寒下者不可下之下之後心下堅痛脉遲者爲寒但當温之脉沈緊下之亦然脉大浮弦下之當巳平肺痿肺癰欬逆上氣淡飮脉證第十五問曰熱在上膲者因欬爲肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渇小便利数或從便難數𬒳駃藥下利重亡津液故得之寸口脉不出而反發汗陽脉旱索隂脉不澀三焦踟蹰入而不出隂脉不澀身體反冷其内反煩多唾脣燥小便反難此爲肺痿傷於津液便如爛瓜亦如豚腦但坐發汗故也肺痿其人欲欬不得欬欬則出乾沫夊夊小便不利甚則脉浮弱肺痿吐涎沫而不欬者其人不渇必遺溺小便数所以然者以上虚不能制下也此爲肺中冷必眩多涎唾甘草乾姜湯以温其藏師曰肺痿欬唾咽燥欲飲水者自愈自張口者短氣也欬而口中自有津液舌上胎滑此爲浮寒非肺痿也問曰寸口脉数其人欬口中反有濁唾涎沫者何也師曰此爲肺痿之病若口中辟辟燥欬則匈中隱隱痛脉反滑数此爲肺癰欬唾膿血脉数虚者爲肺痿脉數實者爲肺癰問曰病欬逆脉之何以知此爲肺癰當有膿血吐之則死後竟吐膿死其脉何類師曰寸口脉㣲而数㣲則爲風数則爲熱㣲則汗出数則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脉風舎於肺其人則欬口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血爲凝滯畜結癰膿吐如米粥始萌可救膿成則死欬而匈滿振寒脉数咽乾不渴時時出濁唾腥臭乆乆吐膿如粳米粥者爲肺癰桔梗湯主之肺癰匈滿脹一身面目浮腫鼻寒清涕出不聞香臭酸辛欬逆上氣喘鳴迫塞葶歷大棗瀉肺湯主之寸口脉数趺陽脉緊寒熱相搏故振寒而欬趺陽脉浮緩胃氣如經此爲肺癰問曰振寒發熱寸口脉滑而数其人飲食起居如故此爲癰腫病醫反不知而以傷寒治之應不愈也何以知有膿膿之所在何以别知其處師曰假令膿在匈中者爲肺癰其人脉数欬唾有膿血設膿未成其脉自緊数緊去但数膿爲已成也夫病吐血喘欬上氣其脉数有熱不得卧者死上氣面浮腫肩息其脉浮大不治又加利尤甚上氣躁而喘者属肺脹欲作風水發汗則愈一云欬而上氣肺脹其脉沈心下有水氣也要畧千金外䑓沈作浮夫酒客欬者必致吐血此坐極飲過度所致也欬家脉弦爲有水可與十棗湯下之欬而脉浮其人不欬不食如是四十日乃巳一云三十日欬而時發熱脉卒弦者非虚也此爲匈中寒實所致也當吐之欬家其脉弦欲行吐藥當相人強弱而無熱乃可吐之其脉沈者不可發汗乆欬数嵗其脉弱者可治實大数者不可治其脉虚者必苦冐其人本有支飲在匈中故也治属飲家問曰夫飲有四何謂也師曰有淡飲一云留飲有懸飲有溢飲有支飲問曰四飲何以爲異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之淡飲飲後水流在脇下欬唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲欬逆倚息短氣不得卧其形如腫謂之支飲留飲者脇下痛引缺盆欬嗽轉盛一云輒巳匈中有留飲其人短氣而渴四肢歴節痛其脉沈者有留飲夫心下有留飲其人背寒冷大如手病者脉伏其人欲自利利者反快雖利心下續堅滿此爲留飲欲去故也甘遂半夏湯主之病淡飲者當以温藥和之心下有淡飲匈脇支滿目眩甘草草一作遂湯主之病溢飲者當發其汗小青龍湯主之支飲亦喘而不能卧加短氣其脉平也膈間支飲其人喘滿心下痞堅面色黧黒其脉沈緊得之数十日醫吐下之不愈术防巳湯主之心下有支飲其人苦冒眩澤瀉湯主之嘔家本渴渴者爲欲觧今反不渴心下有支飲故也小半夏湯主之夫有支飲家欬煩匈中痛者不卒死至一百日或一歲可與十棗湯膈上之病滿喘欬吐發則寒熱背痛腰疼目泣目出目泣自出一作目眩其人振振身瞤劇必有伏飲夫病人飲水多必暴喘滿凢食少飲多心下水停甚者則悸微者短氣脉雙弦者寒也皆大下後喜虚脉偏弦者飲也肺飲不弦但喜喘短氣病人一臂不隨時復轉移在一臂其脉沈細非風也必有飲在上膲其脉虚者爲微勞榮衛氣不周故也乆乆自差一云冬自差腹滿口苦乾燥此腸間有水氣也防巳椒目葶藶大黄丸主之假令瘦人臍下悸吐涎沫而癲眩者水也五苓散主之先渴却嘔爲水停心下此属飲家半夏加茯苓湯主之水在心心下堅築短氣惡水不欲飲水在肺吐涎味欲飲水水在脾少氣身重水在肝脇下支滿嚏而痛水在腎心下悸平癰腫腸癰金瘡侵淫脉證第十六脉数身無熱内有癰也一云腹无積聚身体一本作无熱脉数此爲腸有膿薏苡附子敗醤湯主之諸浮数脉應當發熱而反洒淅惡寒若有痛處當發其癰脉微而遟必發熱弱而数爲振寒當發癰腫脉浮而数身體無熱其形嘿嘿匈中微躁一作胃中㣲燥不知痛之所在此人當發癰腫脉滑而数数則爲熱滑則爲實滑則十二榮数則主衛榮衛相逢則結爲癰熱之所過則爲膿也師曰諸癰腫欲知有膿與無膿以手掩腫上熱者爲有膿不熱者爲無膿問曰官羽林婦病醫脉之何以知婦人腸中有膿爲下之則愈師曰寸口脉滑而数滑則爲實数則爲熱滑則爲榮数則爲衛衛数下降榮滑上昇榮衛相干血爲濁敗少腹痞堅小便或澀或時汗出或復惡寒膿爲巳成設脉遟緊聚爲瘀血血下則愈腸癰之爲病其身體甲錯腹皮一作支急按之濡如腫狀腸癰者少腹腫按之則痛小便如淋時時發熱自汗出復惡寒其脉遟緊者膿未成可下之當有血脉洪数者膿巳成不可下也大黄牡丹湯主之問曰寸口脉微而澀法當亡血若汗出設不汗者云何荅曰若身有瘡𬒳刀噐所傷亡血故也侵淫瘡從口起流向四肢者可治從四肢流來入口者不可治之新刋王氏脉經卷第八
