body:
  text: 朝散大夫守光禄卿直秘閣判登聞檢院上護軍臣林億等􅀋次肝病證第一膽病證第二心病證第三小腸病證第四脾病證第五胃病證第六肺病證第七大腸病證第八腎病證第九膀胱病證第十三膲病證第十一肝足厥隂經病證第一肝氣虚則恐實則怒肝氣虚則夢見園苑生草得其時則夢伏樹下不敢起肝氣盛則夢怒厥氣客於肝則夢山林樹木病在肝平旦慧下晡盛夜半静病先發於肝者頭目眩脇痛支滿一日之脾閉塞不通身痛體重二日之胃而腹脹三日之腎少腹腰脊痛脛痠十日不巳死冬日入夏早食肝脉􅅮堅而長色不青當病墜墮若􅅮因血在脇下令人喘逆若耎而散其色澤者當病溢飲溢飲者濕暴多飲而溢一作易入肌皮腸胃之外也肝脉沈之而急浮之亦然苦脇下痛有氣攴滿引少腹而痛時小便難苦目眩頭痛腰背痛足爲逆寒時􅜡女人月使不來時亡時有得之少時有所墜墮青脉之至也長而左右彈診曰有積氣在心下支胠名曰肝痺得之寒濕與疝同法腰痛足清頭痛肝中風者頭目瞤兩脇痛行常傴令人嗜甘如阻歸狀肝中寒者其人洗洗惡寒翕翕發􅀬面翕然赤漐漐有汗􅇩中煩􅀬肝中寒者其人兩臂不舉舌本又作大燥善太息􅇩中痛不得轉側時盗汗欬食巳吐其汁肝主􅇩中喘怒罵其脉沈􅇩中叉窒欲令人推按之有􅀬鼻窒凢有所墜墮惡血留内苦有所大怒氣上而不能下積於左脇下則傷肝肝傷者其人脫肉又臥口欲得張時時手足青目􅉂瞳人痛此爲肝藏傷所致也肝脹者脇下滿而痛引少腹肝水者其人腹大不能自轉側而脇下腹中痛時時津液微生小便續通肺乗肝即爲癰腫心乗肝必吐利肝著者其病人常欲蹈其􅇩上先未苦時但欲飲􅀬肝之積名曰肥氣在左脇下如覆杯有頭足如龜鼈狀乆乆不愈發欬逆痎瘧連􅀊月不巳以季夏戊己日得之何也肺病傳肝肝當傳脾脾適以季夏王王者不受邪肝復欲還肺肺不肯受因留結爲積故知肥氣以季夏得之肝病其色青手足拘急脇下苦滿或時眩冒其脉弦長此爲可治宜服防風竹􅄋湯秦芁散春當刺大敦夏刺行間冬刺曲泉皆􅀘之季夏刺太衝秋刺中郄皆㵼之又當灸期門百壯背第九椎五十壯肝病者必兩脇下痛引少腹令人善怒虚則目􅉩􅉩無所見耳無所聞善恐如人將捕之若欲治之當取其經足厥隂與少陽氣逆則頭目痛耳聾不聦頰腫取血者邪在肝則兩脇中痛寒中惡血在内胻善瘈節時腫取之行間以引脇下􅀘三里以温胃中取血脉以散惡血取耳間青脉巳去其瘈足厥隂之脉起於大指聚毛之際上循足趺上廉去内踝一寸上踝八寸交出太隂之後上膕内廉循股入隂毛中環隂器抵少腹俠胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹於巔其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺中是動則病腰痛不可以俛仰丈夫頽疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者􅇩滿嘔逆洞泄狐疝遺溺閉􅜡盛者則寸口大一倍於人迎虚者則寸口反小於人迎足厥隂之别名曰蠡溝去内踝上五寸别走少隂其别者循經上睾結於莖其病氣逆則睾腫卒疝实則挺長􅀬虚則暴癢取之所别肝病􅇩滿脇脹善恚怒呌呼身體有􅀬而復惡寒四肢不㪯面目白身體滑其脉當弦長而急今反短濇其色當青而反白者此是金之刻木爲大逆十死不治膽足少陽經病證第二膽病者善太息口苦嘔􅀫汁心澹澹恐如人將捕之嗌中介介然数唾􅀱在足少陽之本末亦見其脉之䧟下者灸之其寒􅀬刺陽陵泉善嘔有苦汁長太息心中澹澹善悲恐如人將捕之邪在膽逆在胃膽液則口苦胃氣逆則嘔苦汁故曰嘔膽刺三里以下胃氣逆刺足少陽經絡以閉膽却調其虚實以去其邪也膽脹者脇下痛脹口苦太息厥氣客於膽則夢闘訟足少陽之脉起於目兊眥上抵頭角下耳後循頸行手少陽之脉前至肩上却交手少陽之後入缺盆其支者從耳後入耳中出走耳前至兊眥後其支者别兊眥下大迎合手少陽於䪼一本云别兊眥上迎手少陽於巔下加頰車下頸合缺盆以下􅇩中貫膈絡肝属膽循脇裏出氣街遶毛際横入髀厭中其直者從缺盆下腋循􅇩中過季脇下合髀厭中以下循髀陽出􅂰外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足趺上岀小指次指之端其支者趺上入大指之間循大指歧内出其端還貫入􅀲甲出三毛是動則病口苦善太息心脇痛不能反側甚則面㣲塵躰無膏澤足外反􅀬是爲陽厥是主骨所生病者頭痛角頷痛目兊眥痛缺盆中腫痛腋下腫馬刀挾癭汗岀振寒瘧􅇩中脇肋髀􅂰外至胻絶骨外踝前及諸節皆痛小指次指不用盛者則人迎大一倍於寸口虚者則人迎反小於寸口也心手少隂經病證第三心氣虚則悲不巳實則􅀏不休心氣虚則夢救火陽物得其時則夢燔灼心氣盛則夢喜􅀏及恐畏厥氣客於心則夢丘山煙火病在心日中慧夜半甚平旦静病先發於心者心痛一日之肺喘欬三日之肝脇痛支滿五日之脾閉塞不通身痛體重三日不巳死冬夜半夏日中心脉􅅮堅而長當病舌卷不能言其耎而散者當病消渇而巳心脉沈之小而緊浮之不喘苦心下聚氣而痛食不下喜咽唾時手足􅀬煩滿時忘不樂喜太息得之憂思赤脉之至也喘而堅診曰有積氣在中時害於食名曰心痺得之外疾思慮而心虚故邪從之心脉急名曰心疝少腹當有形其以心爲牡藏小腸爲之使故少腹邪哭使魂魄不安者血氣少也血氣少者属於心心氣虚者其人即畏一作衰合目欲眠夢逺行而精神離散魂魄妄行隂氣衰者即爲癲陽氣衰者即爲狂五藏者魂魄之宅舎精神之所依託也魂魄飛􅀭者其五藏空虚也即邪神居之神靈所使􅀑而下之脉短而㣲其藏不足則魂魄不安魂属於肝魄属於肺肺主津液即爲涕泣肺氣衰者即爲泣出肝氣衰者魂則不安肝主善怒其聲呼心中風者拿拿發􅀬不能起心中飢而欲食食則嘔心中寒者其人病心如噉蒜狀劇者心痛徹背背痛徹心如蠱注其脉浮者自吐乃愈愁憂思慮則傷心心傷則苦驚喜忘善怒心傷者其人勞倦即頭面赤而下重心中痛徹背自發煩􅀬當臍挑手其脉弦此爲心藏傷所致也心脹者煩心短氣卧不安心水者其人身體重一作腫而少氣不得卧煩而躁其隂大腫腎乗心必􅜡真心痛手足清至節心痛甚旦發夕死夕發旦死心腹痛懊憹發作腫聚往來上下行痛有休作心腹中􅀬苦渇涎出者是蚘咬也以手聚而堅持之毋令得移以大針刺之乆持之蟲不動乃出針腸中有蟲蚘咬皆不可取以小針心之積名曰伏梁起於臍上上至心大如臂乆乆不愈病煩心心痛以秋庚辛日得之何也腎病傳心心當傳肺肺適以秋王王者不受邪心復欲还腎腎不肯受因留結爲積故知伏梁以秋得之心病其色赤心痛氣短手掌煩􅀬或啼􅀏罵詈悲思愁慮面赤身􅀬其脉实大而数此爲可治春當刺中衝夏刺勞宫季夏刺太陵皆􅀘之秋刺間使冬刺曲澤皆瀉之此是手厥隂心包胳經又當灸巨闕五十壯背第五椎百壯心病者􅇩内痛脇支滿两脇下痛膺背肩甲間痛两臂内痛虚則􅇩腹大脇下與腰背相引而痛取其經手少隂太陽舌下血者其変病刺郄中血者邪在心則病心痛善悲時眩仆視有餘不足而調之其輸黄帝曰手少隂之脉獨无輸何也歧伯曰少隂者心脉也心者五臟六腑之大主也心爲帝王精神之所舎其藏堅固邪不能客客之則傷心心傷則神去神去則身死矣故諸邪在於心者皆在心之包絡包絡者心主之脉也故少隂无輸焉少隂无輸心不病乎對曰其外經肺病藏不病故獨取其經於掌后兊骨之端也手心主之脉起於􅇩中出属心包下膈歴絡三膲其支者循􅇩出脇下腋三寸上抵腋下循臑内行太隂少隂之間入肘中下臂行两筋之間入掌中循中􅃌出其端其支者别掌中循小􅃌次􅃌出其端是動則病手心􅀬肘臂攣急腋腫甚則􅇩脇支滿心中澹澹大動面赤目黄善􅀏不休是主脉所生病者煩心心痛掌中􅀬甚者則寸口大一倍於人迎虚者則寸口反小於人迎也手心主之别名曰内関去腕二寸出於两筋間循經以上繫於心包絡心系氣实則心痛虚則爲煩心取之两筋間心病煩悶少氣大􅀬􅀬上盪心嘔吐欬逆狂語汗出如珠身体厥冷其脉當浮今反沈濡而滑其色當赤而反黒者此是水之刻火爲大逆十死不治小腸手太陽經病證第四小腸病者少腹痛腰脊控睪而痛時窘之復耳前􅀬􅀂寒甚獨肩上􅀬及手小􅃌次􅃌之間􅀬􅀂脉䧟者此其候也少腹控睾引腰脊上衝心邪在小腸者連睾系属於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於厭一作斉故取之肓原以散之刺太隂以與之取厥隂以下之取巨虚下廉以去之按其所過之經以調之小腸有寒其人下重便膿血有􅀬必痔小腸有􅀫食常暮發􅀬明日復止小腸脹者少腹䐜脹引腹而痛厥氣客於小腸則夢聚邑街衢手太陽之脉起之於小􅃌之端循手外側上腕出踝中直上循臂骨下廉出肘内側两骨之間上循臑外後廉出肩觧繞肩甲交肩上入缺盆向腋絡心循咽下膈抵胃属小腸其支者從缺盆循頸上頰至目兊眥却入耳中其支者别頰上䪼抵鼻至目内眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黄頰頷腫頸肩臑肘臂外後廉痛盛者則人迎大再倍於寸口虚者則人迎反小於寸口也脾足太隂經病證第五脾氣虚則四肢不用五藏不安實則腹脹涇溲不利脾氣虚則夢飲食不足得其時則夢築垣蓋屋脾氣盛則夢歌樂體重手足不㪯厥氣客於脾則夢丘陵大澤壞屋風雨病在脾日昳慧平旦甚日中持下脯静病先發於脾閉塞不通身痛體重一日之胃而腹脹二日之腎少腹腰脊痛脛痠三日之膀胱背􅡗筋痛小便閉十日不巳死冬人定夏晏食脾脉􅅮堅而長其色黄當病少氣其耎而散色不澤者當病足骭腫􅀂水狀脾脉沈之而濡浮之而虚苦腹脹煩滿胃中有􅀬不嗜食食而不化大便難四肢苦痺時不仁得之房内月使不來來而頻併黄脉之至也大而虚有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風寸口脉弦而滑弦則爲痛滑則爲实痛即爲急实即爲踊痛踊相搏即􅇩脇搶急趺陽脉浮而澁浮即胃氣㣲澁即脾氣衰㣲衰相搏即呼吸不得此爲脾家失度寸口脉雙緊即爲入其氣不出無表有裏心下痞堅趺陽脉㣲而澁㣲即無胃氣澁即傷脾寒在於膈而反下之寒積不消胃㣲脾傷􅂖氣不行食巳自噫寒在􅇩膈上虚下實榖氣不通爲閉塞之病寸口脉緩而遟緩則爲陽其氣長遟則爲隂榮氣促榮衛俱和剛柔相得三膲相承其氣必強趺陽脉滑而緊滑則胃氣實緊則脾氣傷得食而不消者此脾不治也能食而腹不滿此爲胃氣有餘腹满而不能食心下如飢此爲胃氣不行心氣虚也得食而滿者此爲脾家不治脾中風者翕翕發􅀬形如醉人腹中煩重皮肉瞤瞤而短氣也凡有所擊仆􅀂醉飽入房汗出當風則傷脾脾傷則中氣隂陽離别陽不從隂故以三分􅀱死生脾氣弱病利下白腸垢大便堅不能更衣汗出不止名曰脾氣弱或五液注下青黄赤白黒病人鼻下平者胃病也㣲赤者病發癰㣲黒者有􅀬青者有寒白者不治脣黒者胃先病㣲燥而渇者可治不渇者不可治臍反出者此爲脾先落一云先終脾脹者善􅎪四肢急體重不能衣一作枚脾水者其人腹大四肢苦重津液不生但苦少氣小便難趺陽脉浮而澁浮則胃氣強澁則小便数浮澁相搏大便則堅其脾爲約脾約者其人大便堅小便利而反不渇凡人病脉以解而反暮㣲煩者人見病者差安而強與榖脾胃氣尚弱不能消榖故令㣲煩損榖則愈脾之積名曰痞氣在胃管覆大如盤乆乆不愈病四肢不􅀵黄癉食飲不爲肌膚以冬壬癸日得之何也肝病傳脾脾當傳腎腎適以冬王王者不受邪脾復欲還肝肝不肯受因留結爲積故知痞氣以冬得之脾病其色黄飲食不消腹苦脹滿體重節痛大便不利其脉微緩而長此爲可治宜服平胃圎瀉脾圎茱茰圎附子湯春當刺􅀮白冬刺隂陵泉皆瀉之夏刺大都季夏刺公孫秋刺商丘皆􅀘之又當灸章門五十壯背第十一椎百壯脾病者必身重苦飢足痿不􅀵素問作善肌肉痿足不收行善瘈脚下痛虚則腹脹腸鳴溏泄食不化取其經足太隂陽明少隂血者邪在脾胃肌肉痛陽氣有餘隂氣不足則􅀬中善飢陽氣不足隂氣有餘則寒中腸鳴腹痛隂陽俱有餘􅀂俱不足則有寒有􅀬皆調其三里足太隂之脉起於大􅃌之端循􅃌内側白肉際過核骨後上内踝前廉上腨内循胻骨後交出厥隂之前上循􅂰股内前廉入腹属脾絡胃上膈俠咽連舌本散舌下其支者復從胃别上膈注心中是動則病舌本強食則嘔一作吐胃管痛腹脹善噫得後與氣則快然而衰身體皆重是主脾所生病者舌本痛體不能動揺食不下煩心心下急痛寒瘧溏瘕泄水閉黄疸好卧不能食肉脣青強立股􅂰内痛厥足大􅃌不用盛者則寸口大三倍於人迎虚者則寸口反小於人迎足太隂之别名曰公絲去本節後一寸别走陽明其别者入絡腸胃厥氣上逆則霍乱實則腹中切痛虚則鼓脹取之所别脾病其色黄體青失溲直視脣反張爪甲青飲食吐逆體重節痛四肢不㪯其脉當浮大而緩今反弦急其色當黄今反青此是木之刻土爲大逆十死不治胃足陽明經病證第六胃病者腹脹胃管當心而痛上支兩脇膈咽不通飲食不下取三里飲食不下隔塞不通邪在胃管在上管則抑而刺之在下管則散而去胃脉􅅮堅而長其色赤當病折髀其耎而散者當病食痺髀痛胃中有癖食冷物者痛不能食食􅀬即能胃脹者腹滿胃管痛鼻聞焦臭妨於食大便難診得胃脉病形何如曰胃實則脹虚則􅂥病先發於胃脹滿五日之腎少腹腰脊痛脛痠三日之膀胱背􅡗筋痛小便閉五日上之脾閉塞不通身痛體重灵樞云上之心六日不巳死冬夜半後夏日昳六日一作三日脉浮而芤浮則爲陽芤則爲隂浮芤相􅅮胃氣生􅀬其陽則絶趺陽脉浮者胃氣虚也趺陽脉浮大者此胃家㣲虚煩圊必日再行芤而有胃氣者脉浮之大而耎㣲按之芤故知芤而有胃氣也趺陽脉數者胃中有􅀬即消榖引食趺陽脉濇者胃中有寒水榖不化趺陽脉麄麄而浮者其病難治趺陽脉浮遟者故乆病趺陽脉虚則遺溺實則失氣動作頭痛重􅀬氣朝者属胃厥氣客於胃則夢飲食足陽明之脉起於鼻交頞中旁約太陽之脉下循鼻外入上齒中還出俠口環脣下交承漿䪺循頥後下廉出大迎循頰車上耳前過客主人循髪際至額顱其支者從大迎前下人迎循喉嚨入缺盤下膈属胃絡脾其直者從缺盆下乳内廉下俠臍入氣街中其支者起胃下口循腹裏下至氣街中而合以下髀関抵伏莵下入􅂰臏中下循胻外廉下足跗入中􅃌内間其支者下􅂰三寸而别以下入中􅃌外間其支者别跗上入大􅃌間出其端是動則病悽悽然振寒善伸数欠顔黒病至䛩人與火聞木音則惕然而驚心動欲獨閉户牖而處甚則欲上高而歌棄衣而走賁嚮腹脹是爲骭厥是主血血一作胃所生病者狂瘧一作瘈温􅁋汗出􅍠衂口喎脣緊頸腫喉痺大腹水腫􅂰臏痛循膺乳街股伏莵骭外廉足跗上皆痛中􅃌不用氣盛則身以前皆􅀬其有餘於胃則消榖善飢溺色黄氣不足則身以前皆寒慄胃中寒則脹滿盛者則人迎大三倍於寸口虚者則人迎反小於寸口也肺手太隂經病證第七肺氣虚則鼻息利少氣實則喘喝􅇩慿仰息肺氣虚則夢見白物見人斬血藉藉得其時則夢見兵戰肺氣盛則夢恐懼哭泣厥氣客于肺則夢飛掦見金䥫之器竒物病在肺下晡慧日中甚夜半靜病先發於肺喘欬三日之肝脇痛支滿一日之脾閉塞不通身痛體重五日之胃腹脹十日不巳死冬日入夏日出肺脉搏堅而長當病唾血其濡而散者當病漏汗漏一作灌至今不復散發肺脉沈之而数浮之而喘苦洗洗寒􅀬腹滿腸中􅀬小便赤肩背痛從腰巳上汗出得之房内汗出當風白脉之至也喘而浮大上虚下實驚有積氣在􅎍中喘而虚名曰肺痺寒􅀬得之因醉而使内也肺中風者口燥而喘身運而重冐而腫脹肺中寒者其人吐濁涕形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行肺傷者其人勞倦則欬唾血其脉細緊浮数皆吐血此爲躁擾嗔怒得之肺傷氣擁所致肺脹者虚而滿喘欬逆􅀝息目如脫狀其脉浮肺水者其人身體重而小便難時時大便鴨溏肝乗肺必作虚脉耎而弱弱反在関耎反在顚浮反在上弱反在下浮則爲陽弱則血不足必弱爲虚浮弱自别浮則自出弱則爲入浮則爲出不入此爲有表無裏弱則爲入不出此爲無表有裏陽出極汗齊腰而還此爲無表有裏故名曰厥陽在當汗出不汗出趺陽脉浮緩少陽㣲緊㣲爲血虚緊爲㣲寒此爲䑕乳其病属肺肺之積名曰息賁在右脇下覆大如杯乆乆不愈病洒洒寒􅀬氣逆喘欬發肺癰以春甲乙日得之何也心病傳肺肺當傳肝肝適以春王王者不受邪肺復欲還心心不肯受因留結爲積故知息賁以春得之肺病其色白身躰俱寒无􅀬時時欬其脉㣲遟爲可治宜服五味子大􅀘肺湯瀉肺散春當刺少商夏刺魚際背瀉之季夏刺太淵秋刺經渠冬刺尺澤皆􅀘之又當炙膻中百壯背第三椎二十五壯肺病者必喘欬逆氣肩息背痛汗出尻隂股􅂰挛髀腨胻足皆痛虚則少氣不能報息耳聾嗌乾取其經手太隂足太陽之外厥隂内少隂血者邪在肺則皮膚痛發寒􅀬上氣氣喘汗出欬動肩背取之膺中外輸背第三椎之傍以手痛按之快然乃刺之取之缺盆中以越之手太隂之脉起於中膲下絡大腸還循胃口上膈属肺從肺系横出腋下下循臑内行少隂心主之前下肘中後循臂内上骨下廉入寸口上魚循魚際出大􅃌之端其支者從腕後直次􅃌内廉出其端是動則病肺脹滿膨澎而喘欬缺盆中痛甚則交兩手而瞀是爲臂厥是主肺所生病者欬上氣喘喝煩心􅇩滿臑臂内前廉痛掌中􅀬氣盛有餘則肩背痛風汗出小便数而欠氣虚則肩背痛寒少氣不足以息溺色変卒遺失無度盛者則寸口大三倍於人迎虚者則寸口反小於人迎也手太隂之别名曰列缺起於腋下一云腕上分間别走陽明其别者並太隂之經直入掌中散入於魚際其實則手兊掌起虚則欠欬小便遺数取之去腕一寸半肺病身當有􅀬欬嗽短氣唾出膿血其脉當短澁今反浮大其色當白而反赤者此是火之刻金爲大逆十死不治大腸手陽明經病證第八大腸病者腸中切痛而鳴濯濯冬日重感于寒則泄當臍而痛不能乆立與胃同􅀱取巨虚上廉腸中雷鳴氣上衝􅇩喘不能乆立邪在大腸刺肓之原巨虚上廉三里大腸有寒鶩溏有􅀬便腸垢大腸有􅀫食寒慄發􅀬有時如瘧狀大腸脹者腸鳴而痛寒則泄食不化厥氣客於大腸則夢田野手陽明之脉起於大􅃌次􅃌之端外側循􅃌上廉出合谷兩骨之間上入兩筋之中循臂上㢘上入肘後㢘循臑外前㢘上肩出髃骨之前㢘上出柱骨之㑹上下入缺盆絡肺下膈属大腸其支者從缺盆直入上頸貫頰入下齒縫中還出俠口交人中左之右右之左上俠􅈹孔是動則病齒痛䪼腫是主津所生病者目黄口乾􅍠衂喉痺肩前臑痛大􅃌次􅃌痛不用氣盛有餘則當脉所過者􅀬腫虚則寒慄不復盛者則人迎大三倍於寸口虚者則人迎反小於寸口也腎足少隂經病證第九腎氣虚則厥逆實則脹滿四肢正黒腎氣虚則夢見舟船溺人得其夢伏水中􅀂有畏怖腎氣盛則夢腰脊兩解不相属厥氣客於腎則夢臨淵没居水中病在腎夜半慧日乗四季甚下晡靜病先發於腎少腹腰脊痛脛痠三日之膀胱背􅡗筋痛小便閉二日上之心心痛三日之小腸脹四日不巳死冬大食夏晏晡腎脉搏堅而長其色黄而赤當病折腰其耎而散者當病少血腎脉沈之大而堅浮之大而緊􅀂手足骨腫厥而隂不㒷腰脊痛少腹腫心下有水氣時脹閉時泄得之浴水中身未乾而合房内及勞倦發之黒脉之至也上堅而大有積氣在少腹與隂名曰腎痺得之沐浴清水而卧凡有所用力㪯重若入房過度汗出如浴水則傷腎腎脹者腹滿引背央央然腰髀痛腎水者其人腹大臍腫腰重痛不得溺隂下􅊜如牛鼻頭汗其足逆寒大便反堅腎著之爲病從腰以下冷腰重如帶五千錢腎著之病其人身體重腰中冷如氷狀一作如水洗狀一作如坐水中形如水狀反不渴小便自利食飲如故是其證也病属下膲從身勞汗出衣裏冷濕故乆久得之腎之積名曰奔豚發於少腹上至心下如豚奔走之狀上下無時乆乆不愈病喘逆骨痿少氣以夏丙丁日得之何也脾病傳腎腎當傳心心適以夏王王者不受邪腎復欲還脾脾不肯受因留結爲積故知奔豚以夏得之水流夜疾何以故師曰土休故流疾而有聲人亦應之人夜卧則脾不動揺脉爲之数疾也腎病其色黒其氣虚弱吸吸少氣兩耳若聾腰痛時時失精飲食减少􅂰以下清其脉沈滑而遟此爲可治宜服内􅀘散建中湯腎氣圎地黄煎春當刺涌泉秋刺伏留冬刺隂谷皆􅀘之夏􅀘之夏刺然谷季夏刺大溪皆瀉之又當灸京門五十壯背第十四椎百壯腎病者必腹大脛腫痛喘欬身重寢汗出憎風虚即􅇩中痛大腹小腹痛清厥意不樂取其經足少隂太陽血者邪在腎則骨痛隂痺隂痺者按之而不得腹脹腰痛大便難肩背頸項強痛時眩取之涌泉崑崙視有血者尽取之足少隂之脉起於小􅃌之下斜􅃐足心出然骨之下循内踝之後别入跟中以上腨内出膕中内廉上股内後廉貫脊属腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨俠舌本其支者從肺出絡心注􅇩中是動則病飢而不欲食面黒如炭色一作地色欬唾則有血喉鳴而喘坐而欲起目􅉩􅉩無所見心懸􅀂飢狀氣不足則善恐心惕惕若人將捕之是爲骨厥一作痿是主腎所生病者口􅀬舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股内後㢘痛痿厥嗜卧足下􅀬而痛炙則強食而生害一作肉緩帶􅀍髮大杖重履而歩盛者則寸口大再倍於人迎虚者則寸口反小於人迎也足少隂之别名曰大鍾當踝後繞跟别走太陽其别者並經上走於心包下貫腰脊其病氣逆則煩悶实則閉癃虚則腰痛取之所别腎病手足逆冷面赤目黃小便不禁骨節煩疼少腹結痛氣衝於心其脉當沈細而滑今反浮大其色當黒而反黄此是土之刻水爲大逆十死不治膀胱足太陽經病證第十膀胱病者少腹偏腫而痛以手按之則欲小便而不得肩上􅀬􅀂脉䧟足小􅃌外側反脛踝後皆􅀬􅀂脉䧟者取委中膀胱脹者少腹滿而氣􅜡病先發於膀胱者背􅡗筋痛小便閉五日之腎少腹腰脊痛脛痠一日之小腸脹一日之脾閉塞不通身痛體重二日不巳死冬雞鳴夏下晡一云日夕厥氣客於膀胱則夢遊行足太陽之脉起於目内眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出别下項循肩􅈩内俠脊抵腰中入循膂絡腎属膀胱其支者從腰中下㑹於後隂下貫臀入膕中其支者從􅈩内左右别下貫髖一作肺過髀樞循髀外後㢘過一本下合膕中以下貫腨内出外踝之後循京骨至小􅃌外側是動則病衝頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如列是爲踝厥是主筋所生病者痔瘧狂顚疾頭腦頂痛目黄淚出􅍠衂項背腰尻膕腨脚皆痛小指不用盛者則人迎大再倍於寸口虚者則人迎反小於寸口也三膲手少陽經病證第十一三膲病者腹脹氣滿小腹􅀹堅不得小便窘急溢則爲水留則爲脹􅀱在足太陽之外大絡在太陽少陽之間赤見於脉取委陽少腹病腫不得小便邪在三膲約取太陽太絡視其結脉與厥隂小絡結而血者腫上及胃管取三里三膲脹者氣滿於皮膚殻殻然而堅不疼􅀬在上膲因欬爲肺痿􅀬在中膲因堅􅀬在下膲因溺血手少陽之脉起於小􅃌次􅃌之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆交膻中散絡心包下膈徧属三膲其支者從膻中上出缺盆上項俠耳後直上出耳上角以屈下額至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目兊眥是動則病耳聾煇煇焞焞嗌腫喉痺是主氣所生病者汗出目兊眥痛頰腫耳後肩臑肘臂外皆痛小􅃌次􅃌不用盛者則人迎大一倍於寸口虚者則人迎反小於寸口也新刋王氏脉經卷第六
