front:
  text: 新刋王氏脉經卷第一臣林億等􅀋次脉形狀指下秘决第一二十四種
  hash: sha256:27efb13cd934ca0c6b3847ac0d417f1030027d552bb550a5f612afe26399baa9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0009_SBCK_001-1a}
body:
  text: 浮脉舉之有餘按之不足浮於手下芤脉浮大而軟按之中央空兩邊實一曰手下無兩傍有洪脉極大在指下一曰浮而大滑脉往來前却流利展轉替替然與數相似一日浮中如有力一曰漉漉如欲脫數脉去來促急一曰一息六七至一曰数者進之名促脉來去數時一止復來弦脉舉之無有按之如弓弦狀一曰如張弓弦按之不移又曰浮緊爲弦緊脉數如切繩狀一曰如轉索之無常沈脉舉之不足按之有餘一曰重按之乃得伏脉極重指按之著骨乃得一曰手下裁動一曰按之不足舉之無有一曰関上沈不出名曰伏革脉有似沈伏實大而長㣲絃千金翼以革爲牢實脉大而長微強按之隱指愊愊然一曰沈浮皆得微脉極細而軟或欲絶若有若無一曰小也一曰手下快一曰浮而薄一曰按之如􅁒盡濇脉細而遟往來難且散或一止復來一曰浮而短一曰短而止或曰散也細脉小大於微常有但細耳軟脉極軟而浮細一曰按之無有斈之有餘一曰細小而軟軟一作濡曰濡者如白衣在水中輕手相得弱脉極軟而沈細按之欲絶指下一曰按之乃得㪯之無有虚脉遟大而軟按之不足隱指豁豁然空散脉大而散散者氣實血虚有表無裏緩脉去來亦遟小駃於遟一曰浮大而軟隂浮與陽同等遟脉呼吸三至去來極遟一曰㪯之不足按之盡牢一曰按之盡牢㪯之無有結脉往來緩時一止復來按之來緩時一指者名結陽􅀄來動止更來小数不能自還㪯之則動名結隂代脉來數中止不能自還因而復動脉結者生代者死動脉見於􅀜上無頭尾大如豆厥厥然動揺傷寒論云隂陽相摶名曰動陽動則汗出隂動則發􅀬形冷惡寒数脉見於関上上下無頭尾如豆大厥厥動揺者名曰動浮與芤相􅀋與洪相􅀋弦與緊相􅀋滑與數相􅀋革與實相􅀋千金翼云牢與實相􅀋沈與伏相􅀋微與濇相􅀋軟與弱相􅀋緩與遟相􅀋軟與遟相􅀋平脉早晏法第二黃帝問曰夫診脉常以平旦何也歧伯對曰平旦者隂氣未動陽氣未散飲食未進經脉未盛絡脉調均内經作調勻氣血未亂故乃可診過此非也千金同素問太素云有過之脉切脉動静而視精明察五色觀五藏有餘不足六腑強弱形之盛衰以此參伍決死生之分分别三􅀜境界脉􅀱所主第三從魚際至高骨其骨自高却行一寸其中名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰􅀜陽出隂入以􅀜爲界陽出三分隂入三分故曰三隂三陽陽生於尺動於寸隂生於寸動於尺寸主射上焦出頭及皮毛竟手􅀜主射中焦腹及􅆎尺主射下焦少腹至足辨尺寸隂陽榮衞度数第四夫十二經皆有動脉獨取寸口以决五藏六腑死生吉凶之候者何謂也然寸口者脉之大㑹手太隂之動脉也人一呼脉行三寸一吸脉行三寸呼吸定息脉行六寸人一日一夜凢一萬三千五百息脉行五十度周於身漏水下百刻榮衛行陽二十五度行隂亦二十五度爲一周晬時也故五十度而復㑹於手太隂太隂者寸口也即五藏六腑之所始終故法取於寸口脉有尺寸何謂也然尺寸者脉之大㑹要也從􅀜至尺是尺内隂之所治也從􅀜至魚際是寸口内陽之所治也故分寸爲尺分尺爲寸故隂得尺内一寸陽得寸内九分尺寸終始一寸九分故曰尺寸也脉有太過有不及有隂陽相乗有覆有溢有􅀜有格何謂也然􅀜之前者陽之動也脉當見九分而浮過者法曰太過減者法曰不及遂上魚爲溢爲外􅀜内格此隂乗之脉也􅀜之後者隂之動也脉當見一寸而沈過者法曰太過减者法曰不及遂入尺爲覆爲内􅀜外格此陽乗之脉故曰覆溢是眞藏之脉也人不病自死平脉視人大小長短男女逆順法第五凢診脉當視其人大小長短及性氣緩急脉之遟速大小長短皆如其人形性者則吉反之者則爲逆也脉三部大都欲等只如小人細人婦人脉小軟小兒四五􅀊脉呼吸八至細数者吉千金翼云人大而脉細人細而脉大人楽而脉實人苦而脉虚性急而脉緩性緩而脉躁人壯而脉細人羸而脉大此皆爲逆逆則難治反此爲順順則易治凡婦人脉常欲濡弱於丈夫小兒四五􅀊者脉自駃疾呼吸八至也男左大爲順女右大爲順肥人脉沈瘦人脉浮持脉輕重法第六脉有輕重何謂也然􅀄持脉如三菽之重與皮毛相得者肺部也菽者小豆言脉輕如三小豆之重焒作皮毛之間者肺氣所行故言肺部也如六菽之重與血脉相得者心部也心主血脉次於肺如六豆之重如九菽之重與肌肉相得者脾部也脾在中决主肌肉故次心如九豆之重如十二菽之重與筋平者肝部也肝主筋又在脾下故次之按之至骨舉之來疾者腎部也腎主骨其脉沈至骨故曰輕重也兩手六脉所主五藏六腑隂陽逆順第七脉法讃云肝心出左脾肺出右腎與命門俱出尺部魂魄榖神皆見寸口左主司官右主司府左大順男右大順女􅀜前一分人命之主左爲人迎右爲氣口神門决斷兩在關後人無二脉病死不愈諸經損减各隨其部察按隂陽誰與先後千金云三隂三陽誰先誰後隂病治官陽病治府竒邪所舎如何捕取審而知者鍼入病愈心部在左手關前寸口是也即手少隂經也與手太陽爲表裏以小腸合爲府合於上焦名曰神庭在􅀛一作鳩尾下五分肝部在左手􅀜上是也足厥隂經也與足少陽爲麦裏以膽合爲府合於中焦名曰胞門一作少陽在太倉左右三寸腎部在左手􅀜後尺中是也足少隂經也與足太陽爲表裏以膀胱合爲府合於下焦在􅀜元左肺部在右手􅀜前寸口是也手太隂經也與手陽明爲表裏以大腸合爲府合於上焦名呼吸之府在雲門脾部在右手􅀜上是也足太隂經也與足陽明爲表裏以胃合爲府合於中焦脾胃之間名曰章門在季脇前一寸半腎部在右手􅀜後尺中是也足少隂經也與足太陽爲表裏以膀胱合爲府合於下焦在􅀜元右左屬腎右爲子户名曰三焦辨藏腑病脉隂陽大法第八脉何以知藏腑之病也然数者腑也遟者藏也数即有􅀬遟即生寒諸陽爲􅀬諸隂爲寒故别知藏腑之病也腑者陽故其脉數藏者隂故其脉遟陽行遟病則數隂行疾病則遟脉來浮大者此爲肺脉也脉來沈滑如石腎脉也脉來如弓弦者肝脉也脉來疾去遟心脉也脉來當見而不見爲病病有深淺但當知如何受邪辨脉隂陽大法第九脉有隂陽之法何謂也然呼出心與肺吸入腎與肝呼吸之間脾受榖味也其脉在中浮者陽也沈者隂也故曰隂陽心肺俱浮何以别之然浮而大散者心也浮而短濇者肺也腎肝俱沈何以别之然牢而長者肝也按之耎舉指來實者腎也脾者中州故其脉在中千金翼云遟緩而長者脾也是隂陽之脉也脉有陽盛隂虚隂盛陽虚何謂也然浮之損小沈之實大故曰隂盛陽虚沈之損小浮之實大故曰陽盛隂虚是隂陽虚實之意也陽脉見寸曰浮而實大今輕手浮之更損减而小故言陽虚重手按之反更實大而沈故言隂實經言脉有一隂一陽一隂二陽一隂三陽有一陽一隂一陽二隂一陽三隂如此言之寸口有六脉俱動耶然經言如此者非有六脉俱動也謂浮沈長短滑濇也浮者陽也滑者陽也長者陽也沈者隂也濇者隂也短者隂也所以言一隂一陽者謂脉來沈而滑也一隂二陽者謂脉來沈滑而長也一隂三陽者謂脉來浮滑而長時一沈也所以言一陽一隂者謂脉來浮而濇也一陽二隂者謂脉來長而沈濇也一陽三隂者謂脉來沈濇而短時一浮也各以其經所在名病之逆順也凢脉大爲陽浮爲陽數爲陽動爲陽長爲陽滑爲陽沈爲隂濇爲隂弱爲隂絃爲隂短爲隂微爲隂是爲三隂三陽也陽病見隂脉者反也主死隂病見陽脉者順也主生􅀜前爲陽􅀜後爲隂陽數則吐血隂㣲則下利陽絃則頭痛隂絃則腹痛陽㣲則發汗隂㣲則自下陽數口生瘡隂數加㣲必惡寒而煩撓不得眠也隂附陽則強陽附隂則癲得陽属腑得隂属藏無陽則厥無隂則嘔陽㣲則不能呼隂㣲則不能吸呼吸不足􅎍中短氣依此隂陽以察病也寸口脉浮大而疾者名曰陽中之陽病苦煩滿身􅀬頭痛腹中􅀬寸口脉沈細者名曰陽中之隂病苦傷悲不樂惡聞人聲少氣時汗出隂氣不通臂不能舉尺脉沈細者名曰隂中之隂病苦兩脛酸疼不能乆立隂氣衰小便餘􅄋隂下濕癢尺脉滑而浮大者名曰隂中之陽病苦小腹痛滿不能溺溺即隂中痛大便亦然尺脉牢而長􅀜上無有此爲隂干陽其人苦兩脛重少腹引腰痛寸口脉壯大尺中無有此爲陽干隂其人苦腰背痛隂中傷足脛寒夫風傷陽寒傷隂陽病順隂隂病逆陽陽病易治隂病難治在腸胃之間以藥和之若在經脉之間鍼灸病巳平虚實第十人有三虚三實何謂也然有脉之虚實有病之虚實有診之虚實脉之虚實者脉來耎者爲虚牢者爲實病之虚實者出者爲虚入者爲實言者爲虚不言者爲實緩者爲虚急者爲實診之虚實者癢者爲虚痛者爲實外痛内快爲外實内虚内痛外快爲内實外虚故曰虚實也問曰何謂虚實荅曰邪氣盛則實精氣奪則虚何謂重實所謂重實者言大􅀬病氣􅀬脉滿是謂重實問曰經絡俱實如何何以治之荅曰經絡皆實是寸脉急而尺緩也當俱治之故曰滑則順濇則逆夫虚實者皆從其物􅀋始五藏骨肉滑利可以長乆從橫逆順伏匿脉第十一問曰脉有相乗有從仲景從字作縱字有横有逆有順何謂也師曰水行乗火金行乗木名曰從火行乗水木行乗金名曰横水行乗金火行乗木名曰逆金行乗水木行乗火名曰順經言脉有伏匿者伏匿於何藏而言伏匿也然謂隂陽更相乗更相伏也脉居隂部反見陽脉者爲陽乗隂也脉雖時沈澀而短此陽中伏隂脉居陽部反見隂脉者爲隂乗陽也脉雖時浮滑而長此爲隂中伏陽也重隂者癲重陽者狂脫陽者見􅀑脫隂者目盲辨災恠恐怖雜脉第十二問曰脉有殘賊何謂師曰脉有絃有緊有濇有滑有浮有沈此六脉爲殘賊能與諸經作病問曰嘗爲人所難緊脉何所從而來師曰假令亡汗若吐肺中寒故令緊假令欬者坐飲冷水故令緊假令下利者以胃中虚冷故令緊也問曰翕奄沈名曰滑何謂師曰沈爲純隂翕爲三陽隂陽和合故脉滑也問曰脉有災恠何謂師曰假令人病脉得太陽脉與病形證相應因爲作湯比還送湯之時病者因反大吐若下痢仲景痢字作利病腹中痛因問言我前來脉時不見此證今反變異故是名爲災恠因問何縁作此吐痢荅曰或有先服藥今發作故爲災恠也問曰人病恐怖其脉何􅀋師曰形脉如循絲累累然其面白脫色問曰人媿者其脉何等􅀋師曰其脉自浮而弱面形乍白乍赤問曰人不飲其脉何􅀋師曰其脉自濇而唇口乾燥也言遟者風也揺頭言者其裏痛也行遟者其表彊也坐而伏者短氣也坐而下一􅂰者必腰痛裏實護腹如懷􅆑者必心痛師持脉病人欠者無病也脉之因伸者無病也一云呻者病也假令向壁卧聞師到不驚起而目眄視一云反面仰視若三言三止脉之咽唾此爲詐病假令脉自和處言此病太重當須服吐下藥鍼灸數十百處乃愈遟疾短長雜病法第十三黃帝問曰余聞胃氣手少陽三焦四時五行脉法夫人言脉有三隂三陽知病存亡脉外以知内尺寸大小願聞之歧伯曰寸口之中外别浮沈前後左右虚實死生之要皆見寸口之中脉從前來者爲實邪從後來者爲虚邪從所不勝來者爲賊邪從所勝來者爲微邪自病一作得者爲正邪外結者病癰腫内結者病疝瘕也間來而急者病正在心癥氣也脉來疾者爲風也脉來滑者爲病食也脉來滑躁者病有􅀬也脉來澀者爲病寒濕也脉逆順之道不與衆謀師曰夫呼者脉之頭也􅀄持之來疾去遟此爲出疾入遟爲内虚外實􅀄持脉來遟去疾此爲出遟入疾爲内實外虚也脉數則在府遟則在藏脉長而弦病在肝扁鵲云病出於肝脉小血少病在心扁鵲云脉大而洪病出於心脉下堅上虚病在脾胃扁鵲云病出於脾胃脉滑一作澀而㣲浮病在肺扁鵲云病岀於肺脉大而堅病在腎扁鵲云小而緊脉滑者多血少氣脉澀者少血多氣脉大者血氣俱多又云脉來大而堅者血氣俱實脉小者血氣俱少又云脉來細而微者血氣俱虚沈細滑疾者􅀬遟緊爲寒又云俱數滑疾爲􅀬濇遟沈細爲寒脉盛滑緊者病在外􅀬脉小實而緊者病在内冷脉小弱而濇者謂之乆病脉滑浮而疾者謂之新病脉浮滑其人外􅀬風走刺有飲難治脉沈而緊上焦有􅀬下寒得冷即便下脉沈而細下焦有寒小便數時苦絞痛下利重脉浮緊且滑直者外􅀬内冷不得大小便脉洪大緊急病速進在外苦頭發􅀬癰腫脉細小緊急病速進在中寒爲疝瘕積聚腹中刺痛脉沈重而直前絶者病血在腸間脉沈重而中散者因寒食成癥脉直前而中散絶者病消渴一云病浸淫痛脉沈重前不至寸口徘徊絶者病在肌肉遁尸脉左轉而沈重者氣癥陽在􅎍中脉右轉出不至寸口者内有肉癥脉累累如貫珠不前至有風寒在大腸伏留不去脉累累中止不至寸口輭者結􅀬在小腸膜中伏留不去脉直前左右彈者病在血脉中肧血也脉後而左右彈者病在筋骨中也脉大後小即頭痛目眩脉前小後大即􅎍滿短氣上部有脉下部無脉其人當吐不吐者死上部無脉下部有脉雖困無所苦夫脉者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少太素細作滑濇則心痛渾渾革革至如涌泉病進而危弊弊綽綽其去如絃絶者死短而急者病在上長而緩者病在下沈而絃急者病在内浮而洪大者病在外脉實者病在内脉虚者病在外在上爲表在下爲裏浮爲在表沈爲在裏平人得病所起第十四何以知春得病無肝脉也無心脉夏得病無肺脉秋得病無腎脉冬得病無脾脉四季之月得病假令肝病者西行若食雞肉得之當以秋時發得病以庚辛日也家有腥死女子見之以明要爲災不者􅀂感金銀物得之假令脾病東行若食雉兎肉及諸木果實得之不者當以春時發得病以甲乙日也假令心病北行若食豚魚得之不者當以冬時發得病以壬癸日也假令肺病南行若食馬肉及麞鹿肉得之不者當以夏時發得病以丙丁日也假令腎病中央若食牛肉及諸土中物得之不者當以長夏時發得病以戊己日也假令得王脉當於縣官家得之假令得相脉當於嫁娶家得之或相慶賀家得之假令得胎脉當於産乳家得之假令得囚脉當於囚徒家得之假令得休脉其人素有􅀫病不治自愈假令得死脉當於死䘮家感傷得之何以知人露卧得病陽中有隂也何以知人夏月得病諸陽入隂也何以知人食飲中毒浮之無陽㣲細之不可知也但有隂脉來疾去疾此相爲水氣之毒也脉遟者食乾物得之診病將差難已脉第十五問曰假令病人欲差脉而知愈何以别之師曰寸􅀜尺大小遲疾浮沈同等雖有寒􅀬不解者此脉隂陽爲平復當自愈人病其寸口之脉與人迎之脉大小及浮沈等者病難已新刋王氏脉經卷第一
