  text: 新刋王氏脉經卷第四
  hash: sha256:f0cf47b70c820e5a8e9f0875daeceb655f07b76f9cc599764749e2ac955ad385
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0009_SBCK_004-1a}
body:
  text: 朝散大夫守光禄卿直秘閣判登聞檢院上護軍臣林億等􅀋次辨三部九候脉證第一平雜病脉第二診五藏六腑氣絶證候第三診四時相反脉第四診損至脉第五診脉動止投數踈數死期年月第六診百病死生决第七診三部虚實决死生第八辨二部九候脉證第一經言所謂三部者寸􅀜尺也九候者每部中有天地人也上部主候從􅇩以上至頭中部主候從膈以下至氣街下部主候從氣街以下至足浮沈牢結遟疾滑濇各自異名分理察之勿怠觀変所以别三部九候知病之所起審而明之針灸亦然也故先候脉寸中寸中一作十中於九浮在皮膚沈細在裏昭昭天道可得長乆上部之候牢結沈滑有積氣在膀胱微細而弱卧引裏急頭痛欬􅎳逆氣上下心膈上有􅀬者口乾渇燥病從寸口邪入上者名曰解脉來至狀如琴絃苦少腹痛女子經月不利孔竅生瘡男子病痔左右脇下有瘡上部不通者苦少腹痛腸鳴寸口中虚弱者傷氣氣不足大如桃李實苦痺也寸口直上者逆虚也如浮虚者泄利也中部脉結者腹中積聚若在膀胱兩脅下有􅀬脉浮而大風從胃管入水脹乾漚心下澹澹如有桃李核胃中有寒時苦煩痛不食食即心痛胃脹支滿膈上積脅下有􅀬時寒􅀬淋露脉横出上者脅氣在膀胱病即著右横􅀜入寸口中者膈中不通喉中咽難刺􅀜元入少隂下部脉者其脉來至浮大者脾也與風集合時上頭痛引腰背小滑者厥也足下􅀬煩滿逆上搶心上至喉中狀如惡肉脾傷也病少腹下在􅂰諸骨節間寒清不可屈伸脉急如絃者筋急足挛結者四胑重從尺邪入陽明者寒􅀬也大風邪入少隂女子漏白下赤男子溺血隂萎不起引少腹痛人有三百六十脉法三百六十日三部者寸􅀜尺也尺脉爲隂隂脉常沈而遟寸􅀜爲陽陽脉俱浮而速氣出爲動入爲息故陽脉六息七息十三投隂脉八息七息十五投此其常也二十八脉相逐上下一脉不來知疾所苦尺勝治下寸勝治上尺寸俱平治中央臍以上陽也法於天臍以下隂也法於地臍爲中􅀜頭爲天足爲地有表無裏邪之所止得􅀑病何謂麦裏寸尺爲表􅀜爲裏兩頭有脉􅀜中絶不至也尺脉上不至􅀜爲隂絶寸脉下不至􅀜爲陽絶隂絶而陽微死不治三部脉或至或不至冷氣在胃中故令脉不通也上部有脉下部無脉其人當吐不吐者死上部無脉下部有脉雖困無所苦所以然者譬如人之有尺樹之有根雖枝葉枯槀根本將自生木有根本即自有氣故知不死也寸口脉平而死者何也然諸十二經脉者皆係於生氣之原所謂生氣之原者非謂十二經之根本也謂腎間動氣也此五藏六府之本十二經之根呼吸之門三焦之原一名守邪之神也故氣者人根本也根絶則莖枯矣寸口脉平而死者生氣獨絶於内也腎間動氣謂左為腎右為命門命門者精神之所舎原氣之所係也一名守邪之神以命門之神固守邪氣不得妄入入即死矣此腎氣先絶於内其人便死其脉不復反得動病也岐伯曰形盛脉細少氣不足以息者死形瘦脉大􅇩中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脉相應如參舂者病甚上下左右相失不可数者死中部之􅀱雖獨調與衆藏相失者死中部之候相减者死目内䧟者死黃帝曰冬隂夏陽柰何歧伯曰九􅀱之脉皆沈細懸絶者爲隂主冬故以夜半死盛躁喘数者爲陽主夏故以日中死是故寒􅀬者平旦死􅀬中及􅀬病者日中死病風者以日夕死病水者以夜半死其脉乍数乍踈乍遟乍疾者以日乗四季死形肉以脫九􅀱雖調猶死七診雖見九候皆順者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脉候亦敗者死矣必發􅎪噫必審問其所始病與今之所方病而后各切循其脉視其經絡浮沈以上下逆順循之其脉疾者不病其脉遟者病脉不往來者死皮膚著者死兩手脉結上部者濡結中部者緩結三里者豆起弱反在􅀜濡反在巔微在其上濇反在下微即陽氣不足沾􅀬汗出濇即無血厥而且寒黃帝問曰余每欲視色持脉獨調其尺以言其病從外知内爲之柰何歧伯對曰審其尺之緩急小大滑澀肉之堅脆而病形變定矣調之何如對曰脉急者尺之皮膚亦急脉緩者尺之皮膚亦緩脉小者尺之皮膚减而少脉大者尺之皮膚亦大脉滑者尺之皮膚亦滑脉濇者尺之皮膚亦濇凡此六変有微有甚故善調尺者不待于寸善調脉者不待于色能參合行之可爲上工尺膚滑以淖澤者風也尺内弱解㑊安卧脫肉者寒􅀬也尺膚濇者風痺也尺膚麄如枯魚之鱗者水淡飲也尺膚􅀬甚脉盛躁者病温也其脉盛而滑者汗且出尺膚寒甚脉小一作急者泄少氣尺膚烜然烜然甲乙作􅀬炙人手先􅀬後寒者寒􅀬也尺膚先寒乆持之而􅀬者亦寒􅀬也尺烜然􅀬人迎大者甞奪血尺緊人迎脉小甚則少氣色白有加者立死肘所獨􅀬者腰以上􅀬肘前獨􅀬者膺前􅀬肘後獨􅀬者肩背􅀬肘後麄以下三四寸腸中有蟲手所獨􅀬者腰以上􅀬臂中獨􅀬者腰腹􅀬掌中􅀬者腹中􅀬掌中寒者腹中寒魚上白肉有青血脉者胃中有寒諸浮諸沈諸滑諸澀諸弦諸緊􅀂在寸口膈以上病􅀂在􅀜上胃以下病􅀂在尺中腎以下病寸口脉滑而遟不沈不浮不長不短爲無病左右同法寸口太過與不及寸口之脉中手短者曰頭痛中手長者曰足脛痛中手促上擊者曰肩背痛寸口脉浮而盛者病在外寸口脉沈而堅者病在中寸口脉沈而弱者曰寒􅀬一作氣又作中及疝瘕少腹痛寸口脉沈而弱髪必墮落寸口脉沈而緊苦心下有寒時痛有積聚寸口脉沈􅇩中短氣寸口脉沈而喘者寒􅀬寸口脉但實者心勞寸口脉緊或浮膈上有寒肺下有水氣脉緊而長過寸口者注病脉緊上寸口者中風風頭痛亦如之千金翼云亦為傷寒頭痛脉弦上寸口者􅀫食降者頭痛脉來過寸入魚際者遺尿脉出魚際逆氣喘息寸口脉潎潎如羮上肥陽氣微連連如蜘蛛絲隂氣衰寸口脉偏絶則臂偏不遂其人兩手俱絶者不可治兩手前部陽絶者苦心下寒毒喙中􅀬􅀜上脉浮而大風在胃中張口肩息心下澹澹食欲嘔􅀜上脉微浮積􅀬在胃中嘔吐蚘蟲心徤忘􅀜上脉滑而大小不勻千金云必吐逆是爲病方欲進不出一二復欲發動其人欲多飲飲即注利如利止者生不止者死􅀜上脉緊而滑者蚘動􅀜上脉澀而堅大而實按之不減有力爲中焦實有伏結在脾肺氣塞實􅀬在胃中􅀜上脉䄡䄡大而尺寸細者其人必心腹冷積癥瘕結聚復欲發動其人欲多飲飲即注利如利止者生不止􅀜上脉時來時去乍大乍小乍踈乍数者胃中寒􅀬羸劣欲飲食如瘧狀尺脉浮者客陽在下焦尺脉細微溏泄下冷利尺脉弱寸彊胃絡脉傷尺脉虚小者足脛寒痿痺脚疼尺脉澀下血不利多汗素問又云尺澀脉滑謂之多汗尺脉滑而疾爲血虚尺脉沈而滑者寸白蟲尺脉細而急者筋攣痺不能行尺脉麄常􅀬者謂之􅀬中腰胯疼小便赤􅀬尺脉偏滑疾面赤如醉外􅀬則病平雜病脉第二滑爲實爲下又為陽氣衰数爲虚爲􅀬浮爲風爲虚動爲痛爲驚沈爲水爲實又為􅄦疰弱爲虚爲悸遟則爲寒濇則少血緩則爲虚洪則爲氣一作􅀬緊則爲寒数爲瘧瘧脉自弦弦数多􅀬弦遟多寒微則爲虚代㪚則死弦爲痛痺一作浮為風疰偏弦爲飲􅀟弦則脅下拘急而痛其人濇惡寒濇脉大寒􅀬在中伏者霍亂安卧脉盛謂之脫血凢亡汗肺中寒飲冷水欬嗽下利胃中虚冷此等其脉並緊浮而大者風浮大者中風頭重鼻塞浮而緩皮膚不仁風寒入肌肉滑而浮散者攤緩風滑者􅀑疰澀而緊痺病浮洪大長者風眩癲疾大堅疾者癲病弦而鈎脇下如刀刺狀如蜚尸至困不死緊而急者遁尸洪大者傷寒􅀬病浮洪大者傷寒秋吉春成病浮而滑者􅀫食浮滑而疾者食不消脾不磨短疾而滑酒病浮而細滑傷飲遟而滑中寒有癥結駃而緊積聚有擊痛弦急疝瘕小腹痛又爲癖病一作痺病遟而滑者脹盛而緊曰脹弦小者寒癖沈而弦者懸飲内痛弦數有寒飲冬夏難治緊而滑者吐逆小弱而濇胃反遟而緩者有寒微而緊者有寒沈而遲腹藏有冷病微弱者有寒少氣實緊胃中有寒苦不能食時時利者難治一作時時嘔稽􅇔難治滑數心下結􅀬盛滑疾胃中有􅀬緩而滑曰􅀬中沈一作浮而急病傷寒暴發虚􅀬浮而絶者氣辟大而滑中有短氣浮短者其人肺傷諸氣㣲少不過一年死法當􅎳也沈而數中水冬不治自愈短而數心痛心煩弦而緊脇痛藏傷有瘀血一作有寒血沈而滑爲下重亦爲背膂痛脉來細而滑按之能虚因急持直者僵仆從高墮下病在内微浮秋吉冬成病微數雖甚不成病不可勞浮滑疾緊者以合百病乆易愈陽邪來見浮洪隂邪來見沈細水榖來見堅實脉來乍大乍小乍長乍短者爲祟脉來洪大嫋嫋者社祟脉來沈沈澤澤四支不仁而重土祟脉與肌肉相得乆持之至者可下之弦小緊者可下之緊而数寒􅀬俱發必下乃愈弦遟者宜温薬緊数者可發其汗診五藏六腑氣絶證候第三病人肝絶八日死何以知之面青但欲伏眠目視而不見人汗一作泣出如水不止一曰二日死病人膽絶七日死何以知之眉爲之傾病人筋絶九日死何以知之手足爪甲青呼罵不休一曰八日死病人心絶一日死何以知之肩息回視立死一曰目亭亭一日死病人腸一云小腸絶六日死何以知之髮直如乾麻不得屈伸白汗不止病人脾絶十二日死何以知之口冷足腫腹􅀬臚脹泄利不覺出無時度一曰五日死病人胃絶五日死何以知之脊痛􅆎中重不可反覆一曰腓腸平九日死病人肉絶六日死何以知之耳乾舌皆腫溺血大便赤泄一曰足腫九日死病人肺絶三日死何以知之口張但氣出而不還一曰鼻口虚張短氣病人大腸絶不治何以知之泄利無度利絶則死病人腎絶四日死何以知之齒爲暴枯靣爲正黒目中黃色􅆎中欲折白汗出如流水一曰人中平七日死病人骨絶齒黃落十日死諸浮脉無根者皆死巳上五藏六腑爲根也診四時相反脉證第四春三月木王肝脉治當先至心脉次之肺脉次之腎脉次之此爲四時王相順脉也到六月土王脾脉當先至而反不至反得腎脉此爲腎反脾也七十日死何謂賢反脾夏火王心脉當先至肺脉次之而反得腎脉是謂腎反脾期五月六月忌丙丁脾反肝三十日死何爲脾反肝春肝脉當先至而反不至脾脉先至是謂脾反肝期正月二月忌甲乙腎反肝三􅀊死何謂腎反肝春肝脉當先至而反不至腎脉先至是謂腎反肝也期七月八月忌庚辛腎反心二􅀊死何謂腎反心夏心脉當先至而反不至腎脉先至是謂腎反心也期六月忌戊已臣億等按千金云此中不論肺金之氣踈畧未諭指南又推五行亦頗顚倒待求别録也診損至脉第五脉有損至何謂也然至之脉一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絶此至之脉也何謂損一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絶此損之脉也至脉從下上損脉從上下也損脉之爲病柰何然一損損於皮毛皮聚而毛落二損損於血脉血脉虚少不能榮於五藏六府也三損損於肌肉肌肉痟痩食飲不爲肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於牀反此者至於收病也從上下者骨痿不能起於牀者死從下上者皮聚而毛落者死治損之法柰何然損其肺者益其氣損其心者益其榮衛損其脾者調其飲食適其寒温損其肝者緩其中損其腎者益其精氣此治損之法也脉有一呼再至一吸再至一呼三至一吸三至一呼四至一吸四至一呼五至一吸五至一呼六至一吸六至一呼一至一吸一至再呼一至再吸一至呼吸再至脉來如此何以别知其病也然脉來一呼再至一吸再至不大不小曰平一呼三至一吸三至爲適得病前大後小即頭痛目眩前小後大即􅇩滿短氣一呼四至一吸四至病適欲甚脉洪大者苦煩滿沈細者腹中痛滑者傷􅀬濇者中霧露一呼五至一吸五至其人當困沈細即夜加浮大即晝加不大小雖困可治其有大小者爲難治一呼六至一吸六至爲十死脉也沈細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當一作獨未着牀所以然者血氣皆不足故也再呼一至再吸一至名曰无䰟无䰟者當死也人雖能行名曰行尸扁鵲曰脉一出一入曰平再出一入少隂三出一入太隂四出一入厥隂再入一出少陽三入一出陽明四入一出太陽脉岀者爲陽入者爲隂故人一呼而脉再動氣行三寸一吸而脉再動氣行三寸呼吸定息脉五動一呼一吸爲一息氣行六寸人十息脉五十動氣行六尺二十息脉百動爲一備之氣以應四時天有三百六十五日人有三百六十五節晝夜漏下水百刻一備之氣脉行丈二尺一日一夜行於十二辰氣行尽則周遍於身與天道相合故曰平平者无病也一隂一陽是也脉再動爲一至再至而緊即奪氣一刻百三十五息十刻千三百五十息百刻萬三千五百息二刻爲一度一度氣行一周身晝夜五十度脉三至者離經一呼而脉三動氣行四寸半人一息脉七動氣行九寸十息脉七十動氣行九尺一備之氣脉百四十動氣行一丈八天一周於身氣過百八十度故曰離經離經者病一隂二陽是也三至而緊則奪血脉四至則奪精一呼而脉四動氣行六寸人一息脉九動氣行尺二寸人十息脉九十動氣行一丈二尺一備之氣脉百八十動氣行二丈四尺一周於身氣過三百六十度再遍於身不及五節一時之氣而重至諸脉浮濇者五藏无精難治一隂三陽是也四至而緊則奪形脉五至者死一呼而脉五動氣行六寸半當行七寸半人一息脉十一動氣行尺三寸當行尺五寸人十息脉百一十動氣行丈三尺當行丈五尺一備之氣脉二百二十動氣行二丈六尺當行三丈一周於身三百六十五節氣行過五百四十度再周於身過百七十度一節之氣而至此氣浮濇經行血氣竭尽不守於中五藏痿痟精神散亡脉五至而緊則死三隂一作二三陽是也雖五猶末如之何也脉一損一乗者人一呼而脉一動人一息而脉再動氣行三寸十息脉二十動氣行三尺一備之氣脉四十動氣行六尺不及周身百八十節氣短不能周遍於身苦少氣身躰􅈈墮矣脉再損者人一息而脉一動氣行一寸五分人十息脉十動氣行尺五寸一備之氣脉二十動氣行三尺不及周身二百節疑氣血盡經中不能及故曰離經血去不在其處小大便皆血也脉三損者人一息復一呼而脉一動十息脉七動氣行尺五寸當行尺五分一備之氣脉十四動氣行三尺一寸當行二尺一寸不及周身二百九十七節故曰爭氣行血流不能相與俱㣲氣閉实則􅇩滿藏枯而爭於中其氣不朝血凝於中死矣脉四損者再息而脉一動人十息脉五動氣行七寸半一備之氣脉十動氣行尺五寸不及周身三百一十五節故曰亡血亡血者忘失其度身羸疲皮裹骨故血氣俱尽五藏失神其死神矣脉五損者人再息復一呼而脉一動人十息脉四動氣行六寸一備之氣脉八動氣行尺二寸不及周身三百二十四節故曰絶絶者氣急不下牀口氣寒脉俱絶死矣歧伯曰脉失四時者爲至啓至啓者爲損至之脉也損之爲言少隂主骨爲重此志損也飲食衰減肌肉消者是意損也身安卧卧不便利耳目不明是魂損也呼吸不相通五色不華是魄損也四肢皆見脉爲亂是神損也大損三十􅀊中損二十􅀊下損十􅀊損各以春夏秋冬平人人長脉短者是大損三十􅀊人短脉長者是中損二十􅀊手足皆細是下損十􅀊失精氣者一􅀊而損男子左脉短右脉長是爲陽損半􅀊女子右脉短左脉長是爲隂損半􅀊春脉當得肝脉反得脾肺之脉損夏脉當得心脉反得腎肺之脉損秋脉當得肺脉反得肝心之脉損冬脉當得腎脉反得心脾之脉損當審切寸口之脉知絶不絶前後去爲絶掌上相擊堅如彈石爲上脉虚盡下脉尚有是爲有胃氣上脉盡下脉堅如彈石爲有胃氣上下脉皆盡者死不絶不消者皆生是損脉也至之爲言言語音深逺視憒憒是志之至也身體粗大飲食暴多是意之至也語言妄見手足相引是魂之至也蘢葱華色是魄之至也脉微小不相應呼吸自大是神之至也是至脉之法也死生相應病各得其氣者生十得其半也黃帝曰善診脉動止投數踈數死期年月第六脉一動一止二日死一經云一日死二動一止三日死三動一止四日死或五日死四動一止六日死五動一止五日死或七日死六動一止八日死七動一止九日死八動一止十日死九動一止九日死又云十一日死一經云十三日死􅀂立春死十動一止立夏死一經云立春死十一動一止夏至死經云立夏死經云立秋死十二十三動一止立秋死一經云立冬死十四十五動一止立冬死一經云立夏死二十動一止一􅀊死􅀂立秋死二十一動一止二􅀊死二十五動一止立冬死一經云一􅀊死或二􅀊死三十動一止二􅀊􅀂三􅀊死三十五動一止三􅀊死四十動一止四􅀊死五十動一止五􅀊死不滿五十動一止五􅀊死脉來五十投而不止者五藏皆受氣即無病千金方云五行氣畢隂陽數同榮衛出入經脉通流晝夜百刻五德相生脉來四十投而一止者一藏無氣却後四􅀊春草生而死脉來三十投而一止者二藏無氣却後三􅀊麥熟而死脉來二十投而一止者三藏無氣却後二􅀊桑椹赤而死脉來十投而一止者四藏無氣􅀊中死得節不動出清明日死逺不出榖雨死矣脉來五動而一止者五藏無氣却後五日而死脉一來而乆住者􅀫病在心主中治脉二來而乆住者病在肝枝中治脉三來而乆住者病在脾下中治脉四來而乆住者病在腎間中治脉五來而乆住者病在肺枝中治五脉病虚羸人得此者死所以然者藥不得而治針不得而及盛人可治氣全故也診百病死生决第七診傷寒􅀬盛脉浮大者生沈小者死傷寒巳得汗脉沈小者生浮大者死温病三四日以下不得汗脉大疾者生脉細小難得者死不治温病穣穣大􅀬其脉細小者死千金穣穰作時行温病下利腹中痛甚者死不治温病汗不岀出不至足者死厥逆汗出脉堅彊急者主虚緩者死温病二三日身體􅀬腹滿頭痛食飲如故脉直而疾者八日死四五日頭痛腹痛而吐脉來細彊十二日死八九日頭不疼身不痛目不赤色不變而反利脉來牒牒按之不彈手時大心下堅十七日死􅀬病七八日脉不軟一作喘不散一作數者當瘖瘖後三日温汗不出者死􅀬病七八日其脉㣲細小便不利加暴口燥脉代舌焦乾黒者死􅀬病未得汗脉盛躁疾得汗者生不得汗者難差􅀬病巳得汗脉静安者生脉躁者難治􅀬病巳得汗常大􅀬不去者亦死大一作專􅀬病巳得汗􅀬未去脉㣲躁者愼不得刺治􅀬病發􅀬􅀬甚者其脉隂陽皆竭愼勿刺不汗出必下利診人􅀍風不仁痿蹷其脉虚者生堅急疾者死診癲病虚則可治實則死癲疾脉實堅者生脉沈細小者死癲疾脉􅅮大滑者乆乆自巳其脉沈小急實不可治小堅急亦不可療診頭痛目痛乆視無所見者死乆視一作卒視診人心腹積聚其脉堅彊急者生虚弱者死又實彊者生沈者死其脉大腹大脹四肢逆冷其人脉形長者死腹脹滿便血脉大時絶極下血脉小疾者死心腹痛痛不得息脉細小遟者生堅大疾者死腸澼便血身􅀬則死寒則生腸澼下白沬脉沈則生浮則死腸澼下膿血脉懸絶則死滑大則生腸澼之属身􅀬脉不懸絶滑大者生懸濇者死以藏期之腸澼下膿血脉沈小流連者生數疾且大有􅀬者死腸澼筋攣其脉小細安静者生浮大緊者死洞洩食不化不得留下膿血脉㣲小連者生緊急者死􅂥注脉緩時小結者生浮大數者死􅉶蝕隂疘其脉虚小者生緊急者死欬嗽脉沈緊者死浮直者生浮軟者生小沈伏匿者死欬嗽羸瘦脉形堅大者死欬脫形發􅀬脉小堅急者死肌瘦下一本云不脫形􅀬不去者死欬而嘔腹脹且􅂥其脉弦急欲絶者死吐血衂血脉滑小弱者生實大者死汗出若衂其脉小滑者生大躁者死唾血脉緊彊者死滑者生吐血而欬上氣其脉數有􅀬不得卧者死上氣脉數者死謂其形損故也上氣喘息低昻其脉滑手足温者生脉澀四肢寒者死上氣面浮腫肩息其脉大不可治加利必死一作又甚上氣注液其脉虚寧寧伏匿者生堅彊者死寒氣上攻脉實而順滑者生實而逆澀者死太素云寒氣暴上脉滿實何如曰實而滑則生實而逆則死矣其形盡滿何如曰㪯形盡滿者脉急大堅尺滿而不應如是者順則生逆則死何謂順則生逆則死曰所謂順者手足温也謂逆者手足寒也痟癉脉實大病乆可治脉懸小堅急病乆不可治消渇脉数大者生細小浮短者死消渇脉沈小者生實堅大者死水病脉洪大者可治㣲細者不可治水病脹閉其脉浮大軟者生沈細虚小者死水病腹大如鼔脉實者生虚者死卒中惡􅄍血數升脉沈數細者死浮大疾快者生卒中惡腹大四肢滿脉大而緩者生緊大而浮者死緊細而微者亦生病瘡腰脊彊急瘈瘲者皆不可治寒􅀬瘈瘲其脉代絶者死金瘡血岀太多其脉虚細者生數實大者死金瘡出血脉沈小者生浮大者死斫瘡出血一二石脉來大二十日死斫刺俱有病多少血出不自止斷者其脉止脉來大者七日死滑細者生從高傾仆内有血腹脹滿其脉堅彊者生小弱者死人爲百藥所中傷脉浮澀而疾者生微細者死洪大而遟者生千金遟作速人病甚而脉不調者難差人病甚而脉洪者易差人内外俱虚身體冷而汗出㣲嘔而煩擾手足厥逆體不得安静者死脉實滿手足寒頭􅀬春秋生冬夏死老人脉微陽羸隂彊者生脉焱大加息一作如急者死隂弱陽彊脉至而代竒一作􅀉月而死尺脉濇而堅爲血實氣虚也其發病腹痛逆滿氣上行此爲婦人胞中絶傷有惡血乆成結瘕得病以冬時􅁰穄赤而死尺脉細而微者血氣俱不足細而來有力者是榖氣不充病得節輙動􅀥葉生而死此病秋時得之左手寸口脉偏動乍大乍小不齊從寸口至􅀜􅀜至尺三部之位處處動揺各異不同其人病仲夏得之此脉桃花落而死花一作葉右手寸口脉偏沈伏乍小乍太朝來浮大暮夜沈伏浮大即太過上出魚際沈伏即下不至􅀜中往來無常時時復來者榆葉枯落而死葉一作英右手尺部脉三十動一止有頃更還二十動一止乍動乍踈連連相因不與息數相應其人雖食榖猶不愈蘩草生而死左手尺部脉四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索至立冬死千金作至立春而死診三部脉虚實决死生第八三部脉調而和者生三部脉廢者死三部脉虚其人長病得之死虚而濇長病亦死虚而滑亦死虚而緩亦死虚而弦急癲病亦死三部脉實而大長病得之死實而滑長病得之生卒病得之死實而緩亦生實而緊亦生實而緊急癲癇可治三部脉彊非稱其人病便死三部脉羸非其人一作脉得之死三部脉麄長病得之死卒病得之生三部脉細而軟長病得之生細而數亦生微而緊亦生三部脉大而數長病得之生卒病得之死三部脉微而伏長病得之死三部脉軟一作濡長病得之不治自愈治之死卒病得之生三部脉浮而結長病得之死浮而滑長病亦死浮而數長病風得之生卒病得之死三部脉芤長病得之生卒病得之死三部脉弦而數長病得之生卒病得之死三部脉革長病得之死卒病得之生三部脉堅而數如銀􅁫股蠱毒病必死數而軟蠱毒病得之生三部脉潎潎如羮上肥長病得之死卒病得之生三部脉連連如蜘蛛絲長病得之死卒病得之生三部脉如霹􅆮長病得之死三十日死三部脉如弓弦長病得之死三部脉累累如貫珠長病得之死三部脉如水淹然流長病不治自愈治之反死一云如水流者長病七十日死如水不流者長病不治自愈三部脉如屋漏長病十日死千金云十四日死三部脉如雀啄長病七日死三部脉如釡中湯沸朝得暮死夜半得日中死日中得夜半死三部脉急切腹間病又婉轉腹痛針上下差新刋王氏脉經卷第四
