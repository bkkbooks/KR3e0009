front:
  text: 新刋王氏脉經卷第十手檢圖三十一部
  hash: sha256:c6e527285aa32f6a8ca3e2452edaab5e8ccb83fa7887b460d3f9bfe5b8310ee1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0009_SBCK_010-1a}
body:
  text: 臣林億等􅀋次經言肺者人之五藏華蓋也上以應天解理萬物主行精氣法五行四時知五味寸口之中隂陽交㑹中有五部前後左右各有所主上下中央分爲九道浮沈結散知邪所在其道柰何歧伯曰脉大而弱者氣實血虚也脉大而長者病在下􅀱浮直上下交通者陽脉也堅在腎急在肝實在肺前如外者足太陽也中央如外者足陽明也後如外者足少陽也中央直前者手少隂也中央直中者手心主也中央直後者手太隂也前如内者足厥隂也中央如内者足太隂也後如内者足少隂也前部左右彈者陽蹻也中部左右彈者帶脉也後部左右彈者隂蹻也從少陽之厥隂者隂維也從少隂之太陽者陽維也來大時小者隂絡也來小時大者陽絡也前如外者足太陽也動苦頭項腰痛浮爲風濇爲寒􅀬緊爲􅀫食前如外者足太陽也動苦目眩頭頸項腰背強痛也男子隂下濕女子月水不利少腹痛引命門隂中痛子藏閉浮爲風濇爲寒血滑爲勞􅀬緊爲􅀫食鍼入九分却至六分中央如外者足陽明也動苦頭痛面赤㣲滑苦大便不利腸鳴不能食足脛痺中央如外者足陽明也動苦頭痛面赤􅀬浮㣲滑苦大便不利喜氣滿滑者爲飲濇爲􅄝卧腸鳴不能食足胻痺鍼入九分却至六分後如外者足少陽也動苦腰背胻股肢節痛後如外者足少陽也浮爲氣濇濇爲風血急爲轉筋絃爲勞鍼入九分却至六分右足三陽脉前如内者足厥隂也動苦少腹痛月經不利子藏閉前如内者足厥隂也動苦少腹痛與腰相連大便不利小便難莖中痛女子月水不利隂中寒子門壅絶内少腹急男子疝氣兩丸上入淋也鍼入六分却至三分中央如内者足太隂也動苦胃中痛食不下欬唾有血足脛寒少氣身重從腰上狀如居水中中央如内者足太隂也動苦腹滿上管有寒食不下病以飲食得之沈濇者苦身重四肢不動食不化煩滿不能卧足脛痛苦寒時欬血泄利黄鍼入六分却至三分後如内者足少隂也動苦少腹痛與心相引背痛淋從高墮下傷於内小便血後如内者足少隂也動苦小腹痛與心相引背痛淋從高墮下傷於尻内便血裏急月水來上搶心􅇩脇滿拘急股裏急也鍼入六分却至三分右足三隂脉前部左右彈者陽蹻也動苦腰背痛㣲濇爲風癎取陽蹻前部左右彈者陽蹻也動苦腰痛癲癎悪風偏枯僵仆羊鳴􅍙痺皮膚身體強一作淫痺直取陽蹻在外踝上三寸直絶骨是也中部左右彈者帶脉也動苦少腹痛引命門女子月水不來絶􅁇復下止隂辟寒令人無子男子苦少腹拘急或失精也後部左右彈者隂蹻也動苦癲癎寒􅀬皮膚強一作淫痺後部左右彈者隂蹻也動苦少腹痛裏急腰及髖窌下相連隂中痛男子隂疝女子漏下不止右陽蹻隂蹻帶脉中央直前者手少隂也動苦心痛㣲堅腹脇急實堅者爲感忤純虚者爲下利腸鳴滑者爲有娠女子隂中癢痛痛出玉門上一分前中央直中者手心主也動苦心疼面赤食苦咽多喜怒㣲浮者苦悲傷恍惚不樂也濇爲心下寒沈爲恐怖如人捕之狀也時寒􅀬有血氣中央直後者手太隂也動苦欬逆氣不得息浮爲内風緊濇者􅇩中有積􅀬時欬血也有沈􅀬右手三隂脉從少隂斜至太陽是陽維也動苦肌肉痺癢從少隂斜至太陽是陽維也動苦顚僵仆羊鳴手足相引甚者失音不能言癲疾直取客主人兩陽維脉在外踝絶骨下二寸從少陽斜至厥隂是隂維也動苦癲癎僵仆羊鳴從少陽斜至厥隂是隂維也動苦僵仆失音肌肉淫癢痺汗出惡風脉來暫大暫小是隂絡也一作結動若肉痺應時自發身洗洗也脈來暫小暫大者是陽絡也一作結動苦皮膚痛下部不仁汗出而寒也右陽維陰維陽絡陰絡脈前部横於寸口九丸者任脈也動苦少腹痛逆氣搶心胸拘急不得俛仰三部俱牢􅀡上􅀡下者衝脈也動苦胸中有寒疝三部俱浮􅀡上􅀡下者督脈也動苦腰脊彊痛不得俛仰大人顛小􅅜癇右任衝督三脈肺脈之來也如循榆葉曰平如風吹毛曰病如狀連珠者死期丙丁日禺中日中心脈之來也如反笋莞大曰平如連珠曰病前曲後居如帶鉤者死期壬癸日人定夜半肝脈之來也搏而若曰平如張新弓􅁌曰病如雞踐地者死期庚辛日晡時日入脾脈之來也阿阿如緩曰平如雞舉足曰病如鳥之啄如水之滿者死期甲乙日平旦日出腎脈之來也微細以長曰平來如彈石曰病去如觧索者死期戊已日食時日昳黄昏雞鳴右平五藏脈寸口中脈躁竟尺闗中無脈應陽干陰也動苦腰背腹痛陰中若傷足寒刺足太陽少隂直絶骨入九分灸太陰五壮尺中脈堅實竟尺寸口無脈應陰干陽也動苦兩脛腰重少腹痛顛疾刺足太陰踝上三寸鍼入五分又灸太陽陽蹻在足外踝上三寸􅀡絶骨是也寸口脈緊􅀡至魚際下小按之如持維竿一作雞毛狀其病腸鳴足痺痛酸腹滿不能食得之寒温刺陽維在外踝上三寸間也入五分此脈出魚際寸口脈沈著骨反仰其手乃得之此腎脈也動苦少腹痛腰體酸顛疾刺腎俞入七分又刺陰維入五分初持寸口中脈如細堅狀乆按之大而深動苦心下有寒胸脅苦痛陰中痛不欲近丈夫也此陰逆刺期門入六分又刺腎俞入五分可灸胃管七壮􅀄持寸口中脈如躁狀洪大久按之細而堅牢動苦腰腹相引痛以下至足胻重也不能食刺腎俞入四分至五分亦可灸胃管七壯尺寸俱沈但有闗上脈苦寒心下痛尺寸俱沈闗上無有者苦心下喘尺寸俱數有􅀬俱遲有寒尺寸俱微厥血氣不足其人少氣尺寸俱濡弱發􅀬惡寒出汗一云内温􅀬手足逆冷汗出寸口沈胸中痛引背一云短氣闗上沈心痛上吞酸尺中沈引背痛寸口伏胸中有逆氣闗上伏有水氣泄溏尺中伏水穀不消寸口􅁌胃中拘急一作心下愊愊闗上弦胃中有寒心下拘急尺中􅁌少腹臍下拘急寸口緊頭痛逆氣闗上緊心下痛尺中緊臍下少腹痛寸口濇無陽少氣闗上濇無血厥冷尺中濇無隂厥冷寸口微無陽外寒闗上微中實一作胃虚能食故裏急一作無胃氣尺中微無陰厥冷腹中拘急寸口滑胸滿逆闗上滑中實逆尺中滑下利少氣寸口數即吐闗上數胃中有􅀬尺中數惡寒小便赤黄寸口實即生􅀬虚即生寒闗上實即痛虛即脹滿尺中實即小便難少腹牢痛虛即閉塞寸口芤吐血微芤衄血闗上芤胃中虚尺中芤下血微芤小便血寸口浮其人中風發􅀬頭痛闗上浮腹痛心下滿尺中浮小便難寸口遲上焦有寒闗上遲弱無胃氣有􅀬尺中遲下焦有寒背痛寸口濡陽弱自汗出闗上濡下重尺中濡少血發􅀬惡寒寸弱陽氣少闗弱無胃氣尺弱少血右雜言三部二十四種脈新刋王氏脉經卷苐十
