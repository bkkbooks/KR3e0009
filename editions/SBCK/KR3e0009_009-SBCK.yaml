body:
  text: 臣林億等􅀋次平姙娠分别男女將産諸證第一平姙娠胎動血分水分吐下腹痛證第二平産後諸病鬱冐中風發􅀬煩嘔下利證第三平帶下絶産無子亡血居經證第四平鬱冐五崩漏下經閉不利腹中諸病證第五平咽中如有灸腐喜悲􅀬入血室腹滿證第六平隂中寒轉胞隂吹隂生瘡脫下證第七平婦人病生死證第八平小兒雜病證第九平姙娠分别男女將産諸證第一脉平而虚者乳子法也經云隂摶陽别謂之有子此是血氣和調陽施隂化也診其手少隂脉動甚者姙子也少隂心脉也心主血脉又腎名胞門子戸尺中腎脉也尺中之脉按之不絶法姙娠也三部脉沈浮正等按之無絶者有娠也姙娠􅀄時寸㣲小呼吸五至三月而尺数也脉滑疾重以手按之散者胎巳三月也脉重手按之不散但疾不滑者五月也婦人姙娠四月欲知男女法左疾爲男右疾爲女俱疾爲生二子又法得太隂脉爲男得太陽脉爲女太隂脉沈太陽脉浮又法左手沈實爲男右手浮大爲女左右手俱沈實猥生二男左右手俱浮大猥生二女又法尺脉左偏大爲男右偏大爲女左右俱大産二子大者如實狀又法左右尺俱浮爲産二男不爾則女作男生左右尺俱沈爲産二女不爾則男作女生也又法遣姙娠人面南行還復呼之左廻首者是男右廻首者是女也又法㸔上圊時夫從後急呼之左廻首是男右廻首是女也又法婦人姙娠其夫左乳房有核是男右乳房有核是女也婦人懷娠離經其脉浮設腹痛引腰脊爲今欲生也但離經者不病也又法婦人欲生其脉離經夜半覺日中則生也平姙娠胎動血分水分吐下腹痛證第二婦人懐胎一月之時足厥隂脉養二月足少陽脉養三月手心主脉養四月手少陽脉養五月足太隂脉養六月足陽明脉養七月手太隂脉養八月手陽明脉養九月足少隂脉養十月足太陽脉養諸隂陽各養三十日活兒手太陽少隂不養者下主月水上爲乳汗活兒養母懷娠者不可灸刺其經必墮胎婦人懷娠三月而渇其脉反遲者欲爲水分復腹痛者必墮胎脉浮汗出者必閉其脉数者必發癰膿五月六月脉数者必向壞脉緊者必胞漏脉遟者必腹滿而喘脉浮者必水壞爲腫問曰有一婦人年二十所其脉浮数發􅀬嘔欬時下利不欲食脉復浮經水絶何也師曰法當有娠何以故此虚家法當微弱而反浮数此爲戴陽隂陽和合法當姙娠到立秋􅀬當自去何以知然数則爲􅀬􅀬者是火火是木之子死於未未爲六月位土王火休廢隂氣生秋節氣至火氣當罷􅀬自除去其病即愈師曰乳後三月有所見後三月來脉無所見此便是軀有兒者護之恐病利也何以故懷姙陽氣内養乳中虚冷故令兒利婦人懷娠六月七月脉弦發􅀬其胎踰腹腹痛惡寒寒者小腹如扇之狀所以然者子藏閉故也當以附子湯温其藏婦人姙娠七月脉實大牢強者生沈細者死婦人姙娠八月脉实大牢強弦緊者生沈細者死婦人懷軀六月七月􅁀下斗餘水其胎必􅀝而墮此非時􅀌漿預下故也師曰寸口脉洪而濇洪則爲氣濇則爲血氣動丹田其形即温濇在於下胎冷若氷陽氣胎活隂氣必終欲别隂陽其下必殭假令陽終畜然􅀂杯問曰婦人姙娠病師脉之何以知此婦人􅀟胎其一獨死其一獨生而爲下其死者其病即愈然後竟免軀其脉何􅀋何以别之師曰寸口脉衛氣平調榮氣緩舒陽施隂化精盛有餘隂陽俱盛故成􅀟軀今少隂㣲緊血即濁凝經養不周胎則偏夭少腹冷滿膝臏疼痛腰重起難此爲血理􅀂不早去害母失胎師曰婦人有胎腹痛其人不安􅀂胎病不長欲知生死令人摸之如覆杯者則男如肘頭參差起者女也冷在何面冷者爲死温者爲生師曰婦人有漏下者有中生後因續下血都不絶者有姙娠下血者假令姙娠腹中痛爲胞漏一云阻膠艾湯主之婦人姙娠經㫁三月而得漏下下血四十日不止胎欲動在於臍上此爲姙娠六月動者前三月經水利時胎也下血者後㫁三月衃也所以下血不止者其癥不去故也當下其癥宜桂枝茯苓圎問曰婦人病經水㫁一二月而反經來今脉反㣲澀何也師曰此前月中􅀂當下利故令妨經利止月經當自下此非軀也婦人經自㫁而有軀其脉反弦恐其後必大下不成軀也婦人懐軀七月而不可知時時衂血而轉筋者此爲軀也衂時􅅉而動者非軀也脉來近去逺故曰反以爲有軀而反㫁此爲有陽無隂故也婦人經月下但爲㣲少師脉之反言有軀其後審然其脉何􅀋何以别之師曰寸口脉隂陽俱平榮衛調和按之滑浮之則輕陽明少隂各如經法身反洒淅不欲食飲頭痛心亂嘔􅎪欲吐呼則㣲数吸則不驚陽多氣溢隂滑氣盛滑則多實六經養成所以月見隂見陽精汁凝胞散散者損墮設復陽盛􅀟姙二胎今陽不足故令激經也婦人姙娠小便難飲如故當歸貝母苦參圎主之婦人姙娠有水氣身重小便不利洒洒惡寒起即頭眩葵子茯苓散主之婦人姙娠宜服當歸散即易産無疾苦師曰有一婦人來診一作脉自道經㫁不來師言一月爲衃二月爲血三月爲居經是定作軀也或爲血積譬如雞乳子􅀬者爲禄寒者多濁且當須後月復來經當入月幾日來假令以七日所來因言且須後月十日所來相間設其主復來者因脉之脉反沈而濇因問曽經半生􅀂漏下亡血者定爲有軀其人言实有宜是當護之今經㣲弱恐復不安設言當奈何當爲合薬以治之師曰有一婦人來診自道經㫁即去師曰一月血爲閉二月􅀂有􅀂無三月爲血積譬如雞伏子中寒即濁中􅀬即禄欲令胎壽當治其母俠寒懷子命則不壽也譬如雞伏子試取雞一毛拔去覆子不遍中寒者濁今夫人有軀少腹寒手掌反逆奈何得有軀婦人因言當奈何師曰當與温經湯設與夫家俱來者有軀與父母家俱來者當言寒多乆不作軀師曰有一婦人來診因言隂陽俱和調陽氣長隂氣短但出不入去近來逺故曰反以爲有軀偏反血㫁㫁來幾日假令審实者因言急當治恐經復下設令宫中人􅀂寡婦無夫曽夜夢寐交通邪氣或懷乆作癥瘕急當治下服二湯設復不愈因言髮湯當中下胎而反不下此何等意邪可使且將視赤烏一作赤馬師曰􅀂宫里張氏不差復來相問臣億等詳此文理脫誤不属无本可校以示闕疑餘皆倣於此師曰脉婦人得平脉隂脉小弱其人渇不能食無寒􅀬名爲軀桂枝主之法六十日當有娠設有醫治逆者却一月加吐下者則絶之方在傷寒中婦人脉平而虚者乳子法也平而㣲者實奄續法也而反㣲濇其人不亡血下利而反甚其脉虚俱坐乳大兒及乳小兒此自其常不能令甚虚竭病與亡血虚等必眩冒而短氣也師曰有一婦人好裝衣來診而得脉濇因問曽乳子下利乃當得此脉耳曽半生漏下者可設不者經㫁三月六月設乳子漏下可爲奄續㫁小兒勿乳須利止復來相問脉之師曰寸口脉㣲遲尺㣲於寸寸遲爲寒在上膲但當吐耳今尺反虚復爲強下之如此發􅇩滿而痛者必吐血少腹痛腰脊痛者必下血師曰寸口脉㣲而弱氣血俱虚若下血嘔吐汗出者可不者趺陽脉㣲而弱春以胃氣爲夲吐利者可不者此爲水氣其腹必滿小便則難婦人常嘔吐而胃反若常喘一作多唾其經又㫁設來者必少師曰有一婦人年六十所經水常自下設乆得病利少腹堅滿者爲難治師曰有一婦人來診言經水少不知前者何也師曰曾更下利若汗出小便利者可何以故師曰亡其津液故令經水少設經下反多於前者當所苦困當言恐大便難身無復汗也師曰寸口脉沈而遲沈則爲水遟則爲寒寒水相摶趺陽脉伏水榖不化脾氣衰則鶩溏胃氣衰則身軆腫少陽脉卑少隂脉細男子則小便不利婦人則經水不通經爲血血不利則爲水名曰血分一作水分師曰寸口脉沈而数数則爲出沈則爲入出則爲陽實入則爲隂結趺陽脉㣲而弦㣲則無胃氣弦則不得息少隂脉沈而滑沈則爲在裏滑則爲實沈滑相􅅮血結胞門其藏不瀉經絡不通名曰血分問曰病有血分何謂也師曰經水前㫁後病水名曰血分此病爲難治問曰病有水分何謂也師曰先病水後經水㫁名曰水分此病易治何以故去水其經自當下脉濡而弱弱反在関濡反在㒹遟在上緊在下遟則爲寒名曰渾陽濁則濕名曰霧緊則隂氣慄脉反濡弱濡則中濕弱則中寒寒濕相摶名曰痺腰脊骨節苦煩肌爲不仁此當爲痺而反懷軀遟歸經體重以下脚爲胕腫按之没指腰冷不仁此爲水懷喘則􅀝息小便不通緊脉爲嘔血氣無餘此爲水分榮衛乖亡此爲非軀平産後諸病鬱冐中風發􅀬煩嘔下利證第三問曰新産婦人有三病一者病痓亦作痙二者病鬱冒三者大便難何謂也師曰新産亡血虚多汗出喜中風故令病痓何故鬱冒師曰亡血復汗寒多故令鬱冒何故大便難師曰亡津液胃燥故大便難産婦鬱冒其脉㣲弱嘔不能食大便反堅但願汗出所以然者血虚而厥厥而必冒冒家欲解必大汗出以血虚下厥􅀌陽上出故但願汗出所以生婦喜汗出者亡隂血虚陽氣獨盛故當汗出隂陽乃復所以便堅者嘔不能食也小柴胡湯主之病觧能食七八日而更發􅀬者此爲胃􅀬氣实承氣湯主之方在傷寒中婦人産得風續之数十日不解頭㣲痛惡寒時時有􅀬心下堅乾嘔汗出雖乆陽旦證續在可與陽旦方在傷寒中桂枝是也婦人産後中風發􅀬面正赤喘而頭痛竹葉湯主之婦人産後腹中㽲痛可與當歸羊肉湯師曰産婦腹痛煩滿不得臥法當枳实芍薬散主之假令不愈者此爲腹中有乾血著臍下與下瘀血湯婦人産後七八日無太陽證少腹堅痛此􅁖露不盡不大便四五日趺陽脉㣲實再倍其人發􅀬日晡所煩燥者不能食譫語利之則愈宜承氣湯以􅀬在裏結在膀胱也方在傷寒中婦人産中虚煩亂嘔逆安中益氣竹皮大圎主之婦人􅀬利重下新産虚極白頭翁加甘草湯主之千金方又加阿膠平帶下絶産無子亡血居經證第四師曰婦人帶下六極之病脉浮則爲腸鳴腹滿緊則爲腹中痛数則爲隂中癢痛則生瘡弦則隂疼掣痛師曰帶下有三門一曰胞門二曰龍門三曰玉門巳産属胞門未産属龍門未嫁女属玉門問曰未出門女有三病何謂也師曰一病者經水􅀄下隂中􅀬或有當風或有扇者二病者或有以寒水洗之三病者或見丹下驚怖得病属帶下師曰婦人帶下九實中事假令得䑕乳之病劇易當劇有期當庚辛爲期餘皆倣此問曰有一婦人年五十所病但苦背痛時時腹中痛少食多厭喜䐜脹其脉陽㣲関尺小緊形脉不相應願知所􅀃師曰當問病者飲食何如假令病者言我不欲飲食聞榖氣臭者病爲在上膲假令病者言我少多爲欲食不食亦可病爲在中膲假令病者言我自飲食如故病爲在下膲爲病属帶下當以帶下治之婦人帶下經水不利少腹滿痛經一月再見土􅀲根散主之婦人帶下脉浮􅁖寒漏下者不治師曰有一婦人將一女子年十五所來問診言女年十四時經水自下今經反㫁其母言恐怖師曰言此女爲是夫人親女非耶若親者當相爲􅀃之婦人因荅言自是女爾師曰所以問者無他夫人年十四時亦以經水下所以㫁此爲避年勿怪後當自下婦人少腹冷惡寒乆年少者得之此爲無子年大者得之絶産師曰脉㣲弱而澀年少得此爲無子中年得此爲絶産師曰少隂脉浮而緊緊則疝瘕腹中痛半産而墮傷浮則亡血絶産惡寒師曰肥人脉細胞有寒故令少子其色黄者􅇩上有寒婦人少腹䃂音衮磊力罪切轉痛而復自觧發作無常經反㫁膀胱中結堅急痛下引隂中氣衝者乆必兩脇拘急問曰婦人年五十所病下利数十日不止暮則發􅀬少腹裏急痛腹滿手掌􅀬唇口乾燥何也師曰此病属帶下何以故曾經半産瘀血在少腹中不去何以知之其證唇口乾燥故知之當與温經湯問曰婦人病下利而經水反㫁者何也師曰但當止利經自當下勿怪所以利不止而血㫁者但下利亡津液故經㫁利止津液復經當自下婦人血下咽乾而不渇其經必㫁此榮不足夲自有㣲寒故不引飲渇而引飲者津液得通榮衛自和其經必復下師曰寸口脉㣲而濇㣲則衛氣不足濇則血氣無餘衛不足其息短其形燥血不足其形逆榮衛俱虚言語謬誤趺陽脉浮而濇濇則胃氣虚虚則短氣咽燥而口苦胃氣濇則失液少隂脉㣲而遟㣲則無精遟則隂中寒濇則血不來此爲居經三月一來師曰脉㣲血氣俱虚年少者亡血也乳子下利爲可不者此爲居經三月一來問曰婦人姙娠三月師脉之言此婦人非軀今月經當下其脉何􅀋何以别之師曰寸口脉衛浮而大榮反而弱浮大則氣強反弱則少血􅀌陽獨呼隂不能吸二氣不停衛降榮竭隂爲積寒陽爲聚􅀬陽盛不潤經絡不足隂虚陽往一作实故令少血時發洒淅咽燥汗出或溲稠数多唾涎沫此令重虚津液漏泄故知非軀畜煩滿洫月禀一經三月一來隂盛則瀉名曰居經問曰婦人年五十所一朝而清血二三日不止何以治之師曰此婦人前絶生經水不下今反清血此爲居經不須治當自止經水下常五日止者五日愈婦人月經一月再來者經來其脉欲自知常而反㣲不利不汗出者其經二月必來平鬱冐五崩漏下經閉不利腹中諸病證第五問曰婦人病經水適下而發其汗則鬱冐不知人何也師曰經水下故爲裏虚而發其汗爲表復虚此爲表裏俱虚故令􅊊冐也問曰婦人病如癲疾欎冐一日二十餘發師脉之反言帶下皆如師言其脉何􅀋何以别之師曰寸口脉濡而緊濡則陽氣㣲緊則榮中寒陽㣲衛氣虚血竭凝寒隂陽不和邪氣舎於榮衛疾疾一作候起年少時經水來以合房室移時過度精感命門開經下血虚百脉皆張中極感陽動㣲風激成寒因虚舎榮衛冷積於丹田發動上衝奔在􅇩隔津液掩口入涎唾涌溢出眩冒狀如厥氣衝髀裏􅀬粗醫名爲癲灸之因大劇問曰婦人病苦氣上衝􅇩眩冒吐涎沫髀裏氣衝􅀬師脉之不名帶下其脉何􅀋何以别之師曰寸口脉沈而㣲沈則衛氣伏㣲則榮氣絶陽伏則爲疹隂絶則亡血病當小便不利津液閉塞今反小便通㣲汗出沈変爲寒欬逆嘔沫其肺成痿津液竭少亡血損經絡因寒爲氣厥手足苦痺氣從丹田起上至􅇩脇沈寒怫鬱於上􅇩中窒塞氣歴陽部面翕如醉形躰似肥此乃浮虚醫反下之長針復重虚榮衛乆發眩冒故知爲血厥也問曰五崩何等􅀋師曰白崩者形如涕赤崩者形如絳津黄崩者形如爛􅀲青崩者形如藍色黒崩者形如衃血也師曰有一婦人來脉反得㣲濇法當吐若下利而言不因言夫人年幾何夫人年七七四十九經水當㫁反至今不止以故致此虚也寸口脉弦而大弦則爲减大則爲芤减則爲寒芤則爲虚寒虚相摶脉則爲革婦人則半産漏下旋復花湯主之婦人陷經漏下黒不觧膠薑湯主之婦人經水不利抵當湯主之在傷寒中婦人經水閉不利藏堅僻不止中有乾血下白物礬石圎主之婦人腹中諸疾痛當歸芍藥散主之一云治壊姙腹中疼痛婦人腹中痛小建中湯主之方在傷寒中一云腹中痛小便利理中湯主之平咽中如有灸腐喜悲􅀬入血室腹滿證第六婦人咽中如有灸腐狀半夏厚朴湯主之婦人藏燥喜悲傷欲哭象如神靈所以数欠甘草小麥湯主之婦人中風發􅀬惡寒經水適來得之七八日􅀬除脉遟身凉􅇩脇下滿如結􅇩狀其人譫語此爲􅀬入血室當刺期門隨其虚實而取之婦人中風七八日續有寒􅀬發作有時經水適断者此爲􅀬入血室其血必結故使如瘧狀發作有時小柴胡湯主之方在傷寒中婦人傷寒發􅀬經水適來晝日了了暮則譫語如見􅀑狀此爲􅀬入血室無犯胃氣若上二膲必當自愈二字疑陽明病下血而譫語此爲􅀬入血室但頭汗出者當刺期門隨其實而寫之濈然汗出者則愈婦人少腹滿如敦敦狀要畧云滿而􅀬小便微難而不渇生後生後疑者此爲水與血并結在血室大黄甘遂湯主之平隂中寒轉胞隂吹隂生瘡脫下證第七婦人隂寒温中坐藥蛇床子散主之婦人著坐藥強下其經目眶爲痛足跟難以踐地心中狀如懸問曰有一婦人病飲食如故煩􅀬不得臥而反􅀝息者何也師曰得病轉胞不得溺也何以故師曰此人故肌盛頭㪯身滿今反羸痩頭㪯中空感一作减胞系了戾故致此病但利小便則愈宜服腎氣圎以中有茯苓故也方在虚勞中師曰脉得浮緊法當身軀疼痛設不痛者當射云何因當射言若腸中痛腹中鳴欬者因失便婦人得此脉者法當隂吹師曰寸口脉浮而弱浮則爲虚弱則無血浮則短氣弱則有􅀬而自汗出趺陽脉浮而濇浮則氣滿濇則有寒喜噫吞酸其氣而下少腹則寒少隂脉弱而㣲㣲則少血弱則生風㣲弱相􅅮隂中惡寒胃氣下泄吹而正喧師曰胃氣下泄吹而正喧此榖氣之實也膏髮導之少隂脉滑而数者隂中則生瘡少隂脉数則氣淋隂中生瘡婦人隂中蝕瘡爛狼牙湯洗之婦人藏腫如􅀲隂中疼引􅆎痛者杏人湯主之少隂脉弦者白腸必挺核少隂脉浮而動浮則爲虚動則爲痛婦人則脫下平婦人病生死證第八診婦人漏血下赤白日下血数升脉急疾者死遟者生診婦人漏下赤白不止脉小虚滑者生大緊實数者死診婦人新生乳子脉沈小滑者生實大堅弦急者死診婦人疝瘕積聚脉弦急者生虚弱小者死診婦人新生乳子因得􅀬病其脉懸小四肢温者生寒清者死診婦人生産因中風傷寒􅀬病喘鳴而肩息脉實大浮緩者生小急者死診婦人生産之後寸口脉炎疾不調者死沈㣲附骨不絶者生金瘡在隂處出血不絶隂脉不能至陽者死接陽而復出者生平小兒雜病證第九小兒脉呼吸八至者平九至者傷十至者困診小兒脉法多雀􅃲要以三部脉爲主若緊爲風癎沈者乳不消弦急者客忤氣小兒是其日数應變蒸之時身􅀬而脉乱汗不出不欲食食輙吐哯者脉乱無苦也小兒脉沈而数者骨間有􅀬欲以腹按冷清也小兒大便赤青瓣飱􅂥脉小手足寒難巳脉小手足温易巳小兒病困汗出如珠著身不流者死小兒病其頭毛皆上逆者必死耳間青脉起者瘈痛小兒病而囟䧟入其口脣乾目皮反口中氣出冷足与頭相抵臥不舉身手足四肢垂其臥正直如得縛其掌中冷皆死至十日不可復治之新刋王氏脉經卷第九
