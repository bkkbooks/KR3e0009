body:
  text: 臣林億等􅀋次病不可發汗證第一病可發汗證第二病發汗以後證第三病不可吐證第四病可吐證第五病不可下證第六病可下證第七病發汗吐下以後證第八病可温證第九病不可灸證第十病可灸證第十一病不可刺證第十二病可刺證第十三病不可水證第十四病可水證第十五病不可火證第十六病可火證第十七􅀬病隂陽交并少隂厥逆隂陽竭盡生死證第十八重實重虚隂陽相附生死證第十九􅀬病生死期日證第二十􅀬病十逆死日證第二十一􅀬病五藏氣絶死日證第二十二􅀬病至脉死日證第二十三􅀬病損脉死日證第二十四病不可發汗證第一少隂病脉細沈数病爲在裏不可發其汗脉浮而緊法當身體疼痛當以汗解假令尺中脉遟者不可發其汗何以知然此爲榮氣不足血㣲少故也少隂病脉㣲一作濡而㣲弱不可發其汗無陽故也脉濡而弱弱反在􅀜濡反在顚微反在止澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠動氣在右不可發汗發汗則衂而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋􅅥肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目運惡寒食即反吐榖不得前一云榖不消化咽中閉塞不可發汗發汗則吐血氣微絶手足逆冷欲得踡卧不能自温諸脉数動㣲弱並不可發汗發汗則大便難腹中乾一云小便難胞中乾胃燥而煩其形相象根夲異源脉濡而弱弱反在􅀜濡反在顚弦反在上微反在下弦爲陽運微爲隂寒上實下虚意欲得温微弦爲虚不可發汗發汗則寒慄不能自還欬者則劇数吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無􅀬虚而寒慄欬而發汗踡而苦滿滿一作心痛腹中復堅厥不可發汗發汗則聲亂咽嘶舌萎榖不得前諸逆發汗㣲者難愈劇者言亂睛眩者死命將難全太陽病得之八九日如瘧狀發􅀬而惡寒􅀬多寒少其人不嘔清便續自可一日再三發其脉微而惡寒此爲隂陽俱虚不可復發汗也太陽病發􅀬惡寒􅀬多寒少脉微弱則無陽也不可復發其汗咽乾燥者不可發汗亡血家不可攻其表汗出則寒慄而振衂家不可攻其表汗出必額䧟脉上促急而緊直視而不能眴不得眠汗家重發其汗必恍惚心亂小便巳隂疼可與禹餘粮圎淋家不可發汗發其汗必便血瘡家雖身疼痛不可攻其表汗出則痓一作痙下同冬時發其汗必吐利口中爛生瘡下利清榖不可攻其表汗出必脹滿欬而小便利􅀂失小便不可攻其表汗出則厥逆冷汗出多極發其汗亦堅傷寒一二日至四五日厥者必發􅀬前厥者後必􅀬厥深者􅀬亦深厥微者􅀬亦微厥應下之而反發其汗必口傷爛赤病人脉数数爲有􅀬當消榖引食反吐者醫發其汗陽微膈氣虚脉則爲数数爲客陽不能消􅂖胃中虚冷故令吐也傷寒四五日其脉沈煩而喘滿脉沈者病爲在裏反發其汗津液越出大便爲難表虚裏實乆則譫語傷寒頭痛拿拿發􅀬形象中風常㣲汗出又自嘔者下之益煩心懊憹如飢發汗則致痓身強難以屈伸熏之則發黃不得小便乆則發欬唾太陽病發其汗因致痓傷寒脉弦細頭痛而反發􅀬此属少陽少陽不可發其汗太陽與少陽併病頭項強痛或眩冒時如結􅇩心下痞堅者不可發其汗少隂病欬而下利譫語者此􅀍火氣刼故也小便必難以強責少隂汗也少隂病但厥無汗而強發之必動其血未知從何道出或從口􅈹或從目出一作耳目者是爲下厥上竭爲難治傷寒有五皆􅀬病之􅀋也同病異名同脉異經病雖俱傷於風其人自有痼疾則不得同法其人素傷於風因復傷於􅀬風􅀬相薄則發風温四肢不收頭痛身􅀬常汗出不觧治在少隂厥隂不可發汗汗出譫言獨語内煩躁擾不得卧善驚目亂無精治之復發其汗如此者醫殺之也傷寒濕温其人常傷於濕因而中暍濕􅀬相薄則發濕温病苦兩脛逆冷腹滿义􅇩頭目痛苦妄言治在足太隂不可發汗汗出必不能言耳聾不知痛所在身青面色変名曰重暍如此者死醫殺之也右二首出醫律病可發汗證第二大法春夏宜發汗凢發汗欲令毛足皆周至漐漐一時間益佳但不欲如水流離若病不觧當重發汗汗多則亡陽陽虚不得重發汗也凢服湯藥發汗中病便止不必盡劑也凢云可發汗而無湯者圎散亦可用要以汗出爲解然不如湯隨證良太陽病外證未解其脉浮弱當以汗解宜桂枝湯太陽病脉浮而数者可發其汗属桂枝湯證陽明病脉遟汗出多㣲惡寒表爲未解可發其汗属桂枝湯夫病脉浮大問病者言但堅耳設利者爲虚大逆堅爲實汗出而解何以故脉浮當以汗解傷寒其脉不弦緊而弱弱者必渴􅀍火必譫語弱者發􅀬脉浮解之當汗出愈病者煩􅀬汗出即解復如瘧狀日晡所發􅀬此属陽明脉浮虚者當發其汗属桂枝湯證病常自汗出此爲榮氣和榮氣和而外不解此衛不和也榮行脉中爲隂主内衛行脉外爲陽主外復發其汗衛和則愈属桂枝湯證病人藏無他病時發􅀬自汗出而不愈此衛氣不和也先其時發汗即愈属桂枝湯證脉浮而緊浮則爲風緊則爲寒風則傷衛寒則傷榮榮衛俱病骨節煩疼可發其汗宜麻黃湯太陽病不解􅀬結膀胱其人如強血必自下下者即愈其外未解者尚未可攻當先解其外属桂枝湯證太陽病下之微喘者表未解故也属桂枝加厚朴杏子湯證傷寒脉浮緊不發其汗因衂属麻黃湯證陽明病脉浮無汗其人必喘發其汗則愈属麻黄湯證太隂病脉浮者可發其汗属桂枝湯證太陽病脉浮緊無汗而發􅀬其身疼痛八九日不解表􅀱續在此當發其汗服湯㣲除發煩目瞑劇者必衂衂乃解所以然者陽氣重故也属麻黄湯證脉浮者病在表可發其汗属桂枝湯證傷寒不大便六七日頭痛有􅀬與承氣湯其大便反青一作小便清者此爲不在裏故在表也當發其汗頭痛者必衂属桂枝湯證下利後身體疼痛清便自調急當救表宜桂枝湯太陽病頭痛發􅀬汗出惡風若惡寒属桂枝湯證太陽中風陽浮而隂濡弱浮者􅀬自發濡弱者汗自出嗇嗇惡寒淅淅惡風拿拿發􅀬􅈹鳴乾嘔属桂枝湯證太陽病發􅀬汗出此爲榮弱衛強故使汗出欲救邪風属桂枝湯證太陽病下之氣上衝可與桂枝湯不衝不可與之太陽病􅀄服桂枝湯而反煩不解者法當先刺風池風府却與桂枝湯則愈燒針令其汗針處􅀍寒核起而赤者必發賁豚氣從少腹上衝心者灸其核上一壯與桂枝加桂湯太陽病項背強几几反汗出惡風属桂枝加葛根湯太陽病項背強几几無汗惡風属葛根湯太陽與陽明合病而自利不嘔者属葛根湯證太陽與陽明合病不下利但嘔属葛根加半夏湯太陽病桂枝證醫反下之遂利不止其脉促者表未觧喘而汗出属葛根黃夲黃連湯太陽病頭痛發􅀬身體疼腰痛骨節疼痛惡風無汗而喘属麻黄湯證太陽與陽明合病喘而􅇩滿不可下也属麻黄湯證太陽中風脉浮緊發􅀬惡寒身體疼痛不汗出而煩躁頭痛属太青龍湯脉㣲弱汗出惡風不可服之服之則厥筋􅅥肉瞤此爲逆也傷寒脉浮緩其身不疼但重乍有輕時無少隂證者大青龍湯發之傷寒表不解心下有水氣乾嘔發􅀬而欬或渴或利或噎或小便不利小腹滿或㣲喘属小青龍湯傷寒心下有水氣欬而㣲喘發􅀬不渴服湯巳而渴者此寒去欲爲解属小青龍湯證陽明中風脉弦浮大而短氣腹都滿脇下及心痛乆按之氣不通一作按之不痛􅈹乾不得汗􅄝卧一身及目悉黄小便難有潮􅀬時時􅎪耳前後腫刺之小差外不解病過十日脉續浮與小柴胡湯但浮無餘證與麻黄湯不溺腹滿加􅎪不治太陽病十日以去脉浮細􅄝卧此爲外解設􅇩滿脇痛與小柴胡湯脉浮者属麻黄湯證中風往來寒􅀬傷寒五六日以後􅇩脇苦滿嘿嘿不欲飲食煩心喜嘔或􅇩中煩而不嘔或渴或腹中痛或脇下痞堅或心中悸小便不利或不渴外有㣲􅀬或欬者属小柴胡湯傷寒四五日身體􅀬惡風頸項強脇下滿手足温而渴属小柴胡湯證傷寒六七日發􅀬㣲惡寒支節煩疼㣲嘔心下支結外證未去者属柴胡桂枝湯少隂病得之二三日麻黄附子甘草湯㣲發汗以二三日無證故微發汗也脉浮小便不利微􅀬消渴與五芩散利小便發汗病發汗以後證第三二陽併病太陽􅀄得病時發其汗汗先出復不徹因轉属陽明續自㣲汗出不惡寒􅀂太陽證不罷不可下下之爲逆如此者可小發其汗設面色縁縁正赤者陽氣怫鬱在表當觧之熏之若發汗不大徹不足言陽氣怫鬱不得越當汗而不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐汗出而不徹故也更發其汗即愈何以知其汗不徹脉澀故以知之未持脉時病人义手自冐之師因教試令欬而不即欬者此必兩耳無所聞也所以然者重發其汗虚故也發汗後飲水多者必喘以水灌之亦喘發汗後水藥不得入口爲逆若更發其汗必吐下不止陽明病本自汗出毉復重發其汗病巳差其人微煩不了了此大便堅也以亡津液胃中乾燥故令其堅當問小便日幾行若本日三四行今日再行者必知大便不乆出今爲小便数少津液當還入胃中故知必當大便也發汗多又復發其汗此爲亡陽若譫語脉短者死脉自和者不死傷寒發其汗身目爲黄所以然者寒濕相摶在裏不觧故也病人有寒復發其汗胃中冷必吐蚘太陽病發其汙遂漏而不止其人惡風小便難四肢微急難以屈伸属桂枝加附子湯服桂枝湯大汗出􅀂脉但洪大與桂枝湯若其形如瘧一日再三發汗出便觧属桂枝二麻黄一湯服桂枝湯大汗出大煩渴不觧若脉洪大属白虎湯傷寒脉浮自汗出小便数頗復仲景頗伏字作心煩微惡寒而脚挛急反與桂枝欲攻其表得之便厥咽乾煩躁吐逆當作甘草乾薑湯以復其陽厥愈足温更作芍藥甘草湯與之其脚即仲而胃氣不和譫語可與承氣湯重發其汗復加燒針者属四逆湯傷寒發汗巳觧半日許復煩其脉浮数可復發其汗属桂枝湯證發汗後身體疼痛其脉沈遟属桂枝加芍藥生姜人參湯發汗後不可更行桂枝湯汗出而喘無大􅀬可以麻黄杏子甘草石膏湯發汗過多巳後其人义手自冐心心下悸而欲得按之属桂枝甘草湯發汗後其人臍下悸欲作賁豚属茯苓桂枝甘草大􅀥湯發汗後腹脹滿属厚朴生姜半夏甘草人參湯發其汗不觧而反惡寒者虚故也属芍藥甘草附子湯不惡寒但􅀬者實也當和其胃氣宜小承氣湯太陽病發汗若大汗出胃中燥煩不得眠其人欲飲水當稍飲之令胃中和則愈發汗巳脉浮而数復煩渴者属五苓散傷寒汗出而渴属五苓散證不渴属茯苓甘草湯太陽病發其汗汗出不觧其人發􅀬心下悸頭眩身瞤而動振振欲擗地属眞武湯傷寒汗出解之後胃中不和心下痞堅乾噫食臭脇下有水氣腹中雷鳴而利属生姜瀉心湯傷寒發􅀬汗出不觧後心中痞堅嘔而下利属大柴胡湯太陽病三日發其汗不觧蒸蒸發􅀬者属於胃也属承氣湯大汗出􅀬不去内拘急四肢疼下利厥逆而惡寒属四逆湯發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈病不可吐證第四太陽病當惡寒而發􅀬今自汗出反不惡寒發􅀬􅀜上脉細而数此醫吐之過也􅀂得病一日二日吐之腹中飢口不能食三日四日吐之不喜糜粥欲食冷食朝食暮吐此醫吐之所致也此爲小逆太陽病􅄍之者但太陽病當惡寒今反不惡寒不欲近衣此爲吐之内煩也少隂病飲食入則吐心中温温欲吐復不能吐始得之手足寒脉弦遟此􅇩中實不可下若膈上有寒飲乾嘔者不可吐當温之諸四逆厥者不可吐之虚家亦然病可吐證第五大法春冝吐凢服湯吐中病便止不必盡劑也病如桂枝證其頭不痛項不強寸口脉微細􅇩中痞堅氣上撞咽喉不得息此爲􅇩有寒當吐之病􅇩上諸實􅇩中鬱鬱而痛不能食欲使人按之而反有濁唾下利日十餘行其脉反遟寸口微滑此可吐之吐之利即止少隂病飲食入則吐心中温温欲吐復不能吐當遂吐之􅀫食在上管當吐之病者手足厥冷脉乍緊邪結在􅇩中心下滿而煩飢不能食病在􅇩中當吐之病不可下證第六脉濡而弱弱反在􅀜濡反在顚微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞堅動氣在右不可下下之則津液内竭咽燥􅈹乾頭眩心悸動氣在左不可下下之則腹裏拘急食不下動氣反劇身雖有􅀬卧反欲踡動氣在上不可下下之則掌握􅀬煩身浮冷􅀬汗自泄欲水自灌動氣在下不可下下之則腹滿卒起頭眩食則下清榖心下痞堅咽中閉塞不可下下之則上輕下重水漿不下卧則欲踡身體急痛復下利日十數行諸外實不可下下之則發微􅀬亡脉則厥當臍握􅀬諸虚不可下下之則渇引水者易愈惡水者劇脉濡而弱弱反在􅀜濡反在顚弦反在上微反在下弦爲陽運微爲隂寒上實下虚意欲得温微弦爲虚虚者不可下微則爲欬欬則吐涎沫下之欬則止而利不休􅇩中如蟲齧粥入則出小便不利兩脇拘急喘息爲難頸背相牽臂則不仁極寒反汗出軀冷若冰眼睛不慧語言不休榖氣多入則爲除中口雖欲言舌不得前脉濡而弱弱反在􅀜濡反在巔浮反在上数反在下浮則爲陽虚数則爲無血浮則爲虚数則生􅀬浮則爲虚自汗而惡寒数則爲痛振而寒慄微弱在􅀜􅇩下爲急喘汗不得呼吸呼吸之中痛在於脇振寒相􅅮其形如瘧醫反下之令脉急数發􅀬狂走見􅀑心下爲痞小便淋􅄋少腹甚堅小便血也脉濡而緊濡則陽氣微緊則榮中寒陽微衛中風發􅀬而惡寒榮緊胃氣冷微嘔心内煩醫以爲太􅀬觧肌而發汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客􅀬在皮膚悵快不得眠不知胃氣冷緊寒在関元技巧無所施汲水灌其身客􅀬應時罷慄慄而振寒重􅀍而覆之汗出而冒巓體惕而又振小便爲微難寒氣因水發清榖不容間嘔變反腸出顚倒不得安手足爲微逆身冷而内煩遟欲從後救安可復追還脉浮而大浮爲氣實大爲血虚血虚爲無隂􅀌陽獨下隂部小便難胞中虚今反小便利而大汗出法衛家當微今反更實津液四射榮竭血盡干煩不眠血薄肉消而成暴液醫復以毒藥攻其胃此爲重虚客陽去有期必下如汚泥而死趺陽脉遟而緩胃氣如經趺陽脉浮而数浮則傷胃数則動脾此非本病醫特下之所爲也榮衛内䧟其数先微脉反但浮其人必堅氣噫而除何以言之脾脉本緩今数脉動脾其数先㣲故知脾氣不治大便堅氣噫而除今脉反浮其数改㣲邪氣獨留心中則飢邪􅀬不殺榖潮􅀬發渴数脉當遟緩脉因前後度数如前仲景前字作法病者則飢数脉不時則生惡瘡脉数者乆数不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得脉数者不可下下之必煩利不止少隂病脉㣲不可發其汗無陽故也陽巳虚尺中弱澀者復不可下之脉浮大應發其汗醫反下之此爲大逆脉浮而大心下反堅有􅀬属藏攻之不全㣲汗属府溲数則堅汗多即愈汗少便難脉遟尚未可攻二陽併病太陽初得病時發其汗汗先出復不徹因轉属陽明欲自汗出不惡寒若太陽證不罷不可下下之爲逆結􅇩證其脉浮大不可下下之即死太陽與陽明合病喘而􅇩滿不可下之太陽與少陽併病心下痞堅頸項強而眩勿下之諸四逆厥者不可下之虚家亦然病欲吐者不可下之太陽病有外證未觧不可下下之爲逆病發於陽而反下之􅀬入因作結􅇩發於隂而反下之因作痞痞脉浮堅而下之緊反入裏因作痞夫病陽多者􅀬下之則堅本虚攻其􅀬必無陽隂強而堅下之必清榖而腹滿太隂之爲病腹滿而吐食不下下之益甚腹時自痛􅇩下結堅厥隂之爲病消渴氣上撞心中疼􅀬飢而不欲食甚者則欲吐下之不肯止少隂病其人飲食入則吐心中温温欲吐復不能吐始得之手足寒脉弦遟此􅇩中實不可下也傷寒五六日不結􅇩腹濡脉虚復厥者不可下下之亡血死傷寒發􅀬但頭痛㣲汗出發其汗則不識人熏之則喘不得小便心腹滿下之則短氣而腹滿小便難頭痛背強加温針則必衂傷寒其脉隂陽俱緊惡寒發􅀬則脉欲厥厥者脉􅀄來大漸漸小更來漸大是其􅀱也惡寒甚者拿拿汗出喉中痛􅀬多者目赤睛不慧毉復發之咽中則傷若復下之則兩目閉寒多清榖􅀬多便膿血熏之則發黄熨之則咽燥小便利者可救難者必危殆傷寒發􅀬口中勃勃氣出頭痛目黄􅈹衂不可制貪水者必嘔惡水者厥下之咽中生瘡假令手足温者下重便膿血頭痛目黄者下之目閉貪水者下之其脉必厥其聲嚶咽喉塞發其汗則戰慄隂陽俱虚惡水者下之裏冷不􅄝食大便完榖出發其汗口中傷舌上胎滑煩躁脉数實不大便六七日後必便血復發其汗小便即自利得病二三者脉弱無太陽柴胡證而煩躁心下堅至四日雖能食以承氣湯少與㣲和之令小安至六日與承氣湯一升不大便六七日小便少者雖不大便但頭堅後溏未定成其堅攻之必溏當須小便利定堅乃可攻之藏結無陽證寒而不􅀬傷寒論云不往來寒􅀬其人反静舌上胎滑者不可攻也傷寒嘔多雖有陽明證不可攻之陽明病潮􅀬㣲堅可與承氣湯不堅不可與若不大便六七日恐有燥屎欲知之法可少與小承氣湯腹中轉失氣者此爲有燥屎乃可攻之若不轉失氣者此但頭堅後溏不可攻之攻之必腹滿不能食欲飲水者即􅎪其後發􅀬者必復堅以小承氣湯和之若不轉失氣者愼不可攻之陽明病身合色赤者不可攻也必發􅀬色黄者小便不利也陽明病當心下堅滿不可攻之攻之遂利不止者死止者愈陽明病自汗出若發其汗小便自利此爲内竭雖堅不可攻之當須自欲大便宜􅁡煎導而通之若土􅀲根及猪膽汁皆可以導下利其脉浮大此爲虚以強下之故也設脉浮革因爾腸鳴属當歸四逆湯病可下證第七大法秋宜下凢可下者以湯勝圎散中病便止不必盡三服陽明病發􅀬汗多者急下之属大柴胡湯少隂病得之二三日口燥咽乾者急下之属承氣湯少隂病六七日腹滿不大便者急下之属承氣湯證少隂病下利清水色靑者心下必痛口乾燥者可下之属大柴胡湯承氣湯證下利三部脉皆平按其心下堅者可下之属承氣湯證陽明與少陽合病而利脉不􅀒者爲順􅀒者失也互相刻賊爲􅀒滑而数者有􅀫食當下之属大柴胡承氣湯證傷寒後脉沈沈爲内實玉凾云脉沈實沈實者下之下之解属大柴胡湯證傷寒六七日目中不了了睛不和無表裏證大便難微􅀬者此爲實急下之属大柴胡湯承氣湯證太陽病未解其脉隂陽俱沈必先振汗出解但陽㣲者先汗之而解但隂㣲者先下之而解属大柴胡湯證隂㣲一作尺实脉􅀟弦遟心下堅脉大而緊者陽中有隂可下之属承氣湯證結􅇩者項亦強如柔痓狀下之即和病者無表裏證發􅀬七八日雖脉浮数可下之属火柴胡湯證太陽病六七日表證續在其脉㣲沈反不結􅇩其人發狂此􅀬在下膲少腹當堅而滿小便自利者下血乃愈所以然者以太陽隨經瘀􅀬在裏故也属抵當湯太陽病身黄其脉沈結少腹堅小便不利爲無血小便自利其人如狂者血證諦属抵當湯證傷寒有􅀬而少腹滿應小便不利今反利者此爲血當下之属抵當圎證陽明病發􅀬而汗出此爲􅀬越不能發黄但頭汗出其身無有齊頸而還小便不利渇引水漿此爲瘀􅀬在裏身必發黄属茵蔯蒿湯陽明證其人喜忘必有畜血所以然者本有乆瘀血故令喜忘雖堅大便必黒属抵當湯證汗出而譫語者有燥屎在胃中此風也過經乃可下之下之若早語言亂以表虚裏實故也下之則愈属大柴胡湯承氣湯證病者煩􅀬汗出即解復如瘧狀日脯所發者属陽明脉實者當下之属大柴胡湯承氣湯證陽明病譫語有潮􅀬而反不能食者必有燥屎五六枚若能食者但堅耳属承氣湯證太陽中風下利嘔逆表觧乃可攻之其人漐漐汗出發作有時頭痛心下痞堅滿引腰下痛嘔則短氣汗出不惡寒此爲表觧裏未和属十􅀥湯太陽病不觧執結膀胱其人如狂血自下下之即愈其外未觧尚未可攻當先觧外外觧小腹急結者乃可攻之属桃人承氣湯傷寒七八日身黄如橘小便不利少腹㣲滿属茵蔯蒿湯證傷寒十餘日􅀬結在裏復往來寒􅀬属大柴胡湯證但結􅇩無大􅀬此爲水結在􅇩脇頭㣲汗出與大䧟􅇩湯傷寒六七日結􅇩􅀬實其脉沈緊心下痛按之如石堅與大䧟􅇩湯陽明病其人汗多津液外出胃中燥大便必堅堅者則譫語属承氣湯證陽明病不吐下而心煩者可與承氣湯陽明病其脉遟雖汗出而不惡寒其體一本作人必重短氣腹滿而喘有潮􅀬如此者其外爲觧可攻其裏若手足濈然汗出者此大便巳堅属承氣湯其􅀬不潮未可與承氣湯若腹滿大而不大便者属小承氣湯㣲和胃湯勿令至大下陽明病譫語發潮􅀬其脉滑疾如此者属承氣湯因與承氣湯一升腹中轉失氣者復與一升如不轉失氣者勿更與之明日又不大便脉反㣲澀者此爲裏虚爲難治不可更與承氣湯二陽併病太陽證罷但發潮􅀬手足漐汗出大便難而譫一語者下之愈属承氣湯證病人小便不利大便乍難乍易時有微􅀬喘冐不能卧者有燥屎也属承氣湯證病發汗吐下以後證第八師曰病人脉微而澀者此爲醫所病也大發其汗又數大下之其人亡血病當惡寒而發􅀬無休止時夏月盛􅀬而與仲景作􅁒著􅃨衣冬月盛寒而與仲景作欲祼其體所以然者陽微即惡寒隂弱即發􅀬故仲景作醫發其汗使陽氣㣲又大下之令隂氣弱五月之時陽氣在表胃中虚冷以陽氣内微不能勝冷故與仲景作欲著􅃨衣十一月之時陽氣在裏胃中煩􅀬以隂氣内弱不能勝􅀬故與仲景作欲祼其體又隂脉遟澀故知亡血太陽病三日巳發其汗吐下温針而不觧此爲壊病桂枝復不中與也觀其脉證知犯何逆隨證而治之脉浮數法當汗出而愈而下之則身體重心悸不可發其汗當自汗出而觧所以然者尺中脉浮此裏虚須表裏實津液和即自汗出愈凢病若發汗若吐若下若亡血無津液而隂陽自和者必自愈大下後發汗其人小便不利此亡津液勿治某小便利必自愈下以後復發其汗必振寒又其脉㣲細所以然者内外俱虚故也太陽病先下而不愈因復發其汗表裏俱虚其人因冐冐家當汗出自愈所以然者汗出表和故也表和然後下之得病六七日脉遟浮弱惡風寒手足温醫再三下之不能多多一作食其人脇下滿面目及身黄頸項強小便難與柴胡湯後必下重本渴飲水而嘔柴胡湯復不中與也食榖者􅎪太陽病二三日終不能卧但欲起者心下必結其脉㣲弱者此本寒也而反下之利止者必結􅇩未止者四五日復重下之此挾􅀬利也太陽病下之其脉促不結􅇩者此爲欲觧其脉浮者必結􅇩其脉緊者必咽痛其脉弦者必兩脇拘急其脉細而數者頭痛未止其脉沈而緊者必欲嘔其脉沈而滑者挾􅀬利其脉浮而滑者必下血太陽少陽併病而反下之成結􅇩心下堅下利不復止水漿不肯下其人必心煩脉浮緊而下之緊反入裏則作痞按之自濡但氣痞耳傷寒吐下發汗虚煩脉甚㣲八九日心下痞堅脇下痛氣上衝咽喉眩冒經脉動惕者乆而成痿陽明病不能食下之不觧其人不能食攻其􅀬必􅎪所以然者胃中虚冷故也陽明病脉遟食難用飽飽即發煩頭眩者必小便難此欲作榖疸雖下之其腹滿如故耳所以然者脉遟故也太陽病寸緩關浮尺弱其人發􅀬而汗出復惡寒不嘔但心下痞者此爲醫下之也傷寒大吐大下之極虚復極汗者其人外氣怫鬱復與之水以發其汗因得􅎪所以然者胃中寒冷故也吐下發汗後其人脉平而小煩者以新虚不勝榖氣故也太陽病醫發其汗遂發􅀬而惡寒復下之則心下痞此表裏俱虚隂陽氣併竭無陽則隂獨復加火針因而煩面色青黄膚瞤如此者爲難治今色微黄手足温者易愈服桂枝湯下之頭項強痛拿拿發􅀬無汗心下滿微痛小便不利属桂枝去桂加茯苓术湯太陽病先發其汗不觧而下之其脉浮者不愈浮爲在外而反下之故令不愈今脉浮故在外當觧其外則愈属桂枝湯下以後復發其汗者則晝日煩躁不眠夜而安静不嘔不渴而無表證其脉沈㣲身無大􅀬属乾姜附子湯傷寒吐下發汗後心下逆滿氣上撞􅇩起即頭眩其脉沈緊發汗即動經身爲振揺属茯苓桂枝木甘草湯發汗吐下以後不觧煩躁属茯苓四逆湯傷寒發汗吐下後虚煩不得眠劇者反覆顚倒心中懊憹属梔子湯若少氣梔子甘草湯若嘔梔子生姜湯若腹滿者梔子厚朴湯發汗若下之煩􅀬􅇩中塞者属梔子湯證太陽病過經十餘日心下温温欲吐而􅇩中痛大便反溏其腹㣲滿鬱鬱㣲煩先時自極吐下者與承氣湯不尓者不可與欲嘔􅇩中痛㣲溏此非柴胡湯證以嘔故知極吐下也太陽病重發其汗而復下之不大便五六日舌上燥而渴日晡所小有潮􅀬從心下至少腹堅滿而痛不可近属大䧟􅇩湯傷寒五六日其人已發汗而復下之􅇩脇滿㣲結小便不利渇而不嘔但頭汗出往來寒热心煩此爲未觧属柴胡桂枝乾姜湯傷寒汗出若吐下觧後心下痞堅噫氣不除者属旋代赭湯大下巳後不可更行桂枝湯汗出而喘无大􅀬可以麻黄杏仁甘草石膏湯傷寒大下后復發其汗心下痞惡寒者表未觧也不可攻其痞當先觧表表觧乃攻其痞觧表属桂枝湯攻痞属大黄黄連瀉心湯傷寒吐下後七八日不觧􅀬結在裏表裏俱􅀬時時􅁖風大渇舌上乾燥而煩欲飲水数升属白虎湯傷寒吐下後未觧不大便五六日至十餘日其人日晡所發潮热不􅁖寒獨語如見􅀑神之狀􅀂劇者發則不識人循衣妄撮􅇶惕不安㣲喘直視脉弦者生澁者死㣲者但發热譫語属承氣湯􅀂下者勿復服三陽合病腹滿身重難以轉側口不仁面垢譫語遺溺發汗則譫語下之則額上生汗手足厥冷自汗属白虎湯證陽明病其脉浮緊咽乾口苦腹滿而喘發热汗出而不􅁖寒反偏􅁖热其身躰重發其汗即躁心憒憒而反譫語加温針必􅇶惕又煩躁不得眠下之即胃中空虚客氣動膈心中懊憹舌上胎者属梔子湯證陽明病下之其外有热手足温不結􅇩心中懊憹􅀂飢不能食但頭汗出属梔子湯證陽明病下之心中懊憹而煩胃中有燥屎者可攻其人腹㣲滿頭堅後溏者不可下之有燥屎者属承氣湯證太陽病􅄍下發汗後微煩小便数大便因堅可與小承氣湯和之則愈大汗􅀂大下而厥冷者属四逆湯證太陽病下之其脉促􅇩滿者属桂枝去芍藥湯􅀂㣲寒属桂枝去芍藥加附子湯傷寒五六日大下之身热不去心中結痛者未欲觧也属梔子湯證傷寒下後煩而腹滿卧起不安属梔子厚朴湯傷寒醫以丸藥大下之身热不去㣲煩属梔子乾姜湯傷寒醫下之續得下利清榖不止身躰疼痛急當救裏身躰疼痛清便自調急當救表救裏宜四逆湯救表宜桂枝湯太陽病過經十餘日反再三下之後四五日柴胡證續在先與小柴胡湯嘔止小安嘔止小安一云嘔不止心下急其人欎欎㣲煩者爲未觧與大柴胡湯下者止傷寒十三日不觧􅇩脇滿而嘔日晡所發潮热而㣲利此本當柴胡湯下之不得利今反利者故知醫以丸藥下之非其治也潮热者實也先再服小柴胡湯以觧其外後属柴胡加芒消湯傷寒十三日過經而譫語内有热也當以湯下之小便利者大便當堅而反利其脉調和者知醫以丸藥下之非其治也自利者其脉當㣲厥今反和者此爲内實属承氣湯證傷寒八九日下之􅇩滿煩驚小便不利譫語一身不可轉側属柴胡加龍骨牡蠣湯火逆下之因燒針煩躁属桂枝甘草龍車牡蠣湯太陽病脉浮而動数浮則爲風数則爲热動則爲痛数則爲虚頭痛發热㣲盗汗出而反􅁖寒其表未觧毉反下之動数則遟頭痛即眩一云膈内拒痛胃中空虚客氣動膈短氣躁煩心中懊憹陽氣内䧟心下因堅則爲結􅇩属大䧟􅇩湯若不結􅇩但頭汗出其餘无有斉頸而还小便不利身必發黄傷寒五六日嘔而發热柴胡湯證具而以佗藥下之柴胡證仍在復与柴胡湯此雖以下不爲逆也必蒸蒸而振却發热汗出而觧􅀂心下滿而堅痛者此爲結􅇩属大䧟􅇩湯􅀂但滿而不痛者此爲痞柴胡復不中与也属半夏㵼心湯夲以下之故心下痞与之瀉心其痞不觧其人渇而口燥小便不利者属五苓散一方言忍之一日乃愈傷寒中風毉及下之其人下利日数十行榖不化腹中雷鳴心下痞堅而滿乾嘔而煩不能得安毉見心下痞爲病不尽復重下之其痞益甚此非結热但胃中虚客氣上逆故使之堅属甘草瀉心湯傷寒服湯藥而下利不止心下痞堅服瀉心湯巳後以佗藥下之利不止毉以理中与之利益甚理中理中膲此利在下膲属赤石脂禹餘粮湯􅀂不止者當利其小便太陽病外證未除而数下之遂挾热而利不止心下痞堅表裏不觧属桂枝人参湯傷寒吐後腹滿者与承氣湯病者无表裏證發热七八日脉雖浮数者可下之假令下巳脉数不觧今热則消榖喜飢至六七日不大便者有瘀血属抵當湯若脉数不觧而不止必夾血便膿血太陽病醫反下之因腹滿時痛爲属太隂属桂枝加芍藥湯大實痛属桂枝加大黄湯傷寒六七日其人大下後脉沈遟手足厥逆下部脉不至喉咽不利唾膿血泄利不止爲難治属麻黄升麻湯傷寒本自寒下醫復吐下之寒格更遂吐一本作更逆吐下食入即出属乾姜黄苓黃連人參湯病可温證第九大法冬宜服温􅀬薬及灸師曰病發􅀬頭痛脉反沈若不差身體更疼痛當救其裏宜温藥四逆湯下利腹滿身體疼痛先温其裏宜四逆湯自利不渴者属太隂其藏有寒故也當温之宜四逆輩少隂病其人欲食入則吐心中温温欲吐復不能吐始得之手足寒脉弦遟若膈上有寒飲乾嘔者不可吐當温之宜四逆湯少隂病脉沈者急當温之宜四逆湯下利欲食者就當温之下利脉遲緊爲痛未欲止當温之得冷者滿而便腸垢下利其脉浮大此爲虚以強下之故也設脉浮革因爾腸鳴當温之冝當歸四逆湯少隂病下利脉㣲澀者即嘔汗出必数更衣反少當温之傷寒醫下之續得下利清􅂖不止身體疼痛急當救裏宜温之以四逆湯病不可灸證第十㣲數之脉愼不可灸因火爲邪則爲煩逆追虚逐實血散脉中火氣雖㣲内攻有力焦骨傷筋血難復也脉浮當以汗觧而反灸之邪無從去因火而盛病從腰以下必當重而痺此爲火逆若欲自觧當先煩煩乃有汗隨汗而觧何以知之脉浮故知汗出當觧脉浮􅀬甚而灸之此爲實實以虚治因火而動咽燥必唾血病可灸證第十一燒針令其汗針處􅀍寒核起而赤者必發賁豚氣從少腹上撞者灸其核上一壯一本作各一壯與桂枝加桂湯少隂病得之一二日口中和其背惡寒者當灸之少隂病其人吐利手足不逆反發􅀬不死脉不至者灸其少隂七壯少隂病下利脉㣲澀者即嘔汗出必數更衣反少當温其上灸之一云灸厥隂可五十壯諸下利皆可灸足大都五壯一云七壯商丘隂陵泉皆三壯下利手足厥無脉灸之不温反㣲喘者死少隂􅀒趺陽者爲順也傷寒六七日其脉㣲手足厥煩躁灸其厥隂厥不還者死傷寒脉促手足厥逆可灸之爲可灸少隂厥隂主逆病不可刺證第十二大怒無刺大一作新已刺無怒已一作新新内無刺已刺無内大勞無刺大一作新巳刺無勞大醉無刺巳刺無醉大飽無刺巳刺無飽大飢無刺巳刺無飢大渴無刺巳刺無渴無刺大驚無刺熇熇之􅀬無刺漉漉之汗無刺渾渾之脉身􅀬甚隂陽皆爭者勿刺也其可刺者急取之不汗則􅂥所謂勿刺者有死徴也無刺病與脉相逆者上工刺未生其次刺未盛其次刺巳衰粗工逆此謂之伐形出九卷病可刺證第十三太陽病頭痛至七日自當愈其經竟故也若欲作再經者當針足陽明使經不傳則愈太陽病􅀄服桂枝湯而反煩不觧者當先刺風池風府乃却與桂枝湯則愈傷寒腹滿而譫語寸口脉浮而緊者此爲肝乗脾名縱當刺期門傷寒發􅀬嗇嗇惡寒其人大渴欲飲酢漿者其腹必滿而自汗出小便利其病欲觧此爲肝乗肺名曰横當刺期門陽明病下血而譫語此爲􅀬入血室但頭汗出者當刺期門隨其實而瀉之濈然汗出者則愈婦人中風發􅀬惡寒經水適來得之七八日􅀬除脉遟身凉􅇩脇下滿如結􅇩狀其人譫語此爲􅀬入血室當刺期門隨其虚實而取之平病云􅀬入血室無犯胃氣及上三焦與此相反豈謂藥不謂針耶太陽與少陽併病頭痛頸項強而眩時如結􅇩心下痞堅當刺大杼第一間肺俞肝俞愼不可發汗發汗則譫語譫語則脉弦譫語五日不止當刺期門少隂病下利便膿血者可刺婦人傷寒懷身腹滿不得小便加從腰以下重如有水氣狀懷身七月太隂當養不養此心氣實當刺寫勞宮及􅀜元小便利則愈傷寒喉痺刺手少隂少隂在腕當小指後動脉是也針入三分􅀘之問曰病有汗出而身􅀬煩滿煩滿不爲汗解者何對曰汗出而身􅀬者風也汗出而煩滿不解者厥也病名曰風厥也太陽主氣故先受邪少隂與爲表裏也得􅀬則上從之從之則厥治之表裏刺之飲之湯􅀬病三日氣口静人迎躁者取之諸陽五十九刺以寫其􅀬而出其汗實其隂以􅀘其不足所謂五十九刺者兩手外内側各三凢十二痏五指間各一九八痏足亦如是頭入髮一寸傍三分各三凢六痏更入髮三寸邊各五凢十痏耳前後口下項中各一凢六痏巔上一􅀬病先膚痛窒􅈹充靣取之皮以第一針五十九苛菌爲軫一云苛軫鼻索皮於肺不得索之火火心也􅀬病嗌乾多飲善驚臥不能安取之膚肉以第六針五十九目㫮赤索肉於脾不得索之木木肝也􅀬病而􅇩脇痛手足躁取之筋間以第四針針於四逹一作逆筋辟目浸索筋於肝不得索之金金肺也􅀬病數驚瘈瘲而狂取之脉以第四針急寫有餘者癲疾毛髪去索血一竹脉於心不得索之水水腎也􅀬病而身重骨痛耳聾而好瞑取之骨以第四針五十九骨病食齧牙齒耳清索骨於腎無一本作不得索之土土脾也􅀬病先身濇傍㪍傍㪍太素作􅀝煩悶乾脣嗌取之以第一針五十九膚脹口乾寒汗􅀬病頭痛攝攝一作顳顬目脉緊善衂厥􅀬也取之以第三針視有餘不足寒􅀬病􅀬病體重腸中􅀬取之以第四針於其輸及下諸指間索氣於胃絡得氣也􅀬病俠臍痛急􅇩脇支滿取之湧泉與太隂陽明一云隂陵泉以第四針針嗌裏􅀬病而汗且出反脉順可汗者取之魚際太淵大都太白寫之則􅀬去􅀘之則汗出汗出大甚者取踝止横文以止之􅀬病七日八日脉口動喘而眩者急刺之汗且自出淺刺手大指間􅀬病先􅇩脇痛手足躁刺足少陽􅀘手太隂病甚爲五十九刺􅀬病先手臂痛刺手陽明太隂而汗出止􅀬病始於頭首者刺項太陽而汗出止􅀬病先身重骨痛耳聾目瞑刺足少隂病甚爲五十九刺一云刺少陽􅀬病先眩冒而􅀬􅇩脇滿刺足少隂少陽􅀬病始足脛者先取足陽明而汗出病不可水證第十四發汗後飲水多者必喘以水灌之亦喘傷寒大吐大下之極虚復極汗者其人外氣怫鬰復與之水以發其汗因得噦所以然者胃中寒冷故也陽明病潮􅀬㣲堅可以承氣湯不堅勿與之若不大便六七日恐有燥屎欲知之法可與小承氣湯若腹中不轉失氣者此爲但頭堅後溏不可攻之攻之必腹滿不能食欲飲水者即􅎪陽明病若胃中虚冷其人不能食飲水即􅎪下利其脉浮大此爲虚以強下之故也設脉浮革因爾腸鳴當温之與水即􅎪病在陽當以汗觧而反以水噀之若灌之其􅀬却不得去益煩皮上粟起意欲飲水反不渴宜文蛤散􅀂不差與五苓散若寒實結􅇩無􅀬證者與三物小䧟􅇩湯曰散亦可身􅀬皮粟不觧欲引衣自覆若以水噀之洗之益令􅀬却不得出當汗而不汗即煩假令汗出巳腹中痛與芍藥三兩如上法寸口脉浮大醫反下之此爲大逆浮即無血大即爲寒寒氣相􅅮即爲腸鳴醫乃不知而反飲水令汗大出水得寒氣冷必相摶其人即䭇寸口脉濡而弱濡即惡寒弱即發􅀬濡弱相搏藏氣衰微􅇩中苦煩此非結􅀬而反薄居水漬布冷銚貼之陽氣遂㣲諸府無所依隂脉凝聚結在心下而不肯移胃中虚冷水􅂖不化小便縱通復不能多㣲則可救聚寒心下當柰何也病可水證第十五太陽病發汗後若大汗出胃中乾燥煩不得眠其人欲飲水當稍飲之令胃中和則愈厥隂病渴欲飲水者與水飲之即愈太陽病寸口緩􅀜上小浮尺中弱其人發􅀬而汗出復惡寒不嘔但心下痞者此爲醫下也若不下其人復不惡寒而渴者爲轉属陽明小便數者大便即堅不更衣十日無所苦也欲飲水者但與之當以法救渴宜五苓散寸口脉洪而大數而滑洪大則榮氣長滑數則胃氣實榮長則陽盛怫鬱不得出身胃實則堅難大便則乾燥三膲閉塞津液不通醫發其汗陽盛不周復重下之胃燥􅀬畜大便遂擯小便不利榮衛相搏心煩發􅀬兩眼如火􅈹乾面赤舌燥齒黃焦故大渴過經成壊病針藥所不能制與水灌枯槁陽氣微散身寒温衣覆汗出表裏通然其病即除形脉多不同此愈非法治但醫所當愼妄犯傷榮衛霍亂而頭痛發􅀬身體疼痛􅀬多欲飲水属五苓散嘔吐而病在膈上後必思水者急與猪苓散飲之水亦得也病不可火證第十六太陽中風以火刼發其汗邪風􅀍火􅀬血氣流泆失其常度兩陽相熏灼其身發黃陽盛則欲衂隂虚小便難隂陽俱虚竭身體則枯燥但頭汗出齊頸而還復滿而微喘口乾咽爛或不大便乆則譫語甚者至􅎪手足躁􅅰循衣摸床小便利者其人可治太陽病醫發其汗遂發􅀬而惡寒復下之則心下痞此表裏俱虚隂陽氣併竭無陽則隂獨復加火針因而煩面色青黄膚瞤如此者爲難治今色微黄手足温者愈傷寒加温針必驚陽脉浮隂脉弱則血虚血虚則筋傷其脉沈者榮氣㣲也其脉浮而汗出如流珠者衛氣衰也榮氣㣲加燒針血留不行更發热而躁煩也傷寒脉浮而毉以火迫刼之亡陽驚狂卧起不安属桂枝去芍藥加蜀􅃮牡礪龍骨救逆湯問曰得病十五十六日身躰黄下利狂欲走師脉之言當下清血如豚肝乃愈後如師言何以知之師曰寸口脉陽浮隂濡弱陽浮則爲風隂濡弱爲少血浮虚受風少血發热􅁖寒洒淅項強頭眩毉加火熏欎令汗出􅁖寒遂甚客热因火而發怫欎蒸肌膚身目爲黄小便㣲難短氣從鼻出血而復下之胃无津液泄利遂不止热瘀在膀胱畜結成積聚狀如豚肝當下未下心乱迷憒狂走赴水不能自制畜血􅀂去目明心了此皆毉所爲无他禍患㣲輕得愈極者不治傷寒其脉不弦緊而弱者必渇􅀍火必譫言弱者發􅀬脉浮觧之當汗出愈太陽病以火熏之不得汗其人必躁到經不觧必有清血陽明病被火額上㣲汗出而小便不利必發黄陽明病其脉浮緊咽乾口腹滿而喘發􅀬汗出而不􅁖寒反偏􅁖热其身躰重發其汗則躁心憒憒而反譫語加温針必􅇶惕又煩躁不得眠少隂病欬而下利譫語是爲被火氣劫故也小便必難爲強責少隂汗出太陽病二日而燒瓦熨其背大汗出火氣入胃胃中竭燥必發譫語十餘日振而反汗出者此爲欲觧其汗從腰以下不得汗其人欲小便反不得嘔欲失溲足下􅁖風大便堅者小便當数而反不数及多便巳其頭卓然而痛其人足心必􅀬榖氣下流故也病可火證第十七下利榖道中痛當温之以爲宜熬木塩熨之一方灸枳實熨之􅀬病隂陽交并少隂厥逆隂陽竭尽生死證第十八問曰温病汗出輙復热而脉躁疾不爲汗衰狂言不能食病名爲何對曰名曰隂陽交交者死人所以汗出者生於榖榖生於精今邪氣交爭於骨肉而得汗者是邪却而精勝精勝則當能食而不復热热者邪氣也汗者精氣也今汗出而輙復热者邪勝也不能食者精无俾也汗而热留者壽可立而傾也夫汗出而脉尚躁盛者死此今脉不与汗相應此不勝其病也狂言者是失志失志者死有三死不見一生雖愈必死􅀬病巳得汗而脉尚躁盛此陽脉之極也死其得汗而脉靜者生也􅀬病脉尚躁盛而不得汗者此陽脉之極也死脉躁盛得汗者生也􅀬病巳得汗而脉尚躁喘且復热勿膚刺喘甚者死􅀬病隂陽交者死􅀬病煩巳而汗脉當靜太陽病脉反躁盛者是隂陽交死復得汗脉靜者生􅀬病隂陽交者􅀬煩身躁太隂寸口脉兩衝尚躁盛是隂陽交死得汗脉靜者生􅀬病陽進隂退頭獨汗出死隂進陽退腰以下至足汗出亦死隂陽俱進汗出已􅀬如故亦死隂陽俱退汗出巳寒慄不止􅈹口氣冷亦死右􅀬病隂陽交部􅀬病所謂并隂者􅀬病巳得汗因得泄是謂并隂故治治一作活􅀬病所謂并陽者􅀬病巳得汗脉尚躁盛大􅀬汗出雖不汗出若衂是謂并陽故治右􅀬病并隂陽部少隂病惡寒踡而利手足逆者不治少隂病下利止而眩時時自胃者死少隂病其人􅄍利躁逆者死少隂病四逆惡寒而踡其脉不至其人不煩而躁者死少隂病六七目其人息高者死少隂病脉㣲細沈但欲卧汗出不煩自欲吐五六日自利復煩躁不得卧寐者死少隂病下利若利止惡寒而踡手足温者可治少隂病惡寒而踡時時自煩欲去其衣􅀍者可治少隂病下利止厥逆無脉干煩一本作乾嘔服湯藥其脉暴出者死㣲細者生右少隂部傷寒六七日其脉㣲手足厥煩躁灸其厥隂厥不還者死傷寒下利厥逆躁不能卧者死傷寒發􅀬下利至厥不止者死傷寒厥逆六七日不利便發􅀬而利者生其人汗出利不止者死但有隂無陽故也傷寒五六日不結􅇩腹濡脉虚復厥者不可下下之亡血死傷寒發􅀬而厥七日下利者爲難治右厥逆部􅀬病不知所痛不能自收口乾陽􅀬甚隂頗有寒者􅀬在遀骨死不治􅀬病在腎令人渴口乾舌焦黄赤晝夜欲飲不止腹大而脹尚不厭飲目無精光死不治脾傷即中風隂陽氣别離隂不從陽故以三分􅀱其死生傷寒欬逆上氣其脉散者死謂其人形損故也傷寒下利日十餘行其人脉反實者死病者脇下素有痞而下在臍傍痛引少腹入隂俠隂筋此爲藏結死夫實則譫語虚則鄭聲鄭聲者重語是也直視譫語喘滿者死若下利者亦死結􅇩證悉具而躁者死吐舌下卷者死唾如膠者難觧舌頭四邊徐有津液此爲欲觧病者至經上脣有色脉自和爲欲觧色急者来觧右隂陽竭盡部重實重虚隂陽相附生死證第十九問曰何謂虚實對曰邪氣盛則實精氣奪則虚重實者肉大􅀬病氣􅀬脉滿是謂重實問曰經絡俱實何如對曰經絡皆實是寸脉急而尺爲也皆當俱治故曰滑則順濇則逆夫虚實者皆從其物􅀋始五藏骨肉滑利可以長乆寒氣􅁀上脉滿實實而滑順則生實而濇逆則死形盡滿脉急大堅尺滿而不應順則生逆則死所謂順者手足温所謂逆者手足寒也問曰何謂重虚對曰脉虚氣虚尺虚是謂重虚也所謂氣虚者言無常也尺虚者行歩匡然也脉虚者不象隂也如此者滑則生濇則死氣虚者肺虚也氣逆者足寒也非其時則生當其時則死餘藏皆如此也脉實滿手足寒頭􅀬者春秋則生冬夏則死脉浮而濇濇而身有􅀬者死絡氣不足經氣有餘脉􅀬而尺寒秋冬爲逆春夏爲順經虚絡滿者尺􅀬滿而寒濇春夏死秋冬生絡满經虚灸隂刺陽經滿絡虚刺隂灸陽問曰秋冬無極隂春夏無極陽何謂也對曰無極陽者春夏無數虚陽明陽明虚則狂無極隂者秋冬無數虚太隂太隂虚則死右重實重虚部􅀬病所謂陽附隂者腰以下至足􅀬腰以上寒隂氣下爭還心腹滿者死所謂隂附陽者腰以上至頭􅀬腰以下寒陽氣上爭還得汗者生右隂陽相附部􅀬病生死期日證第二十太陽之脉色榮顴骨􅀬病也榮未夭曰今且得汗待時自巳與厥隂脉爭見者死期不過三日其􅀬病氣内連腎少陽之脉色榮頰前􅀬病也榮未夭曰今且得汗待時自巳與少隂脉爭見者死期不過三日􅀬病七八日脉㣲小病者溲血口中乾一日半而死脉代者一日死􅀬病七八日脉不躁喘不數後三日中有汗三日不汗四日死未曾汗勿膚刺膚一作庸􅀬病三四日脉不喘其動均者身雖煩􅀬今自得汗生傳曰始府入藏終隂復還陽故得汗􅀬病七八日脉不喘其動均者生㣲􅀬在陽不入隂今自汗也􅀬病七八日脉不喘動數均者病當瘖期三日不得汗四日死􅀬病身面盡黄而腫心􅀬口乾舌卷焦黄黒身麻臭㐲毒傷肺中脾者死􅀬病瘈瘲狂言不得汗瘈瘲不止伏毒傷肝中膽者死􅀬病汗不出出不至足嘔膽吐血善驚不得卧伏毒在肝腑足少陽者死􅀬病十逆死證第二十一􅀬病腹滿䐜脹身􅀬者不得大小便脉濇小疾一逆見死􅀬病腸鳴腹滿四肢清泄注脉浮大而洪不巳二逆見死􅀬病大衂不止腹中痛脉浮大絶喘而短氣三逆見死􅀬病嘔且便血奪形肉身􅀬甚脉絶動疾四逆見死􅀬病欬喘悸眩身􅀬脉小疾奪形肉五逆見死􅀬病腹大而脹四肢清奪形肉短氣六逆見一旬内死􅀬病腹脹便血脉大時時小絶汗出而喘口乾舌焦視不見人七逆見一旬死􅀬病身􅀬甚脉轉小欬而便血目眶䧟妄言手循衣縫口乾躁擾不得卧八逆見一時死􅀬病瘈瘲狂走不能食腹滿􅇩痛引腰臍背嘔血九逆見一時死􅀬病嘔血喘欬煩滿身黄其腹鼓脹泄不止脉絶十逆見一時死􅀬病五藏氣絶死日證第二十二􅀬病肺氣絶喘逆欬唾血手足腹腫面黄振慄不能言語死魄與皮毛俱去故肺先死丙日篤丁日死􅀬病脾氣絶頭痛嘔􅀫汁不得食嘔逆吐血水漿不得入狂言譫語腹大滿四肢不收意不樂死脉與肉氣俱去故脾先死甲日篤乙日死􅀬病心主氣絶煩滿骨痛一作瘈嗌腫不可咽欲欬不能欬歌哭而􅀏死神與榮脉俱去故心先死壬日篤癸日死􅀬病肝氣絶僵仆足不安地嘔血恐懼洒淅惡寒血妄出遺屎溺死魄與筋血俱去故肝先死庚日篤辛日死􅀬病腎氣絶喘悸吐逆腫疽尻癰目視不明骨痛短氣喘滿汗出如珠死精與骨髓俱去故腎先死戊日篤已日死故外見朣子青小爪甲枯髮墮身澀齒挺而垢人皮面厚塵黒欬而唾血渴欲數飲大滿此五藏絶表病也􅀬病至脉死日證第二十三􅀬病脉四至三日死脉四至者平人一至病人脉四至也􅀬病脉五至一日死時一大至半日死忽忽悶乱者死􅀬病脉六至半日死忽急疾大至有頃死􅀬病脉損日死證第二十四􅀬病脉四損三日死所謂四損者平人四至病人脉一至名曰四損􅀬病脉五損一日死所謂五損者平人五至病人脉一至名曰五損􅀬病脉六損一時死所謂六損者平人六至病人脉一至名曰六損若絶不至或乆乃至立死治傷寒形證所宜進退王叔和集仲景評脉要論新刋王氏脉經卷第七
